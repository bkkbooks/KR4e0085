body:
  text: 王舍人詩集巻五明王紱撰靜夜夜久篆烟凝欲眠方掩扃梧桐忩外月慳到枕邊屏芭蕉嫩緑開如扇不禁風雨秋都來渾幾葉作出許多愁和董校書秋香十詠種菊根宜宿土隨疎列可分移只恐人輕觸先教䕶短籬灌菊灌時須趂暁日出露將晞栽後無多日苖添幾葉肥催菊種爾酬佳節節過開尚遲縱令遲更好爭似莫愆期探菊無日不相訪殷勤直到開一從栽種後籬落幾徘徊刪菊秋來菊覆畦青蕋著枝時蕋少花方好渾消三兩枝折菊秋來開幾叢宛見晉人風折向東屏笑樽中酒可空移菊籬下開雖好盆中看亦宜金錢盈屋裏寕敢富翁欺翫菊籬畔醉黄花巾披一幅紗濁醪還自醸何必向隣賖餐菊秋菊可飡服落英多晚香不知騒賦後才思有誰强對菊濁酒幾畨醉黄花千古秋酒香花正好不必漫生愁題鄒園十詠容春閣一醉更無事四時長有花誰知春去盡却獨在君家水石軒人生貴自適於焉樂所遇開軒水石間無限湖山趣涵翠亭亭前竹色好亭下池水寛平波浸寒影古鏡飛青鸞秀石米老拜為丈我復結為友堅貞太古心天地同不朽方池齋前鑿方池聊以供滌硯雲影與天光波靜時時見桂屏疑是廣寒物金翠何燦燦香風四面圍經霜猶不散栢屏香葉多攀結銅柯巧屈蟠蒼龍倚簷外翠壁聳髙寒黄楊結葢多川産盤根盛吳中清風記賦筆允矣歐陽公木香架柔條架低屋紫心開玉團摘花醸芳醑清香入肺肝蒲石愛此九節蒲托根一拳石晴忩風日妍相看眼逾碧題斗方山水雨過亂泉流風聲滿樹頭山齋如斗大容得許多秋題山水路縁清澗轉門對白雲閒每每看圖畵令人憶故山松溪書屋一榻半書巻主翁如此清松風與溪水夜夜作秋聲題畵繁露隕黄葉西風起白蘋一聲新鴈過驚却未歸人晚節不獨宜烟雨尤能傲雪霜隆冬殘臘裡相伴野梅芳湘潭暁雲㸃㸃落林花寥寥弄山鳥何處一聲鐘雲峰萬重暁題畵和俞嘉言韻小逕没芳草衡門掩落花身閒常嬾出不是薄韶華又向晚雨初過南湖水氣凉隔簾有荷芰不必更焚香又新開竹下扉地僻徃來稀鄰曲東西巷牛羊晚自歸又羣峰面面開幾處玉樓䑓今夜望溪口有人乗興來題扇上枯木幽石圖露彩莓苔碧天香桂子丹多應廣寒夜流影落人間篷菴以篷覆故名織葦代陶瓦破竹編籬笆顧非城郭宜自是山人家著存嵗特享先於此禄飬既莫逮何由展誠愛隨寓供蒸嘗庶或吾親在墨君别館賓客以僕好寫竹多見徴時時揮灑其中葢用坡翁墨君堂記語也湖州有君堂東坡有君館我亦常致君硯池墨花滿清風林館前種竹數竿森然成林種竹風滿林風清塵自逺芳樽聊獨持非敢慕嵇阮洗心池林下鑿小池甚清澈寓目尋尺小適意湖海深豈唯適我意將以滌我心活水源池之上流也池水清不竭正爾源頭活未放入江湖恐成烟浪濶聽風雨在林池之側以為賓客宿止之處蕭騒復蕭瑟非筑仍非琴天籟本無作澹然千古音雲窩㸑室也饙氣初鬰勃炊煙復氤氲室中久無婦莫訝陽䑓雲藏暉閣寢室頗奥因穴其上用蠡甲忩覆之光粲尤甚奥室乃環堵忩戸何由施一瓦覆蠡甲天光常下垂米家船藏先世所遺法書名畫旅泊無長物滿載惟書畫聊應隨處娛未許人攜借思報月支廩禄及時有賜賚此之物用之有餘輙藏於一飯尚云報况此登金門縷衣與粒食要識皆君恩玉筍晴雲聚散不可常飄飄任舒巻山人去莫留影逐孤帆逺清江碧嶂清江皎如練列嶂開新晴一段好風景翻成客路情豐城劒氣牛斗有佳氣分明見龍光張華固能識神物終難藏鐵柱寒波金鐵有斷制角木終見降旌陽利物意千載安兹邦五老雲屏匡廬削芙蓉九疊雲屏翠五老惜離人目送斜陽外九華仙掌羣峰列如掌傳聞是九華仙人不可見千古閟烟霞牛渚秋清牛渚古磯頭謫仙曾醉遊白鷗殘照裏㸃破一江秋鳯䑓春色䑓上鳯凰鳴朝陽樹色明停舟一登眺春意滿都城題竹寄浦嬾翁君家溪水上種竹遶幽棲雨後翠陰合鈎簾聽鳥啼又晚節喜長存陽坡大託根年年春雨後生子又生孫風雨溪居宿雲暗溪樹新漲没莎渚幽人正酣眠茅堂閉風雨題畵雙魚雨晴春色暮花落水初深好共潛游去人多結網心畵馬萬疋羣中久已空幾翻嘶向落花風孫陽去後無知已淪落鹽車阪道中寫秋林髙士圖并題我昔山中日日閑不因臨水即登山而今役役風塵裏此趣猶存㸃染間塞上雜詠用耦武孟韻諱桓號訥菴婁江人所著有江雨軒集漫天風雪掩穹廬客裏誰來問起居忽報鄉人喜新到寄來猶是隔年書地上苦寒非故鄉天明屋底滿衾霜起來欲把吟鬚撚凍斷渾無一寸長次韻張真人所畫瀟湘意翠竹蒼烟兩㟁秋扁舟曾憶度湘流偶來琳館看圖畫彷彿推篷宿雨收蒼龍掩雨響蕭騒墨沼風生起翠濤想見仙翁揮灑罷洞庭空濶楚山髙題明皇聽貴妃弄笛圖笛弄霓裳月正秋三郎側耳復凝眸當年聴諫如聴曲車駕應無幸蜀憂題木香五色鳥彩翮翩翩五色齊惜春猶解惜毛衣恐應花底藏金彈欵下枝頭又欲飛題海榴靛甕鳥曽隨阿母作青衣人世於今幾變移仙駕不來雲路杳海榴枝上立多時題桂花士女沈沈凉夜玊階空獨立含情小苑東明月未來人已倦薄羅香透木樨風喜家兄以中自滇南歸每嘆飄零若轉蓬歸來復喜兩情濃翻思在昔遥相憶山水幾重雲幾重寫墨竹遺人滿几秋陰落硯池漫塗烟雨墨淋漓不工形似難持翫一種閒情許自知古木竹石蒼蒼寒色未知春野石荒苔古磵濱一段閒情誰可共相知殊是寂寥人桃源圖碧嶂排空隔世塵幾家鷄犬自相親種桃底事臨溪水惹得漁郎來問津竹舟子歌殘月欲低一枝蒼翠鳯毛齊幾畨風雨打篷夜夢入楚雲湘水西題畵贈劉廵檢柳暗花深犬不驚雨晴村巷緑苔生縣中近日無廵警挾彈來聽樹底鶯題士女戱嬰圖新剪春衫白苧輕宜男花放午風晴兒癡未肯離懐抱却憶當時弄化生送友路極天涯未忍分一重山外一重雲人生自古多離别江海飄零豈獨君寫古松圖寄澄江教諭蔡廣文允昇三衢人長年雲氣䕶竒材鱗滿霜皮蝕古苔只恐化龍天上去清陰不復覆書䑓題靜照軒門掩閒庭草色新簞瓢窮巷不知貧東風一夜消殘雪花柳眼前隨處春窄窄軒居傍水開北忩凉細夢初回南湖新漲雨聲斷荷芰觸風香自來凉雨初收爽氣生竹忩燈火讀書聲夜深掩巻忘言坐明月滿天風露清尋常客不到山家松火寒爐自煑茶風雪閉門才十日不知春已到梅花送僧懐師古菴住惠山并寫竹枝以贈真性海徒弟二人懐師古菴懐祖韶石泉聲山色古今同師去尤能繼若翁臨别自慚無可贈一枝聊為助清風寄鄉人浪將踪跡寄京華深負秋香一逕花欲托歸心向潮水朝朝暮暮過君家讀齊威王烹阿大夫事有感齊國能强理若何因封即墨與烹阿唐虞舉措無過此天下那消賞罰多花上白頭翁欲訴芳心未肯休不知春色去難留東君亦是無情物莫向花間怨白頭峽中雜詠兩㟁青山夾去程一江秋水片帆輕尋常對畵曾看此今日分明畵裏行峭壁一重還一重江流曲折亂山中船頭直望路疑斷纔到轉灣船又通平生頗得江山趣肯信江山亦有情自我客行千里逺船頭無日不相迎怒浪捲花灘上灘一重山掩一重山無端入峽添狂態日日題詩未肯閒崦裏山髙多晝陰未昏烟景暗秋林停舟晚飯舵樓底猶有夕陽明逺岑峽裏江山總竒絶推篷不厭去帆遲重來恐忘經行處一處經行一處詩險固山河幾戰爭陣圖猶自列分明至今江水抱遺恨嗚咽古今無限情石轉狂湍吼怒聲客懐清夜夢魂驚篙師著力挽舟上挾向湍流平處行蜀道古稱多險艱我來觀水復觀山誰知富貴天然設身在玉屏金幛間墨蒲萄馬乳纍纍滿架秋晚凉曾翦薦新篘幾畨月上人歸院珠帳髙懸夜不收雙梧草堂圖花落鶯啼春復深雙梧交暎晝沈沈煩君為掃亭前石待我歸來看緑陰滄浪濯足圖入郭歸來欲暮天數峰殘照半溪烟悠然濯足滄浪上怕帶黄塵上釣船為江陰趙以清題捕魚圖潮痕日日到門前供具時時喜斫鮮記得尋君秋色裏鄰家多是捕魚船山水小景溪水涵秋鶴影孤草堂雲冷樹糢糊相逢未遂還山約空復年來喜畵圖夜坐書館蕭條聞夜風閉門孤坐與誰同誰隣有子燈前讀忘却情懐是客中寫家山圖寄翰林錢仲益先生年來三徑已荒蕪漫把歸心寫畵圖落落書聲深竹裏相過曾記敝廬無全古圖物物生成本自然試看天地太初前到頭珍重無殘缺絶勝殷勤更去全甲申元日偶成屠蘇煖就與誰傾㓜子客邊聊慰情絶勝年時逢此日看人兒女拜新正挽廖檢討先生敬先吉水人不意㣲疴便殞身詞垣那得更相親朝叅舊有金門籍㸃檢而今減一人玉署編書未及完珮聲無復上金鑾可憐殘藁留遺篋掩巻令人不忍看丹旐翩翩引夕暉楚江西上片帆飛賜金未及娛親舊不料家山殁後歸太史文章表墓阡羣公哀挽集成篇人生百歲誰無死似此尤堪慰九泉題卞長史山水圖踪跡年來逐轉篷宦情鄉思與君同至今尚憶閒邊趣十里溪山一短笻長占烟波巻野水孤篷伴此生釣絲風颺髩絲輕世間甲子渾忘却潮落潮生幾月明逝水滔滔春復秋長年踪跡寄扁舟五湖風景誰爭得千古應須付白鷗寫竹寄梅軒葉葉風生鳯羽輕氷霜不改歲寒情憑君試向軒中看比並梅花若箇清山水圖年來書劍客長安塵滿青袍髩雪寒回首故園歸未得好山多在畵中看又十年騎馬走西東兩髩秋霜落鏡中安得拂衣尋舊隐草樓髙處聽松風又生平野性愛林泉别却林泉已十年肯信而今圖畵裏有林泉處即欣然題竹贈潘晦初燈下歌狂酒半醺興來為爾寫秋雲故人湖海如相問骨立蕭然似此君送松溪宰恩除百里應星辰匹馬蕭蕭逺入閩遥想到官花滿縣煖風鶯燕萬家春題荆州劉給事子偉贈行巻客裏逢君話舊逰醉中曾上仲宣樓君家正近樓前住風送江聲日夜流荆州雄據大江濱不到於今二十春邂逅看君贈行巻眼中無幾昔年人君本荆南閥閲家偶同逰宦客京華公餘莫厭頻相過小閣焚香自煑茶送葉生來省兄歸錢塘因乃兄中書縁事及至已䝉宥復職急難曾誦鶺鴒詩相見如何又别離要把平安早歸報雙親閭巷立多時兄弟和同百歲心肯辭千里逺來尋到家親舊應相問只説君恩海様深中秋卧病今夜中秋月自圓病軀誰復對嬋娟清光深有憐人意轉入斜忩落枕邊戱賀俞行之納寵兼簡同舍謝郭二秀才發一笑粲行之名用號五松山人江右人歡娛良夜喜更長惱殺多情同舍郎枕冷衾寒眠未得春風只隔一重牆金猊香冷酒㣲醒銀燭光殘月正明今夜情懐非别夜有人低語喚卿卿新花枝勝舊花枝從此無心念别離肯信秦淮今夜月有人相對數歸期題靜樂軒前溪氷泮緑生波好雨催花向曉過宿酒未醒眠未起半忩紅日鳥聲多竹几籐牀小硯屏薰風簾幕篆烟青閒齋幾日黄梅雨添得芭蕉緑滿庭秋聲早已到梧桐露氣生凉湛碧空獨倚闌干待明月紫簫吹徹木樨風斗帳藏春日醉眠靜中唯與嬾相便尋常甲子無心記看到梅花又一年寫竹於慈節堂巻錢塘張母守節教子咸遂厥志有題其堂曰慈節一時文士多稱道焉其子輅持巻示予遂寫墨君以况慈節之貞守復賦小詩以期厥後之昌大云堂前慈竹翠婆娑堂上慈親鬢已皤歴盡氷霜當雨露諸縁應見錦綳多謝吳中寄惠佳茗均字平仲紙裏重重想自封槍旗葉葉帶春風誰言兩地人千里清味嘗來搃一同寄畵題寄偶武孟先生君在南京我北京江雲塞樹搃闗情别來幾度相思夜孤館青鐙聽雨聲寫竹贈李大理汝成汝成大理嘗徴寫墨君僕憒憒中久不能酬迨兹十年矣適邂逅北京而大理又丁内艱南歸來别遂寫以償宿負并賦詩以述悲感之情云憶昔曾同客帝畿十年遊宦子先歸可憐慈母堂前竹無復清陰映綵衣為劉孟功寫雙竹四月廿五日過竹深先生齋居因留予同飯二子鋼鑑侍側玉如也酒酣遂寫墨君為先生壽復賦詩以嘉二子云筍已成竿照眼青兩郎深慰若翁情誰言玉謝階庭下玉樹芝蘭獨擅名為鄉人寫碧梧翠竹舊栽梧竹映吾廬一别於今十載餘清夜幾畨歸夢裏緑陰池館雨蕭疎寫竹寄俞朝宗先生與君一别十年餘每見人來問起居盡説丰神清似竹霜明鬚髪影疎疎寫竹寄匡世徳先生匡公善音律故以為言别來無物寄相思千里聊将玉一枝老去風流仍復在製成簫管月中吹寫竹琅玕節節粉痕香翡翠毿毿鳯尾長退直玉堂新月上一簾風露晚生凉霓旌翠葆瑞烟浮禁籞深嚴近素秋如此一枝何處見月明凉影鳯池頭鳯凰池上影蒼蒼退直歸來月到牀見説立秋才兩日不知風露已生凉為滎陽宰沈彦初寫竹宜風宜雨又宜烟一度相看一洒然有此信知人不俗絶勝栽柳向門前吏散庭空罷曉衙湘簾深暎翠交加清風一榻琴三弄笑却河陽滿縣花寫竹送袁文理之官湘陰一官千里去江南寫贈琅玕酒半酣彷彿蒼龍挾飛雨散將春意滿湘潭寫竹送張文惠歸梁溪退直歸來腕已勞因君燈下又揮毫持歸好向人間説拾得池頭綵鳯毛寫竹於沈誠甫來青樓壁號存耕瀟湘江上幾千竿雨雨風風翠欲寒唯此一枝深有意影隨明月過林端寫竹題寄華叔端恪號賓暘我昔尋君扣竹扉醉中曾寫竹間詩别來幾度空相憶多在青燈聽雨時不到君家已十霜種來修竹倚雲長月明滿地蕭蕭影想見幽人詠晚凉題枯木竹石寄馬桓仲孝常子也每憶君家溪水邊排簷竹樹翠生烟好教預掃林間石待我重來一醉眠題枯木竹石寄李公實罨畵溪邊水拍隄繞隄髙樹倚雲齊君家正在樹深處滿地緑陰山鳥啼題任月山瘦馬圖千里追風一日還年來老瘦骨如山多情畵史勞傳寫不在驪黄牝牡間題鴈才見南飛又北飛飛來飛去不相違慚余壮歲逰江海頭白而今未得歸聲滿衡陽月正明相呼相喚搃闗情人當客夜孤眠處聽此能無憶弟兄聯翩飛處影横斜暝色和烟暗荻花逺水㣲茫千萬頃不妨隨意宿平沙虞人何用網羅謀萬里髙飛且自由肯學雞鳬飽禾黍一汀菰米楚天秋題畵尋源無復見人家兩㟁青山帶晚霞莫把扁舟更深入春流隨處有飛花汀洲潮落雨初晴獨坐蘭舟酒半醒欲采芙蓉過江去迢迢秋水數峰青送大學士黄靜菴先生拜封歸永嘉幢幢車葢出都門醼别江亭日未曛歸㑹耆英風致好舉杯花下説君恩綸音褒美拜恩歸父子同榮世所稀不但到家人共喜舊時泉石總生輝蕭蕭華髪被恩榮聖主於今重老成只恐東山眠未得蒲輪非久又相迎題畵送王服周宰廣濟冕百里郎官應列星此行須用恤民情畵圖寫贈非無意山要增髙水要清題畵碧落雲開灝氣清滿山秋籟晚凉生趣多翻笑詩難稳不覺吟哦到月明題枯木白頭公鳥落日西風秋滿林雙飛雙宿轉情深茂陵若使相如見何待文君指下吟題畵落日青山宿雨收髙林黄葉晚瀟颼無端驚起沙邊鳥㸃破清江一段秋小喬觀書雲髻新粧珠翠團杏花零落曉風寒毎憐春事傷心處偷把周郎曲譜看送朱生回鴈落烟汀逺樹㣲扁舟江上送君歸到家正好新醪熟應向堂前戱綵衣題竹石石邊蕭索倚清寒曉色開晴露未乾宿酒半醒初睡起一林蒼翠捲簾看孫康映雪金琖淺斟歡有餘光陰誰解惜居諸家貧每慕孫夫子雪照山忩夜讀書山水亭上相逢興趣幽松聲林影一天秋瑶琴彈罷斜光晚山自嵳峩水自流題馬黑河芳草接平沙不獨龍媒産渥洼萬馬羣中有良驥莫令長阪困鹽車王止中先生來視其甥庶子黄君既而還永嘉因送之髙隠丘園雪滿顱何由巾履到皇都要將眼見賢甥貴宅相當年信不誣春水初泮水㣲茫千里家山一葉航隨處遲留即行樂計程燈夕過錢塘到家尤喜及花時想共隣翁對酒巵醉後定知無雜語繁華應只話京師寫竹石喬柯圖寄楚南書記昔東坡居士為佛印别久遂作石子之供禪林永為佳話今僕為楚南師寫喬柯竹石以寓别懐不知是同是異楚南見之能為我一轉語否耶呵呵别來無處覓巖扉城闕應知到亦稀月冷空山禪寂夜石龕林影一燈㣲松泉師攜至日南所作三香圖訪予翰林命加松竹厠於其間葢將以物情之同者為一致耶抑亦心源之同者為一道耶因命題遂賦如右氷雪生香飄翠襟歲寒同結弟兄心誰知落落蒼髯叟尤與此君交誼深寫竹送張思安僉憲陜西雪滿闗山路不分繡衣驄馬出都門此君豈獨風霜撡到處應推雨露恩送宏上人住保寕寺歸去家山續祖燈飄然别我下蘭陵遥知後夜空江上月照孤篷坐一僧寒夜祖上人過寓所上人字韶石聽松庵僧年來多病骨稜層客舍蕭然冷似氷自笑誰能相慰問燈前今夕有鄉僧題看山樓憶别林泉惜未還故人邀坐小樓間抗塵走俗愁無那一見青山亦解顔挽筠磵解先生開先長子倫字大經次子縉字大紳同登洪武戊辰進士排難應須譲魯連邦家民物搃安全至今父老思遺徳每對諸孫話昔年曽承明詔就安車辭謝天顏返故廬已有諸郎膺寵渥閒情因得伴樵漁箕裘相繼有遺經不獨家庭桂子榮江右年來登進士蜚英多是舊門生哲士云亡道未亡林端阡表起虹光鑑湖東畔文江曲過客應多式路傍折楊柳詞每為多情記别離道傍披拂亂如絲東風也學時人態偏向柔條恣意吹題畵僕向居龍山時為朱希顔寫此幅今幾二十年矣白首無成盛年難再為之撫巻長慨復題小詩於上云憶昔與君皆少年山忩曾為寫蒼煙而今相見頭俱白看畵題詩一愴然又題畵我昔草堂雲磵深與君相近日相尋别來猿鶴今何似月色松聲夜夜心寫竹贈友人雨過南坡翠蘚深幾竿蒼玉弄春陰當年新種纔生筍聞説而今已作林題畵塵容俗状日驅馳猿鶴閒情久别離今日無端看圖畵從前重憶故山時千巖萬壑鎻烟霞住處如何祗一家溪水未應渾買斷可容移棹覓桃花題菩提葉上畵山水柿葉收來如紙薄筆端重遍舊曾聞畵圖如此尤竒絶雅製多應鄭廣文五湖烟水一扁舟來徃忘機共白鷗得興何須好東絹漫將霜葉寫清秋題翎毛畵草色烟光染翠衣暖風晴日一雙飛幾畨啼向山忩外清夢初回曙色㣲榖粟樷邊錦羽斑中心多競貌安閒少年不惜千金重勝負惟憑一鬭間平田漠漠雨晴時每報農家布榖遲性拙自甘叢薄下從教别鳥立髙枝原野蕭蕭落木秋芃芃禾黍滿西疇㣲軀不識南溟逺蓬藋飛鳴且自由元日朝回為陳秀才寫竹因題丹闕鳯來初日上九苞文彩動天顔池頭捉筆隨摹寫只得雲霄彷彿間種竹喜得栽時及早春宿泥獨帶蘚痕新擔頭挑取來城市一路清風掃俗塵昨夜春雷始發聲翠鞭應有玉芽生老夫自笑衰年近尚欲階庭看錦䙀節間常帶粉痕香玉立亭亭鳯尾長最喜客來吟嘯處茶煙飛度翠陰凉節撡堅貞耐歲寒客忩相對結清歡夜深風起珊然響猶復蕭疎入夢看翠影生陰雨露新泠泠如玉淨無塵衡門自此休教閉待取清狂直造人宻葉初抽鳯尾齊紛紛蒼雪㸃春泥遥知客到應非俗好句無妨節上題種竹月餘稍覺憔悴恐有不安意用前韻慰之東風無處不陽春小草皆承雨露新底事獨含憔悴色多應不樂近囂塵不作風聲即雨聲客忩蕭索可憐生憑君切莫懐鄉土隨處何妨弄錦䙀春泥過雨落花香根下行鞭想漸長正好崢嶸露頭角休教俗眼笑凄凉欲持杯酒慰清寒作底含愁不盡歡當領主翁珍重意特回青眼為君看滿城桃李鬭芳新車馬春風紫陌塵君獨胡為存苦節饑虛休學採薇人揚州騎鶴理難齊雨後來看兩屐泥相慰固慚無别物新詩千首為君題贈余生同倫字日明憶我當時别故邱若翁攜汝送行舟而今十載重相見子正青年我白頭寫竹寄王仲淵幾度相思目斷雲鄉心無那惜離羣殷勤寄語諸親舊衰貌年來似此君四時絶句寄題皆山軒燕飛簾幙日初長面面青山出短牆昨夜春歸風雨送滿渠流水落花香嵐光飛翠入簾楹枕簟生凉暑氣清公退日斜新浴罷坐看峰影過州城屋外青山畵不如屋頭髙樹影扶疎晚來賓退軒忩靜一榻秋聲夜讀書雪飛林壑曉初晴坐對琅玕眼倍明却憶夜來清夢裏滿空鸞鶴上瑶京為家兄以中寫歸樂圖并賦詩以寄半生行役走風塵年老還家樂更真遥想歲時懽聚處可能相念未歸人寄鄉中諸親舊幾畨相憶强悲歌久客京華奈老何莫怪年來倍惆悵白頭親舊已無多寫竹寄趙叔平君家修竹繞軒居一别而今十載餘聞説錦䙀新意好舊時根本恐蕭疎憶故妻悼亡又是十年餘男已成婚女已歸翻覺而今悲更切客中穿盡舊縫衣王舍人詩集巻五
