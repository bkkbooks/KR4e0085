body:
  text: 王舍人詩集卷三明王紱撰送王仲理復任四川僉事亨號秋林蜀道古云險憐君久宦遊一家渾八口萬里只孤舟雪滿岷山曉霜飛峽樹秋吏民懷舊德去去莫遲留送葉經歷致仕歸建寧十載塞垣外一身戎馬間拜官才受賞謝病却投間黃菊晚連徑白雲秋滿山趣多那可及悵望送君還題璚陽子手卷璚陽髙隱處山色五湖中路與煙濤隔船從浦溆通劒橫秋影碧丹伏夜光紅安得謝人事從遊鶴背風送吕太守之沁州名允銘號筠軒沁州汾水北兹地我曾過郡郭雲山繞人家土屋多民淳無獄訟時泰少徴科此去君為牧應聞五袴歌送梁先生不移長子潛字用之次子混字本之賢郎居諫職定省惜相違到此未為久如何又欲歸家園梨果熟溪市蟹螯肥京國往還便莫將音信稀寄龎山人士南為問龎居士年來安穩無髙間唐陸羽清逸宋林逋竹裏茶煙細梅邊鶴影孤逃名渾未許好句落江湖夜宿黃牛峽煙景暮蕭森黃牛峽轉深灘聲孤棹月山影半江陰感慨追陳迹登臨愜壯心倚篷眠未得何處又猿吟送吳掾郎禮歸無錫省親作掾已三載兵曹典要機久能勤案牘今喜訪庭闈沽酒鶯花晚行庖笋蕨肥故山無限好惆悵不同歸題江村漁隱釣舟隨處泊風揚一絲輕久已潛蹤迹那能識姓名雨添春水濶山帶夕陽明獨有沙邊鳥時來共結盟送王御史還松江擬復烏臺任如何便乞還特恩憐母老多病許身間舊業松陵曲扁舟泖水間晏眠應有夢衣繡肅朝班送解大紀遊北京黃金臺下路曾是舊都城此去壯遊樂能忘逺别情壚姬留客醉商犬護車行登覽詩千首多應弔古成送吕永明復任饒州司稅終西安知府與君同里閈遊宦異西東饒郡久司稅天官初考功估平常課集貨聚逺人通自此應超擢休言秩未崇野航蹤迹渾無定生涯一葦輕自應耽野趣無復重浮名汀草斜陽晚鷗波細雨晴不因時賣卜那肯泊江城送張知縣作宰麻陽去民風雜五溪世傳盤瓠後地接夜郎西臘釀多藤酒春禽半竹雞到官應有便莫惜寄緘題送高員外省親歸毗陵握手才相見論懷未忍違我方遊帝里君復訪庭闈曉日辭丹陛春風戲綵衣應知到家後欲别更依依謝華樗林寄佳菊四枝名寅可字汝翼佳菊滿籬東朝來寄好風花連人共晚香與意兼融皎皎鵝肪白盈盈鶴頂紅相看思欲賦才拙句難工病中雨夜二首不眠孤燭在風雨送凄涼病骨秋加瘦羈愁夜併長自應強飲食誰復問衣裳蟋蟀如相念時來啼近牀懷抱怕生愁病來難自由雨聲孤館夜人影一燈秋書劒乖前志江湖憶舊遊無端身外事一一上心頭作平湖秋色圖題贈陸彥玘考功近自吳門别而今已半年交遊心固切霄壤迹難緣宦况青雲表間身白鳥邊漫圖秋色去還肯憶林泉題流杯别墅卷曾聞髙隱處風景似山陰曲澗通流水修篁藹茂林興來觴且詠題在古猶今此本吾家事因君感慨深製成鶴氅偶作氅衣成野服飄逸類黃冠雪素輕狐貉風祛散羽翰不嫌過膝短正喜著身寬見影心猶稱時披月下看寄章采芝公瑾只説暫違去如何竟不來莫非多契合從是久徘徊笑傲風前榻歌停月下杯却憂鱸正美歸興又將催寄包徴士公愷號梅莊江陰人愛爾間情好林堂白晝長楷書臨小晉近體學中唐水蒔一池芡園栽十畝桑不知籬下菊秋後肯分香憎蚊才瞑便􅖇􅖇憑陵若騁能微軀不自愛利口向人騰座客勞揮扇書生罷炙燈秋風來旦夕知爾不須憎宿維揚淮海風流地狂遊記往年飄零重過此懷抱總非前囊槖唯孤劒妻孥共一船故鄉回首望煙樹渺江天題自怡軒黃叔洪求諱海卒年八十六才非世所宜斂迹且棲遲口獨與心語人皆莫已知落花啼鳥處臨水看雲時此趣古今在誰云不自怡雪夜與鄉人旅邸中小酌客舍雖寥落清樽喜對傾偶同今夕醉忘却異鄉情炭熾寒猶在燈殘雪更明獨憐分手去一騎上邊城代州道中堪笑復堪嗟行行路轉賖稍陰憂雨雪才霽苦風沙逆旅人欺客征途犬護車不知緣底事淪落向天涯南歸沁州道中曉行冒曉促歸程嵐霏是沁城路隨流水去人入亂山行澗底春氷滑崖陰凍雪明鶯花南國近深慰客途情喜家兄以中自滇南歸用朱公孟韻弟兄無幾人舊業且容身共歎久行役應知多苦辛囊資詩卷在鏡影鬢絲新得遂歸來志琴樽日可親題雲山樓閣圖煙霞知幾重樓觀羽人宫路向嶺頭過船從溪口通枯藤懸絶壁古澗夾髙松安得投身去長吟鶴背風題漁樂圖釣罷得魚鮮舟維野店邊間同三兩伴盡醉百千錢弄笛船頭坐枕蓑篷底眠煙波隨處好身世總悠然雨夜過鄒氏溪東别業溪口暫維舟敲門暝見投雨來山郭夜木落野塘秋寢閣香猶在行庖火尚留主翁情意厚樽酒更綢繆題老圃卷桑榆宜晚境築圃近茅堂鑿沼分流水編籬補壞墻雨晴瓜蔓緑風暖菜花香客過叨雞黍村醪剪韭嘗韓蒙菴先生同留夏雪洲館中韓以詩留别遂次其韻韓奕字公望號蒙菴姑蘇人夏權字叔度號雪洲江陰人間身江海上世事每嫌聽吟藁逢人論扁舟到處停雪銷新水緑雲盡逺峯青何事思歸早潮生未滿汀寄邵希逺校書兼簡叔行東屏萍蹤俱是客書館喜相臨來往無多路分違又一旬酒應端午醉囊似去年貧煩語賢東道池魚好餉賓代雪洲端陽招客夏權字叔度佳節逢端午葵榴照眼新君雖非飲客我豈獨醒人綵索寧須繫蒲樽正可親髙情如不棄林下望車塵病中述懷二首卧病得休暇提撕百念非任真招物議隨俗與心違露草亂蟲響雲霄一鶴飛君恩知未報何敢道思歸問年才五九底事便奄奄壯志逐時減新愁與病添日晡思啖粥風冷怕鈎簾有客來看命猶談蔗境甜送王檢討使朝鮮稱字孟揚號虛舟有集解學士縉作序秉節赴朝鮮銜恩玉殿前封圻寧有間雨露自無偏驛騎經遼地雲帆拂海天逺人迎拜處應識使君賢病後寄同志少小頗知學老來何足論自慚書翰力難答聖君恩一病較才好兩眸看漸昏客囊無舊物唯喜短檠存寄沈徴士睿字誠甫號存耕東陽沈徴士於我久相踈間别已三載往來無一書情懷終自若客鬢近何如遙想諸郎好家庭樂有餘贈蔣御醫用文名武生諡恭靖醫名追扁鵲傳派自長康疊見回生效多藏經進方竹深通藥徑花外掩丹房修合常供御衣衫襲異香送宏上人住保寧寺别來忘歲月相見又飄然去住渾無著行藏只任緣故山唯落木廢剎鎖荒煙師去重開社香燈祝萬年送魯府黃謙紀善歸莆田餞别秦淮上春潮沒淺沙寸心應戀闕千里暫還家客路多芳草都門正落花徴書看又起未必久煙霞送人歸省逺别念親闈君恩獨賜歸鄉關經月到煙水片帆飛粱稻歲初熟蟹螯秋正肥遙知調膳處綵服映春輝送懷益州長老之四明懷公方外士去住兩翛然有相皆成幻無心即是禪鐘聲山寺月杯影海門煙為續祖燈去能忘應世緣送章秀才歸松江挾䇿來京國經年未一官籍名通祕閣僦屋住長安身病憐親老妻亡念子寒恩教暫歸去不是學張翰挽吳母令子居郎署慈親白髮埀每聞期就養誰料遽成悲太史書阡表名卿集挽辭獨憐斜日裏無復倚門時送鄭州同知考績上銓衡三年喜政成郡人多頌德朝士半知名落日孤城逺秋風上馬行遙知溱洧上父老久相迎中秋對月追憶去年諸公遂有存沒升沉之感因成近體一首中秋已過半芳樽誰共親可憐今夜月空憶去年人得失蕉間鹿存亡草上塵揮杯勸孤影只合伴間身寄蔡景皓始因從宦出先世福州人蹤迹久居楚語音猶帶閩田廬依婦族圖繪贈交親千里聊相問身安莫厭貧寄劉士俊劉郎醫術好夙契已逢仙製藥少人見祕方多祖傳家貧雖寂寞客至即留連草載不相見令人思惘然寄徐伯玉每懷徐孺子寥落共誰親早歲應多疾衰年又復貧苔䀶封古巷松影過比鄰獨喜添丁好傳家幸有人寄徐九鼎氏族南州𣲖遺風亦好潛幽居鄰陸羽清藝祖蒙恬地近傍城角花深露屋尖年來怕徴起蹤迹隱魚鹽寄潘子安號海莊任夔州府同知所著海天清嘯詩集潘郎豪且逸佐郡上瞿塘縱酒宦情薄耽詩野興狂才名雖藉甚家業已荒涼聞説喬公女鴛鴦鎖洞房寄孫景昭每愛孫公子風流不可禁留賓開博具呼妓合調琴杯泛忘形酒囊存買笑金别來嗟已久緑鬢雪應侵中秋宴集分韻得青字秋半露初白月髙天更青相逢如此夜不飲若為醒急管奏清響長筵列廣庭百年能幾會杯到莫留停題源隱風景似仙家山厨飯熟麻恐人知姓字避地隔煙霞流水一溪雨種桃千樹花莫教漁父識出向世間誇贈陳司倉廷玉司倉雖小職京國掌軍儲天近屢朝見官間如隱居秋風三畝宅春雨一園蔬咫尺頻相過毋煩重致書送張邦達之四會送君之四會接境近畨禺夷獠居相雜炎涼候頗殊時清銷瘴癘地廣闢膏腴政績三年後應知德化孚送王生還錢塘迎養親老當迎養江帆去路賖故鄉翻是客上國久移家慈竹添新筍春萱著晚花到來應倍喜甘旨樂繁華送楊教授之邵武教鐸之閩郡諸生待琢磨莫言居職冷應見育材多晚棹投孤驛春衣換夾羅去途經浙水舊業喜相過送黃仲遜之安平鎮巡檢聞説安平鎮荆湖當要關瀟湘合二水衡霍拱千山地僻居民少時清邏卒間遙知到官後多在醉吟間挽菊莊金德厚先生别去兩經春寄來書更頻只期重握手寧料永傷神祿養悲賢子情親泣故人遙憐籬下菊今歲為誰新雪夜凱師留宿戲贈自笑年將老無繇斷愛憎閉門辭俗客下榻待吟僧茶煮春氷溜梅橫雪夜燈要能同此趣京國許誰曾寄匡世德匡君一别久蹤迹近誰依囊盡風流在年髙故舊稀浩歌邀月上獨立看雲飛只歎階庭下無人戲綵永題臨清書屋君家舊文獻世業喜聨芳書積數千卷門開半畝塘天光朝鑑滿燈影夜忩涼未許終嘉遁還應入帝鄉深靜軒為雲石長老賦蓋取杜少陵竹深留客處荷靜納涼時之句以扁其軒云何處可追遊兹軒景最幽穿林開小徑鑿地引清流竹色明書幌荷香散茗甌髙僧尤好客欲别更遲留贈陳景中昆仲題所畫竹上到京今六載衰病獨煢煢在客誰知己惟君弟與兄經過常饋藥慰問每留情持此豈云報相期歲晚盟暇曰讀楞嚴經偶成勞生何擾擾衰鬢已蕭蕭偶得楞嚴讀都將世慮消水流虛谷靜雲度碧天遙獨坐忘言久西山對寂寥初度此日逢初度長年客帝鄉兩京叨扈從四海共安康振珮趨青瑣濡毫向玉堂不須稱夀者歌此進瑶觴濟寧分水閘訪鄉人王大使自説到官久往來多見臨上堂詢旅况對酒話鄉音日落郡城晚河舂閘水深南歸應有待停棹擬重尋東昌與陳德耔夜别耘江陰人號約軒匆匆客路邊不得共留連公館燈前酒王程月下船孤城橫曠野斷鴈落平川别後重相憶應知夜不眠和趙彥如中秋對月韻友同號存齋秋半晚涼新空庭逈絶塵共看今夜月况是故鄉人展席聊呼酒烹魚底用蓴清光千萬里隨處可相親送台州醫官裘訓科南歸學業究岐黃新除拜寵光濟人唯用藥從宦不離鄉選勝登霞嶠尋真訪石梁因知歸思趣不敢問竒方賦椰瓢炎方充貢物頒賜出金門外表匏瓜質中涵雨露恩香甘宜作果堅確可刳尊銘刻須珍襲留榮及子孫挽李母其子玉大理副閭里共稱賢中途喪所天教兒登顯仕抱志卒餘年京國輿靈櫬橫山入墓阡銘文書琬琰尤足慰重泉得家書昨夜鄉人到家書喜見投展開三四讀添却萬千愁舍弟貧依舊山妻病未瘳那堪諸幼稚日日望歸舟王舍人詩集卷三
