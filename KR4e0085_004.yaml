塵隨處漫容身樽前強作忘情醉鏡裡俄看老鬢新昨夜夢歸江上路臨風髙振客衣塵奉和少師端午日賜宴詩韻時同纂修羣書於文淵閣下位列台階五福昌憐才多見進賢良詔編簡册興文教宴錫蒲觴被寵光雅量容人皆感德新詩對客即成章鮿生展拜嗟何晚四海聲名久播芳功勳尤喜晚年成出語常令四座驚重望固應居國老謙光猶復禮儒生彤庭宴罷看儀鳳黃閣詩成聽禁鶯况是太平無事日纂修羣籍贊文明和陳仲明逰茅山詩陳善醫目號慧泉希夷生愛覔仙蹤采藥華陽洞口風幽徑草香曽宿麝古潭雲暖舊藏龍丹成寶鼎鉛花碧籙祕琅函印篆紅歸到人間施妙術每令昏瞀豁雙瞳送僧瑀楚南住靈巖寺分題得披雲臺古寺香臺客到稀間雲無伴待師歸霏霏偏解護禪榻片片寧堪補衲衣舒卷任緣那有礙去留無著總忘機講時應有神龍聽化作遙天法雨飛分題得彭蠡湖送施員外之南康太守天開一鑑列雲屏相去南康里許程夜靜灘聲喧郡郭日長波影動簷楹聨翩鴈陳驚秋早逺近漁歌起月明簾捲黃堂吟對處君心應許共澄清間吟原來非有亦非無萬化流行共一途先要胸中存見識還須事上著工夫陽回大地和風滿影落千江片月孤得此見成消息了芳菲隨處可提壺寄示大兒默字汝言年來老境早相尋眼霧昏昏鬢雪侵仕進謀身渾斷念思歸於汝最關心生涯休厭田園薄樂事無如道義深安不忘危古今戒尋常行處索沈吟翰林夜宴分韻得隅字簮纓列坐總文儒緑蟻浮香瀉玉壺爐裊蘭薰橫鵲尾簾垂燈影見蝦鬚賡酬但覺詩情好笑語渾忘禮法拘醉裏不知春漏促梅花殘月轉城隅梅花燈緑蕚含芳剪綴成小忩寒照一枝橫韶光滿座春先到疏影當簷月共明結處任教吹玉笛看時難把插陶罌夜深吟賞渾忘倦紙帳髙眠夢亦清送劉秀才日升歸江西挈家通籍金閨步玉堂喜同三載近清光每驚得句近陶謝復見揮毫逼晉唐公宴屢分光祿酒客庖長飫大官羊到官好慰妻孥意早謝家山入帝鄉詠獨鶴仙骨昂藏難偶俗肯隨雞鶩共紛紜雲霄路杳非無侣泉石情高自不羣月下一聲來靜夜池邉孤影立斜曛有時還向空庭舞滿地書成鐵爪文楮巢為王可貞先生賦紙糊小閣扁曰楮巢林下蕭然人似鶴剡藤蒙密作幽棲高眠可當梅花帳深掩難容燕子泥忩牖透明雲影薄屋梁生白月痕低新詩不用裁成卷客到時教就壁題送金元祺之常州教授聞君典教吾邦去喜意渾忘送别情當見文風興一郡定將經術飽諸生杏壇琴靜移花影芹泮吟餘對月明况有黃堂賢太守公餘應覔鄭康成送玉林師赴會還閩中道風髙邁素知名詔率同袍上玉京梵教宣揚超古昔聖恩𢎞濟及幽明祥雲盡集瑶花舞甘露朝凝寶樹榮法會已周辭鳳闕浮杯南去海波平挽彭秀才敘古一疾如何便永違都門秋色慘斜暉鄉人驚報哀音去老父來收旅櫬歸别夢尚能聨几硯返魂應解訪庭幃至今館下多殘翰每見征人淚滿衣夀王吉士雙親階下芝蘭綵服鮮堂前旬中重開筵尊翁夀旦中秋後阿母生朝九月前椿樹倚雲涼氣好萱花迎日曉光妍賢郎近住瀛洲上眷屬應知總是仙分翠軒為𢎞道賦翟𢎞道任寧府教授鄰舍屋頭多種竹知君庭下不須移月斜送影來虛牖雨後行鞭過短籬一榻清風難獨賞兩家幽致共相宜余今亦有王猷癖直造寧論主者誰新居近搆行窩殊可愛短籬蓬屋小忩紗休言暫住非真宅偶得安居即是家雨過近移官寺竹春來唯欠故園花落成不待賓朋賀新水銅瓶自煮茶送王知州復任政績喜聞居上考宦情添得鬢毛斑一樽又向江頭别五馬重看海外還瘴霧未收天欲雨颶風初起浪如山休言南徼王畿逺文教于今被百蠻送卓逸民歸浙東迎養每愧空林反哺鴉庭闈迢遞日西斜暫歸鄉里翻如客久住京華即是家珍味可嘗光祿饌忘憂還種北堂花安輿催上休遲滯書法須君考謬差和韻贈徐子銘忘形不覺往來頻况復情懷久更真稍與遲留常抵暮縱無酣飲自生春樓前夜色千門月簾外風光九陌塵滿眼長安名利客如君蕭灑是何人雨夜宿實上人山房因題于竹石圖竹忩清夜聽風雨蒲座同僧對一燈自笑身形癯似鶴誰知心事冷如氷茅庵近漏牽蘿補茶鼎將枯汲澗增明日天晴過湖去雲山煙樹繞平陵梁不移先生以詩示其子修撰用次其韻二子潛混渺渺白雲天一隅賢郎瞻望久離居宦遊雖念道途逺親老肯教音問疏椿桂同芳多雨露芝蘭交映繞階除緘題新句來京國應向晴忩手自書居處高間體自安襟懷誰得似君寬鄰家酒熟邀春社釣艇魚來共曉餐草色池塘看細雨杏花簾幕動輕寒賢郎近得緘題至對客時時一展看楮窩玉堂詞客行窩好繞榻渾將繭紙糊皓彩透明真月窟紅塵懸隔擬氷壺最宜就壁題篇什不必圍屏寫畫圖賓退隨教掩忩户春時唯恐燕泥汙挽楊諭德尊翁世難一生多索莫唯將古道樂丘園家庭不獨稱純孝盜賊猶能感片言三徑草荒飛夢蝶孤墳松老慘啼猿只今有子逢昭代光顯應知慰九原長蘆道中晚眺聞明日駕至德州漠漠長堤起暮煙煙深茅屋數家連燈前人賣當壚酒月下牛牽上水船官栁蕭條霜落後鄉山迢遞鴈歸先明朝應候鑾輿近五色龍光動九天德州早行遇雨陸路南來第一程曉煙寒樹廣川城僕夫隱隱隨車逺官騎蕭蕭冒雨行野店杯盤多旅况客途風物總詩情馳驅不覺天將晚喜見殷勤驛吏迎挽盛進士衍姓字登科病已纒忽聞長逝益增憐恩榮才製新袍笏志業空遺舊簡編丹旐西風秋色裏白楊孤冢暮雲邊為言堂上休悲戚恐逐修文在九泉靜趣軒為顧德潤題竹樹隂森映短牆蕭然絶俗似僧房出城相去路三里閉户獨眠書半牀風暖林花飄几席雨晴沙鳥入池塘慚余擾擾紅塵客到此猶能百慮忘哭亡兄十年逰宦滯京畿幾度緘題問我歸骨肉本期常會合音容誰料永分違風飄花蕚鵑聲切雨暗關河鴈影稀聞説今朝臨葬日淚痕空滿客邊衣五月一日欽蒙賜扇上有古人嘉言皆當今名翰伏讀之餘喜而賦此新扇初頒拜寵光格言名翰玉成行一時暑氣都驅却四海仁風得奉揚皓彩照人如月樣微涼拂鬢有天香菲材自愧渾無補喜覩南薰物阜康和吳中書閣老韻均班列鵷鸞肅羽儀恩頒新扇曉光熹才臨北闕瞻天拜便覺南薰遍地吹在手敢忘君父德省心常佩聖賢辭鳳池閣老能詩客有倡佳章紀盛時題江雨軒為耦武孟作諱桓江上軒居晴固好雨中風致更相宜秋聲滿屋隱書几爽氣一簾傾酒巵渺渺莎汀飛鷺下冥冥雲浪去帆遲諸孫涼夜親燈火絶勝旅篷愁聽時逰神樂觀期耦君武孟不至明日耦君有詩見寄遂用韻答之退直乘間暫出城岧嶤仙觀壯神京壇邊人擁青鸞帚花外誰調彩鳳笙齋殿風微香馥郁醴泉雲冷鑑澄清題詩無限登臨興獨欠君來未暢情代作送大學士黃靜菴先生拜封歸永嘉賢郎祿養正宜留底事匆匆買去舟世澤共推家學在榮封重沐聖恩優一帆煙水離京口兩岸雲山過越州遙想到家秋正好親朋詩酒樂林丘送石憲使中美之四川持斧逺臨西蜀去繡衣榮作外臺臣威行一道霜風肅恩被重霄雨露新劍閣山川當嵗晚錦城花栁待陽春驅馳好叱王尊馭聖主深懷在逺人别蓬庵染翰年年直禁闈此身生計未應微慣聽風雨蓬為屋小鑿池塘竹映扉在客亦知聊暫泊出門那忍遽相違山靈不用移文誚滋味依然一布衣扈從出京二月陽和駕北巡兩京佳氣藹晴旻寰瀛共仰乾坤大草木均霑雨露春仗簇五雲常捧日兵嚴萬騎不驚塵菲材自愧渾無賴載筆叨榮列從臣二月九日瞻望大駕渡江作風送龍舟正落潮山形盤踞鬱岧嶤帝圖久已超三代王氣何曽數六朝檣櫓中流江路迥旌旗夾岸海天遙只今萬國歌遊豫不獨康衢稚子謡夜次淮安西關獨客微吟夜不眠官航初换宿淮堧煙深燈火津橋市月下帆檣賈客船千里河流長不息兩城更鼓互相傳含情未得詢陳迹韓信祠荒草滿阡曉入清河舟中眺望風帆曉入清河口野岸晴飛白鳥羣水入淮流千里合路通齊地一支分馳心輦下常看日回首江東已隔雲試問縣樓應不逺夜來更鼓月中聞江行得便風快甚民望索詩遂賦舟泛長江一葦輕棹歌齊發浪花生才看帆腹添風力便覺船頭響澗聲涉逺底須登陸路憑虛真欲上蒼冥題詩為報偕行客同是鵾鵬十萬程寄京師諸友法駕時巡出紫宸從行猶及布衣臣驅馳不覺離情逺感激惟知寵渥新鄉信到時應嵗晚征途隨處逐陽春兩京宫闕遙相望雲樹沉沉入夢頻登劍臺望京華作一上高臺首重回五雲何處是蓬萊帆隨鴈影天邊去人共春光日下來淮甸煙銷平似掌河流氷泮碧於苔翠華行幸應非逺佳氣氤氲繞上台寄同舍余彥行鄉友髫年交誼在鄉閭老大京華共客居分手又經千里逺對牀空憶兩年餘春風禁苑鶯聲早暮雨關河鴈影疏聚散人生那可料平安須用託緘書夜泊徐州樓船今夜宿彭城楚漢當時此戰爭帝業定知歸有道兵家尤忌出無名廢興舊迹餘山色今古流年逐水聲感慨獨吟眠未得忍看孤月照人明王舍人詩集卷四
