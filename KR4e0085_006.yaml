body:
  text: 王孟端小傳孟端諱紱常之無錫人自少志氣高逸讀書工古歌詩嘗北遊江淮浮黃河踰太行出鴈門往來晉代之間周覽形勝輒感慨弔古徘徊不能去一時聞人慕其名爭延致之及觀其氣貌瓌岸議論踔厲益加器重久之不樂歸江南隱居九龍山中詠左太沖詩曰何必絲與竹山水有清音若將有終焉之志自號曰九龍山人永樂中有以能書薦者徴入翰林擢為中書舍人嘗自以蒙上厚恩拔自山澤與羣賢並仕職任書札愧不能報稱慨然曰書必如古人庶可名世傳後報萬分一於是知孟端非徒隱者固將有以見諸世也尤工畫山水竹石每酒酣對賔客著黃冠服意氣傲然伸紙攘袂揮灑竒怪跌宕不可名狀畫已徐吟五字詩蕭然有風人之致然不可意者雖豪貴不肯與或就之至閉門不納人問之曰丈夫在所處輕者茍且如此重者將何以哉士益以此高之平居急朋友好賔客不計家有無然是是非非不茍隨俗俯仰雖見嫉惡不顧丙申春正月卧病北京寓舍朋友日問致醫藥疾革語所知者曰生死如夜旦所貴此心不昧耳奄然而逝年五十有五君子惜之錢唐王洪曰始豫遊四方聞江湖間稱孟端名藉甚及識孟端觀其為人乃知得此聲豈虛哉孟端以布衣薄遊無所遇晚以能書薦遂登青雲顯名侍從間可謂遭逢其時至負其藝能非其人不與迹其志殆不可以勢利動哉世多稱其才安知其中有卓然者吾是以為之傳焉永樂十四年春二月草五日翰林修撰王洪著故中書舍人孟端王公行狀公諱紱字孟端世居常州無錫縣某里祖某父某皆隱居不仕樂善好義歷世相承而厥後克昌焉公生而貌岐嶷性敏慧甫髫齔矩度若老成人出言中節恂恂有禮十歲能屬詩早喪母夫人貝氏哀毁幾滅性及成人充縣庠弟子員尋以事免歸乃偃息九龍山中味泉石以為樂嘗偕其大夫士三五輩或臨流或登高意氣雋邁襟懷蕭爽故自號九龍山人尤嗜繪畫不由師授而卓絶過人遊覽之頃每遇長廊素壁索酒飲滿數觴縱橫揮灑若不經意至則層巒疊嶂煙雲浩渺不可測其端倪或輒題其上至百千言咸若宿所搆者自是聲譽益重而求之者益繁甚有投金帛而購其片楮者公則拂袖而興未嘗少頷焉其或山林之士盡一揖之誠卒與之無靳色洪武戊午徴天下罷間弟子員登其能者仍授以官公亦與焉未幾以事纍謫戍山西朔州公雖在戎旅間布衣韋帶意氣自若內無搖奪之心外無沮餒之色不自知其為謫戍也主守者知其賢亦加優禮無何籍其養子以代之既而歸鄉里隱居教授孜孜訓誨子弟率多賔興永樂初聖天子務隆養賢之道詔求天下文章之士洎善書者各二十八人登文淵閣以被選一時執政大臣首以薦公繼至者彬彬焉十年三月甲子拜中書舍人明年大駕巡狩北京命所司遴選英髦之士以備扈從時公在選列合同行者十有二人簮纓黼黻前後相望賡歌宴賞悉皆俊乂進退起居光賁隆極噫可謂榮矣今年春以病卒於官舍實二月初六日也嗚呼痛哉其在病革朋友咸相視而泣顧謂公曰子脫有不幸當以身後事囑我公曰余生平無愧俱無可言者但忠君之事未盡實天地間罪人也復何言為語畢而絶公生於壬寅五月某日享年五十有五娶趙氏早卒子男二人長曰默娶趙氏次曰恆娶吳氏女某適同里某氏孫男若干人側室尹氏生女一曰某今以某月日歸葬於某山之原公在生時性倜儻有卓犖不羈之才寡交接重然諾然好讜言不匿人過人有一善必稱之一惡必斥之正顔極論不憚權貴或詆其太過則曰箭在弦上不得不發其峭直類如此身在顯宦常有煙霞丘壑之想每論及乘肩輿登惠山煮茗僧房留連日夕之事則風采頓發昂肩竦背若馮高眺逺之狀至於聲利浮靡之事則淡然不以芥於中論他事亦皆脫略頴悟必先名節大體不以死生榮辱為心尤好黃老清虛之術及佛氏之學亦皆闖其奧窔然以名教自尊故一染指而不為其纍也少習右軍書小楷尤精所作古詩類韋柳律詩類晚唐詞語婉媚馳騁於世所畫山水竹石古今罕儔至於器識之高又有逾於斯數者惜乎未底大用以觀其藴止乎此而已矣嗚呼傷哉僕與公皆吳下人相去僅百里雖後公十歲生幼嘗識公於京師又同事翰林十有餘年出入起居未始或先後也間嘗謂余曰羣輩中惟子頗知我我死後子當為我作行狀必得其詳余未及諾而果符其言豈偶然哉公之潛德固多不能窺其萬一斯特述其梗概用告於立言君子冀發揮以傳諸不泯云永樂十四年三月二十日徴事郎中書舍人章昞如狀徴事郎中書舍人王孟端墓表永樂丙申春二月初六日中書舍人王孟端以疾殁於北京之官舍其子默卜是年十一月日以其柩歸葬於龍山之原其友翰林修撰沈度偕其同寮中書舍人許鳴鶴朱孔易朱暉章昞如張侗陳宗淵龎敘沈粲合辭請於豫曰孟端死其友太醫院御醫趙友同既為之銘埋諸幽者有託矣而表於外者無文足下知孟端者宜賜一言使其有知無恨於地下矣豫與孟端交十四五年相知有素孟端殁既哭之又祭之以文而墓石之辭豫焉得而靳孟端諱紱字孟端以字行毗陵之無錫人曾祖某祖某父某母某氏孟端幼頴敏稍長好學入鄉校為弟子員治經習舉子業既數竒連遭困頓即棄去放迹江湖間越太行上巴蜀歷名勝探古迹以蓄其竒氣縱情於詩酒交結名士所遊皆公卿貴人無不敬愛尤善真行書筆法出入晉唐間律詩學大歷諸才子時有警句間戲墨為山水竹石用意高古超然無俗韻人往往作意求之或經數歲不能得一筆偶遇適興連掃數幅不辭精妙入神態度橫出或就題詩於上以發其魁壘之氣語皆竒特觀者莫不跌足驚喜而孟端亦不自知其至此也然每欲祕之不欲人知嘗投筆痛恨曰誤為此也雅好博古於諸書皆搜獵至於釋老之學亦闖其閫奧聖天子即位之初詔求善書者侍從之臣首以孟端為薦命習書中祕集天下能書者得十餘人日臨諸帖必求至古人乃己巳皆稱旨永樂十年皆除為中書舍人凡制敕機密悉委書之兩扈從北京與有榮遇一日偶得疾才數日即不起矣病革朋友視之問之曰有何言從容曰無可言者但負君恩未報耳又問再有何言指其心曰此中甚分明無可言者翊日翛然而逝孟端性介直不能容物人有忤之者胸中勃勃不平即靣折之以是與人寡諧退求其中不留也然襟懷灑落神情曠逸宛然如晉宋間人每退朝家居黃冠野服望之蕭然有林下風靜坐一室焚香煮茗怡然自得遇客至即呼酒傾倒及其殁也人皆惜之生故元至正壬寅五月日得年五十有五娶趙氏先卒子二人默恆女二人長適趙其幼闕出有詩集若干卷豫表於其墓曰嗟乎孟端負傑然之才剛毅之氣所蓄者固有兼人之長而早遇偃蹇困踣蓋天所以老其才而為今日之用也何嗇其年而遽奪之速耶抑其命止於斯耶嗟乎孟端官為侍從顯登清要不為不幸矣視彼老死山林而無所稱道者相距懸絶茍使孟端無可稱述雖過百齡何益是以君子不可不勉於為善有如孟端者名附不朽固無所憾特惜其死求若斯人者少也遂寫豫之所以知孟端者以哀之於無窮且以慰其寮友之思焉翰林學士奉政大夫兼左春坊大學士廬陵胡廣撰附録
