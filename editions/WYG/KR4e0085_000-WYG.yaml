body:
  text: 王舍人詩集别集類五明提要臣等謹案王舍人詩集五巻明王紱撰紱字孟端無錫人别號友石生又曰九龍山人洪武中徴至京師尋坐累戍朔州永樂初用薦以善書供事文淵閣乆之除中書舍人卒於官事跡具明史文苑傳集為其子黙所編又名友石山房稿前有曾棨王進序後附章昞如胡廣等所作行狀墓表紱博學工書畫所作山水竹石風韻瀟灑妙絶一時説者謂可繼其鄉倪瓉其詩雖結體稍弱而清雅有餘葢其神思本清故雖長篇短什隨意濡染不盡計其工拙而擺落塵氛自然合度周亮工書影曰王紱詩畫䨇羙近見其詩集百餘篇聱律不在髙楊張徐之亞如舊業暫歸翻似客異鄉重到即為家通仙要得懸壺術遺世聊存荷鍤風草色池塘㸔細雨杏花簾幕動輕寒鄰家酒熟邀春社釣艇魚来助曉餐鳥従萬木陰中響人在亂山深處行皆對偶精工意新而調逸絶句題靜樂軒云前溪氷泮緑生波好雨催花向晚過宿酒未醒眠未起半忩紅日鳥聱多竹几籐床小硯屛薰風簾幕篆烟青間齋㡬日黄梅雨添得芭蕉緑滿庭秋聱早已到梧桐露氣凉生湛碧空獨倚闌干待明月紫簫吹散玉樨風斗帳藏春日醉眠靜中惟與懶相便尋常甲子無心記㸔得梅花又一年又畫竹寄友云我昔尋君扣竹扉醉中曾寫竹間詩别来㡬度空相憶多在青燈聴雨時不獨筆墨工竹石而已此孟端之畫所以貴重於後世也葢其集傳本頗稀故亮工錄其佳句存之其品題頗允至都穆南濠詩話獨稱寄别娶婦者一絶則傖父面目不足以見紱之長矣乾隆四十五年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀王舎人詩集原序故中書舎人毘陵王君孟端自少以聰敏聞好讀書喜吟詠尤工山水墨竹中更多故厄窮連蹇於羈旅道路之間者十有餘年其後乃用薦以善書選入翰林者又十餘年始得拜官未幾遂以疾殁於北京之官舎嗚呼其命矣夫君為人負氣節狀貌竒偉襟懷灑落其平生於人無所屈雖工扵畫遇知己輒縱筆揮灑無所恡徃徃至於入神造妙有不可於意或非其人輒白眼相視至詬詈弗顧其為詩觸景撫事即形之於言隨其興之所至情之所發初不計其工拙而自合矩度其所著凡若干篇君没若干年其長子陰陽訓術黙持以至京師請余為序嗟夫詩之道大矣以其時之髙下世之治亂而音調見焉是豈細故也哉古之人常因此以觀世道尚矣君之生也幸際國家無事泰平之時以得有官於朝假之以年則其惕厲奮發於和平之音以鳴當世之盛者宜何如其至耶惜其僅止於此也君諱紱孟端其字其别號曰友石生又曰九龍山人云永樂二十年壬寅秋七月下澣翰林侍讀學士奉訓大夫兼修國史廬陵曽棨書士君子以一長擅名於世必其苦心焦思用志不分乃能超出凡庸而造夫㣲妙其有不經思慮而竒絶卓異者則又天資之美學力之至而非偶然也無錫王君孟端自㓜負瑰偉之材遊學邑庠時鄉之先進若四輔官周士平侍讀學士王達善長史錢仲益教諭吕志學引禮舎人浦長源輩皆以詩著名於時孟端窮經之暇每相過從倡酬賡和甚為諸公所稱許尤善於繪事長江逺山叢篁怪石隨意所適無不妙絶字書深得鍾王筆意雖兼衆長然當揮灑吟詠之際援毫立就未嘗見其凝滯也後被逮屏處邊陲十有餘年而寓物寫懷發於詞翰意趣益工以知者薦授中書舎人玉堂儒碩咸器重之永樂丙申以疾卒于官舎其子黙裒輯遺藳得詩若干首彚次成帙題曰友石先生詩集將壽諸梓求余序之余自弱冠與孟端交處雖中更契闊後復同仕朝著情好尤深今孟端不可復作有子表章其所著述以傳於久逺可謂能繼志者矣茲承其請寧可以蕪陋辭余聞詩以理性情貴乎温厚和平固不以葩藻富麗為尚也今觀集中長篇短章舂容爾雅無斧鑿痕而理趣兼至盖其心志坦夷故詞語渾成而不假於琱琢也然非學識之超邁曷能臻於此哉孟端名紱友石盖其别號云洪熈元年龍集乙巳仲春朔日翰林院侍講承直郎吳門王進汝嘉書
