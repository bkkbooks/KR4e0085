塵隨處漫容身樽前强作忘情醉鏡裡俄看老髩新昨夜夢歸江上路臨風髙振客衣塵奉和少師端午日賜宴詩韻時同纂修羣書於文淵閣下位列台階五福昌憐才多見進賢良詔編簡册興文教宴錫蒲觴被寵光雅量容人皆感徳新詩對客即成章鮿生展拜嗟何晚四海聲名久播芳功勲尤喜晚年成出語常令四座驚重望固應居國老謙光猶復禮儒生彤庭宴罷看儀鳳黄閣詩成聽禁鶯况是太平無事日纂修羣籍賛文明和陳仲明逰茅山詩陳善醫目號慧泉希夷生愛覔仙蹤采藥華陽洞口風幽徑草香曽宿麝古潭雲暖舊藏龍丹成寶鼎鉛花碧籙秘琅函印篆紅歸到人間施妙術每令昬瞀豁雙瞳送僧瑀楚南住靈巖寺分題得披雲臺古寺香臺客到稀閒雲無伴待師歸霏霏偏解䕶禪榻片片寧堪補衲衣舒巻任緣那有礙去留無著摠忘機講時應有神龍聽化作遥天法雨飛分題得彭蠡湖送施員外之南康太守天開一鑑列雲屏相去南康里許程夜靜灘聲喧郡郭日長波影動簷楹聨翩鴈陣驚秋早逺近漁歌起月明簾捲黄堂吟對處君心應許共澄清閒吟原來非有亦非無萬化流行共一途先要胸中存見識還湏事上著工夫陽回大地和風滿影落千江片月孤得此見成消息了芳菲隨處可提壺寄示大兒黙字汝言年來老境早相尋眼霧昬昬髩雪侵仕進謀身渾斷念思歸於汝最闗心生涯休厭田園薄樂事無如道義深安不忘危古今戒尋常行處索沈吟翰林夜讌分韻得隅字簮纓列坐總文儒緑蟻浮香瀉玉壺爐裊蘭薰横鵲尾簾垂燈影見蝦鬚賡酬但覺詩情好笑語渾忘禮法拘醉裏不知春漏促梅花殘月轉城隅梅花燈緑蕚含芳剪綴成小忩寒照一枝横韶光滿座春先到疎影當簷月共明結處任教吹玉笛看時難把挿陶罌夜深吟賞渾忘倦紙帳髙眠夢亦清送劉秀才日昇歸江西挈家通籍金閨歩玉堂喜同三載近清光每驚得句近陶謝復見揮毫逼晉唐公讌屢分光祿酒客庖長飫大官羊到官好慰妻孥意早謝家山入帝鄉詠獨鶴仙骨昂藏難偶俗肯隨鷄鶩共紛紜雲霄路杳非無侣泉石情高自不羣月下一聲來靜夜池邉孤影立斜曛有時還向空庭舞滿地書成銕爪文楮巢為王可貞先生賦紙糊小閣扁曰楮巢林下蕭然人似鶴剡藤䝉密作幽棲高眠可當梅花帳深掩難容燕子泥忩牖透明雲影薄屋梁生白月痕低新詩不用裁成巻客到時教就壁題送金元祺之常州教授聞君典教吾邦去喜意渾忘送别情當見文風興一郡定將經術飽諸生杏壇琴靜移花影芹泮吟餘對月明况有黄堂賢太守公餘應覔鄭康成送玉林師赴㑹還閩中道風髙邁素知名詔率同袍上玉京梵教宣揚超古昔聖恩𢎞濟及幽明祥雲盡集瑶花舞甘露朝凝寶樹榮法㑹已周辭鳳闕浮杯南去海波平挽彭秀才叙古一疾如何便永違都門秋色慘斜暉鄉人驚報哀音去老父來收旅櫬歸别夢尚能聨几硯返魂應解訪庭幃至今館下多殘翰每見征人淚滿衣夀王吉士雙親階下芝蘭綵服鮮堂前旬中重開筵尊翁夀旦中秋後阿母生朝九月前椿樹倚雲涼氣好萱花迎日暁光妍賢郎近住瀛洲上眷属應知摠是仙分翠軒為𢎞道賦翟𢎞道任寜府教授隣舎屋頭多種竹知君庭下不湏移月斜送影來虚牖雨後行鞭過短籬一榻清風難獨賞兩家幽致共相宜余今亦有王猷癖直造寧論主者誰新居近搆行窩殊可愛短籬蓬屋小忩紗休言蹔住非真宅偶得安居即是家雨過近移官寺竹春來唯欠故園花落成不待賓朋賀新水銅瓶自煮茶送王知州復任政績喜聞居上考宦情添得髩毛斑一樽又向江頭别五馬重看海外還瘴霧未収天欲雨颶風初起浪如山休言南徼王畿逺文教于今被百蠻送卓逸民歸淛東迎養每愧空林反哺鴉庭闈迢逓日西斜蹔歸鄉里翻如客久住京華即是家珎味可嘗光祿饌忘憂還種北堂花安輿催上休遲滯書法湏君攷謬差和韻贈徐子銘忘形不覺往來頻况復情懐久更真稍與遲留常抵暮縱無酣飲自生春樓前夜色千門月簾外風光九陌塵滿眼長安名利客如君蕭洒是何人雨夜宿實上人山房因題于竹石圖竹忩清夜聽風雨蒲座同僧對一燈自笑身形癯似鶴誰知心事冷如氷茅庵近漏牽蘿補茶鼎將枯汲澗増明日天晴過湖去雲山烟樹繞平陵梁不移先生以詩示其子修撰用次其韻二子潛混𣺌𣺌白雲天一隅賢郎瞻望久離居宦遊雖念道途逺親老肯教音問疎椿桂同芳多雨露芝蘭交映繞階除緘題新句來京國應向晴忩手自書居處高閒體自安襟懐誰得似君寛隣家酒熟邀春社釣艇魚來共暁飡草色池塘看細雨杏花簾幙動輕寒賢郎近得緘題至對客時時一展看楮窩玉堂詞客行窩好繞榻渾將繭紙糊皓彩透明真月窟紅塵懸隔擬氷壺最宜就壁題篇什不必圍屏寫畫圖賓退隨教掩忩户春時唯恐燕泥汙挽楊諭徳尊翁世難一生多索莫唯將古道樂丘園家庭不獨稱純孝盜賊猶能感片言三徑草荒飛夢蝶孤墳松老慘啼猿只今有子逢昭代光顯應知慰九原長蘆道中晚眺聞明日駕至徳州漠漠長堤起暮烟烟深茅屋數家連燈前人賣當壚酒月下牛牽上水船官栁蕭條霜落後鄉山迢逓鴈歸先明朝應候鑾輿近五色龍光動九天徳州早行遇雨陸路南來第一程暁烟寒樹廣川城僕夫隠隠隨車逺官騎蕭蕭冐雨行野店杯盤多旅况客途風物總詩情馳驅不覺天將晚喜見殷勤驛吏迎挽盛進士衍姓字登科病已纒忽聞長逝益増憐恩榮纔製新袍笏志業空遺舊簡編丹旐西風秋色裏白楊孤塚暮雲邊為言堂上休悲慽恐逐修文在九泉靜趣軒為顧徳潤題竹樹隂森映短􅉹蕭然絶俗似僧房出城相去路三里閉户獨眠書半牀風暖林花飄几席雨晴沙鳥入池塘慚余擾擾紅塵客到此猶能百慮忘哭亡兄十年逰宦滯京畿㡬度緘題問我歸骨肉本期常㑹合音容誰料永分違風飄花蕚鵑聲切雨暗闗河鴈影稀聞説今朝臨塟日淚痕空滿客邊衣五月一日欽䝉賜扇上有古人嘉言皆當今名翰伏讀之餘喜而賦此新扇初頒拜寵光格言名翰玉成行一時暑氣都驅却四海仁風得奉揚皓彩照人如月様微涼拂髩有天香菲材自愧渾無補喜覩南薰物阜康和吳中書閣老韻均班列鵷鸞肅羽儀恩頒新扇暁光熹纔臨北闕瞻天拜便覺南薰遍地吹在手敢忘君父徳省心常佩聖賢辭鳳池閣老能詩客有倡佳章紀盛時題江雨軒為耦武孟作諱桓江上軒居晴固好雨中風致更相宜秋聲滿屋隠書几爽氣一簾傾酒巵𣺌𣺌莎汀飛鷺下冥冥雲浪去帆遲諸孫涼夜親燈火絶勝旅篷愁聽時逰神樂觀期耦君武孟不至明日耦君有詩見寄遂用韻答之退直乘閒蹔出城岧嶤仙觀壯神京壇邊人擁青鸞帚花外誰調彩鳳笙齋殿風微香馥郁醴泉雲冷鑑澄清題詩無限登臨興獨欠君來未暢情代作送大學士黄靜菴先生拜封歸永嘉賢郎祿養正宜留底事匆匆買去舟世澤共推家學在榮封重沐聖恩優一帆烟水離京口兩㟁雲山過越州遥想到家秋正好親朋詩酒樂林丘送石憲使中美之四川持斧逺臨西蜀去繡衣榮作外臺臣威行一道霜風肅恩被重霄雨露新劍閣山川當嵗晚錦城花栁待陽春驅馳好叱王尊馭聖主深懐在逺人别蓬庵染翰年年直禁闈此身生計未應㣲慣聽風雨蓬為屋小鑿池塘竹映扉在客亦知聊蹔泊出門那忍遽相違山靈不用移文誚滋味依然一布衣扈從出京二月陽和駕北巡兩京佳氣藹晴旻寰瀛共仰乾坤大草木均霑雨露春仗簇五雲常捧日兵嚴萬騎不驚塵菲材自愧渾無賴載筆叨榮列從臣二月九日瞻望大駕渡江作風送龍舟正落潮山形盤踞鬱岧嶤帝圖久已超三代王氣何曽數六朝檣櫓中流江路迥旌旗夾㟁海天遥只今萬國歌遊豫不獨康衢稚子謡夜次淮安西闗獨客㣲吟夜不眠官航初换宿淮堧烟深燈火津橋市月下帆檣賈客船千里河流長不息兩城更鼓互相傳含情未得詢陳跡韓信祠荒草滿阡暁入清河舟中眺望風帆暁入清河口野㟁晴飛白鳥羣水入淮流千里合路通齊地一支分馳心輦下常看日回首江東已隔雲試問縣樓應不逺夜來更鼓月中聞江行得便風快甚民望索詩遂賦舟泛長江一葦輕棹歌齊發浪花生纔看帆腹添風力便覺船頭響磵聲涉逺底湏登陸路凴虚真欲上蒼冥題詩為報偕行客同是鵾鵬十萬程寄京師諸友法駕時巡出紫宸從行猶及布衣臣驅馳不覺離情逺感激惟知寵渥新鄉信到時應嵗晚征途隨處逐陽春兩京宫闕遥相望雲樹沉沉入夢頻登劍臺望京華作一上高臺首重回五雲何處是蓬萊帆隨鴈影天邊去人共春光日下來淮甸煙銷平似掌河流氷泮碧於苔翠華行幸應非逺佳氣氤氲繞上台寄同舎余彦行鄉友髫年交誼在鄉閭老大京華共客居分手又經千里逺對牀空憶兩年餘春風禁苑鶯聲早暮雨闗河鴈影疎聚散人生那可料平安湏用託緘書夜泊徐州樓船今夜宿彭城楚漢當時此戰爭帝業定知歸有道兵家尤忌出無名廢興舊跡餘山色今古流年逐水聲感慨獨吟眠未得忍看孤月照人明王舎人詩集巻四
