body:
  text: 王舎人詩集巻四明王紱撰送倪知縣克明服闋赴京峻兵科都給事中卒年六十三解綬歸來廬墓側俄然三載廢鳴琴哀情那盡思親淚壯志難忘報國心馬識京塵嘶晚道人經官驛聽秋砧恩榮不日除書下好為林泉早寄音題蔡教諭先生鶴塜卷名允昇三衢人琴罷杏壇長自舞蹁躚何遽永相違漫追坡老舟中夢誰復丁仙海上歸聲斷夜忩松月在跡存春逕雨苔㣲空留泮水蕭蕭塜落日凄風鳥雀飛夀雪洲夏權字叔度松江府判官仲實之孫上海縣主簿師顔之子母趙氏旌表節婦半百纔過一載餘髩鬚如漆美簮裾富將詩禮傳先業老向田園樂隠居椿桂隂森環第宅芝蘭萌茁滿堦除况聞賢母氷霜操千古名傳太史書過趙徵君文鼎隠居其先世宋宗室趙状元之七世孫諱鉉號雪坡只今誰識舊王孫高隠澄江郭外村宗室世傳家譜在狀元坊建鼎魁存清秋山色横當檻靜夜潮痕直到門擬得初春重相過索嘗新酒薦河豚酬華樗林見寄韻寅可字汝翼可笑先生七十餘年時宿習未能除閒身寂寞難忘酒老眼昏花不廢書半榻秋聲吟細細一樽燈影髩疎疎幾畨欲得相㝷去尚恐嫌人識隠居送楊昻從戍諱䋲字徳昂號静約溪口停橈别故人臨行不覺淚沾巾一身囊槖親同旅滿眼松楸託近鄰蠻洞暁雲晴復雨瘴鄉冬日暖如春于今聖主多恩澤久屈應知漸可伸留别雪洲東屏地好况聞名習禮參差髙第映喬柯偶來為客住因久漸喜居人識較多春暖壺觴陪燕集秋清簾幙聽絃歌無端漫復西遊去主意勤惓奈若何夜宿丹陽道中行李出門纔兩日離情無那便思家初從異縣登平陸又下輕舟上小車客路晚來投旅店鄉音日復近京華不眠苦被詩情惱吟落寒燈一穗花宿天界寺用石庵逰恵山詩韻木落空山古寺秋尋僧聊遣世間愁塵勞似海何時了蹤跡如萍著處浮對榻暫同林下宿煑茶閒引磵邊遊明朝又欲飄然去一幅輕帆過石頭謝慶夀寺長老恵線香挿向薰爐玉筯圓當軒懸處瘦藤牽纔焚頓覺塵氛逺初製應知品料全餘地每延孤館月微風時颺一絲煙感師分恵非無意鼻觀令人悟入𤣥歌風臺黄屋初乘入故鄉悲風曽此醉壺觴固知有國因三傑復恐無人守四方豐沛到今何寂寞風雲終古自飛揚荒臺獨上追陳迹空見殘碑傍夕陽元日早朝七年從事玉堂閒又值新正立暁班夾道旌旗嚴五輅充庭犀貝雜諸蠻和風暖入承眀殿瑞靄晴開萬嵗山聖代信然無隠者布衣都得拜天顏和錢博士先生除夕感懐韻仲益京華住久客囊殫對影蕭然守嵗闌酒浸屠蘇憐獨飲盤堆苜蓿共誰飱家山夣在相思切心事逢人欲説難年復一年多白髪駐顔何處覔金丹觀大祀雲漢昭回月正中聖君嚴祀答蒼穹冕旒肅肅威儀盛玉帛煌煌典禮崇鹵簿香飄凝瑞靄簫韶聲奏度祥風百神咸格宸衷喜願祝繁釐萬國同除夕有感坐擁寒爐夜不眠漏聲聽徹欲朝天但知舊嵗逢新嵗不覺中年又晚年斗轉正臨丹闕近春囘應自上林先幸當昭代慚無補獨立東風思惘然送朱叔服還江西寫送别圖并詩於上栁拂東風弄暁寒送君沽酒出長干閒身已遂還家樂直道方知處世難雲盡匡廬山色好雪消彭蠡水容寛離情一段歸圖畫留取相思别後看送張副使赴四川憲司憲節遥臨白帝城聖心欲慰逺民情豺狼退伏霜威勁鵰鶚髙摶海宇清劍閣日斜驄馬驟錦江春好繡衣眀遥知到日循行處父老歡呼夾道迎寄題住長老萬竹深處萬竿森立翠交加蒼雪紛如天雨花風度微凉侵貝葉月明清影覆袈裟林深燈暝時聞磬逕裡煙生自煑茶何日相過參玉版禪闗尤恐碧雲遮牡丹魏紫姚黄取次栽清和將近始花開羣芳任意參前去國色多情殿後來簾外日高施帳幄酒邉風暖醉亭臺東君賦予何多也無限繁華獨占魁梧桐近種髙梧金井旁重重如盖映彫墻豈惟清廟中琴瑟佇看朝陽鳴鳳皇得地自憐承暁露知時那肯著秋霜賢侯公退鈎簾處滿院清隂白晝長送呉太僕還京鑑字徳清號性泉廬江人嵗莫金臺雨雪飛匆匆相見即相違年來每憶交遊少别後休令信息稀馬渡淮船春意早人還京闕暁光微親朋見問無多及况味依然老布衣重過小姑山不到小姑今十年望中風景尚依然廬山金削遥天外漢水緑浮飛鳥前祠下女巫鳴賽鼔沙頭津吏候官船登臨重覔舊題處崖石嵗深蘿薜牽黄鶴樓日暮江天獨倚樓樓髙凝望思悠悠仙人不見鶴不返江水自流山自秋七澤𣺌茫孤鳥度三湘寥落片雲收數聲長笛知何處懐抱不勝今古愁黄牛峽早行灘下待明船子發起來篷底尚餘酣浪花夾棹捲晴雪空翠撲人飛暁嵐勝迹登臨多自惬畏途跋涉信難諳何當長揖人間事老卧林丘頗自甘月夜過瞿塘瞿塘灔澦足風波一葉官航抵暮過峽盡頓看江路濶山開尤喜月明多圖分八陣石猶在柱鎻重闗鐵未磨惆悵英雄俱已矣令人千古獨悲歌重慶道中苦熱地近瘴鄉秋暑熱客行長日汗流顋草蒸惡氣薰人醉馬蹴飛塵撲面來望近驛樓思偃息行當山路苦縈迴虚懐漫有相如渇深愧應無作賦才夜發資縣過雨晚來凉氣好征鞍夜發肯遲留月華炤路皎如晝風葉滿山渾是秋度水柝鳴津口邏隔烟燈起驛邊樓驅馳本亦勤王事添得詩情分外幽暁過雙溪道中殘月欲低溪水明林香拂拂暁風清鳥從萬木隂中響人在亂山深處行境異自令心獨賞趣幽翻覺句難成不知蜀道幾千里一路吟哦到錦城至成都京國逺來將萬里士民歡悦共謳吟久欽西伯施仁政終見東平樂善心江帶錦城花爛漫山横劍閣樹蕭森只今宗社安如石聖念尤親九族深題杜工部浣花草堂浣花溪上草堂前想像當時思惘然髩老風塵多自感身經䘮亂復誰憐懶從江夏誇鸚鵡獨向西川拜杜鵑知己惟應有嚴武醉言何事又招愆武侯廟忠義分眀兩出師令人讀罷想當時躬耕本亦巢由志襟抱聊將管樂期魚水一時心已合風雲八陣石難移長星不使營前墜禮樂重興未可知相如駟馬橋相如辭賦擬風騷浪迹臨卭逸氣飄犢鼻豈應親滌器駟車直欲預題橋才名當世黄金重志願凌雲碧漢遥富貴如何纔滿意白頭吟裡恨偏饒酬四明王教授彬見贈韻君才堪作濟川舟愧我無能髩已秋江左家聲渾寂寞山隂宗譜尚綢繆經横絳帳崇師道裾曵金門久宦遊正恐相逢又相别玉瓶同擬醉沙頭再用韻留别西風江上促歸舟落木啼猿總是秋愧我半生多旅寓憐君一見即綢繆宦情那肯輕同志鄉語偏饒訪舊逰别後相思重回首吴雲迢逓海東頭酬廖紀善去怠贈韻文采芙蕖映碧灣令人相對意忘還官閒得俸惟酤酒公退鈎簾只看山簮筆殿頭居紀職曵裾門下出朝班思君正似仙凡隔瞻望蓬瀛弱水間再用韻留别巴渝西上幾千灣纔得停橈又促還歸路漸看京口樹吟笻難遍蜀中山黄花老我思秋逕白簡憐君綴暁班㑹别人生那中料信音湏仗往來間中秋對月皎皎氷輪對客圓客心相對兩堪憐清光此夜異常夜狂興近年非少年弟戍邊城勞别夢兒留鄉井望歸船一家骨肉分三處應共感懐多未眠送陳尚賓還靖州嗟余湖海度年華爾復飄零更可嗟舊業蹔歸翻是客異鄉重到即為家江連雲夢孤㠶逺日落衡湘斷鴈斜後夜月明何處泊相思回首各天涯舟中暁望都城有懐諸公煙深孤塔是長干路近都城望眼寛江水今無南北限山形原作虎龍蟠雲開魏闕朝陽滿月落秦淮暁色寒遥想此時天上客從容鳴珮列朝端謝恵皮墩拜恵仙墩三尺圓漆成文采瘦藤穿最宜箕踞長松下又好跏趺繡佛前四體但能安即了寸心尤覺靜相便題詩欲擬瓊瑶報坐對青燈夜不眠題贈秋林草堂圖書劍飄飄年復年感侯相見即相憐行藏只説都由已窮達寧知却在天逺塞闗河迷落日故山庭院鎖秋烟多情猿鶴應貽誚荒却當年種秫田為黄侍讀賦瑞菊淮字宗豫永嘉人諡文簡秋英特表君家瑞合蒂聨葩色更佳讓國夷齊雙節在分金管鮑兩心諧霜凝素瓣連環玉風動芳叢並股釵知是花神意加倍何妨疊日醉髙齋悼松菴性海師諱普真姓承氏惠山寺住持遷住虎丘五十八嵗示寂王學士達善撰塔銘毘陵人方外交情師最優㝷常相見即相留蒲團對坐聽松雨茶具同攜瀹磵流丈室獨存禪榻冷一燈空照影堂秋固知去住皆虚幻顧我能無感舊逰送陳指揮文懿還常徳將軍先世太丘陳功著當今號虎臣每効忠勤酬聖主久持威信服蠻人船衝官渡潮聲急馬踏京塵栁色新聞説轅門臨勝地桃花開遍武陵春寄以中家兄時聞䘮子依沈甥居客忩無事即思兄消息傳來信且驚萬里獨歸悲䘮子一身誰料老依甥田園尚足供庖廩杯酒聊將適性情安得乞閒㝷舊隠白頭相對了餘生寄錢汝容黙衣冠楚楚整容儀呉越雲仍第幾支應役最勤官府事逢人多誦鬼僊詩秫收南畆時供酒燭剪西忩夜奕棊愧我塵途歸未得衡門何日共棲遲送陳孟敷歸呉中兼簡諸友緑槐官舎澹朝暉囘首鄉山子獨歸去路秖愁梅雨滯到家應喜藥苗肥青樽舊約呼隣酒白苧新裁换客衣呉下故人如有問每慚泉石久相違送任大參勉之福建字近思號薇菴華亭人洪武甲戌進士都亭南望路迢迢仗擁雙旌引去軺官拜大參行外省人推清譽滿中朝風迴海舶珠犀集雨洗閩山瘴沴消服逺最宜恩信立佇聽嘉政播民謡題竹林下蕭然拔俗姿難隨花栁競芳時秋深風雨邀誰聽嵗晚氷霜只自知節帶粉痕龍骨蜕葉隨清影鳳毛披王猷去後髙風逺世眼相看總未宜題贈潘克誠菖蒲巻一寸雲根九節生人傳尭韮是嘉名曽聞久服身長健最喜相看眼倍眀露帶暁光珠滴瀝水涵秋影劍崢嶸題詩記得池亭上忩几無塵宿雨晴寄内弟趙叔平别來不覺又秋風歴想君家在眼中稚子情嬌初學語慈親年老近加聾新居每對千竿竹先隴應添幾尺松世業喜聞能復舊休將百萬一梟空題友竹軒朱紹善繼求文林人梅易飄零松已老此君交久更多情晚凉移榻就林影秋夜讀書來雨聲勁節豈隨時俗態虚心常結嵗寒盟王猷未必非知己直造敲門肯見迎寄鄧舜英槿號篾樓釣者素耽書法又耽詩睂宇分眀玉雪姿共樂琴樽欣有弟獨持門尸歎無兒數間茆屋風生榻千畆禾田水壊陂惆悵别來渾二載旅忩眀月幾相思寄潘克誠號蒲石年來潘髩漸成霜滿架牙籖總是方數轉曲欄通鶴逕一披低屋養花房賢郎盛暑調湯倦童子新晴晒藥忙聞説家西新買地半栽蔬果半栽桑寄余彦行璿號耐聒客邊無處寄相思交誼如君更有誰豈獨芝蘭沾我輩久將詩禮及吾兒齋前曲逕稠桑合門外横橋細栁垂鄉夢覺來猶歴歴不知何日是歸期寄古銕先生允字達可姓錢鶴髮童顔九十翁數間書屋住溪東通仙每得懸壺術遺世長思荷鍤風春暖酒醅浮甕緑夜深丹火伏爐紅别來髙致空懐仰何日從容語笑同寄徳常先生吴彝號耐辱杖藜時復到山城鶴骨清癯步履輕不是里胥催過割定因官府報開耕黄花遶徑秋霜暁紅稻登塲宿雨晴聞説近看莊子熟滿羣家鴈盡能鳴寄吕教諭先生敏字志學號無礙居士生平典教老歸休肩背龍鍾雪滿頭聖主特頒新誥勅朝臣多説舊從逰園池雨歇禽魚靜忩几秋清竹樹幽昨日有書來翰苑墓銘先欲向人求寄一瓢余君時䘮母海字朝宗卒年八十絶嗣聞君哀毁若為情骨立蕭然髩雪眀井臼秪應勞閫政簞瓢猶且託門生慈帷慘淡秋燈影破屋凄凉夜雨聲如此孤貧良不惡輕肥那得免憂驚寄匡世徳風流應不似當年鏡裏愁看雪滿顛博具更無豪客對酒盃聊共細君傳久抛租産難供米舊積房奩盡賣錢肯信多男又多累一身嬴得日髙眠寄浦嬾翁坦字濬之一幅烏紗兩髩絲令人常想舊容儀詩名老去尤推重藥術年來更絶奇紅杏軒忩春澹澹緑楊門巷晝遲遲遥知燕處渾無事水浸雕籠浴畫睂松筠軒忩户無塵一徑深古松修竹翠隂森采花為酒落金粉挑笋作蔬抽玳簮夜月每看祥鳳宿秋風時聽老龍吟平生獨抱幽人操誰復嵗寒同此心送王經歴六十難稱致仕年君今獨許樂林泉近臣殿陛宣恩㫖朝士都門列祖筵江帶去程辭建業山迎歸棹入臨川遥知今嵗重陽酒應共比隣醉菊邊題蒼筤池館錢塘慧泉翁陳仲明二子徳中景中軒忩開處小池平翠竹新栽遶徑生洗藥每驚魚躍起掃苔時放鶴來行凉生清籟秋偏早影動微波月倍明惹得王猷知此處幾畨直造不通名扈從回京舟中渡江而作千里樓船江上還狂歌醉舞浪花間今宵對酒莫辭飲明日到京無此閒落日寒潮揚子渡澹烟衰草秣陵山壯懐不必悲前古共整鳴珂候暁班送鄭尚書致仕沂字仲與浦江人曵履南宫雪滿簮尊榮重沐聖㤙深名成早遂還山計身退猶存戀闕心車馬都門爭祖餞盤飡隣曲共追㝷知君孝義傳家久子弟那能惜賜金用韻元日早朝和鄒先生緝仲熙珊珊珂珮共趨朝綵仗森嚴擁㦸旄僊樂奏隨方物表天香飄及近臣袍風微玉陛春光早露濕金莖日影髙班退又聞催入醼宫花簮㡌醉葡萄和蘇檢討先生除夕前一日齋宿翰林伯厚臘盡重城暮雪殘詞垣齋直坐更闌金蓮光燦青綾夜寶鼎香飄玉署寒阿閣喜同威鳳宿眀堂遥覩衮龍盤此身幸際昇平日三䇿何湏獻治安贈潘晦初都門一笑喜相逢典却春衣酒肆中且放襟懐同嘯傲莫將睂宇論窮通卧龍蟄後今安在良馬羣中久已空老眼到今無著處醉來江上目飛鴻送陳指揮赴甘肅家聲曲逆傳來久計畧尤能每出奇寵命近聞陞上將兵威應見振邉陲屯開瀦野千營列獵過祈連萬馬馳聖代豈惟修武備要將恩信伏諸夷題杏花春色巻年來芳杏種成蹊結得數椽茆屋低草色階除看虎卧花眀簾幙聽鶯啼暁天白映梢頭月雨逕紅粘屐齒泥自是董仙風致在漁郎休道武陵溪暁發通州望京闕作小雨初晴暁雪開五雲深處見樓臺山連遼海金城固春滿闗河玉輦囘星漢共瞻天漸近衣冠重整客初來欲慿子墨誇雄覽愧乏揚雄獻賦才别南京紫禁鐘殘萬馬奔暁隨仙仗出都門送行不盡親朋意扈從深蒙聖主恩日出海霞紅散綵雨添江水緑生渾慿髙囘首瞻鍾阜王氣龍蛇勢獨尊到北京纔别南京又北京客途渾是月餘程舟車不覺經行逺冠珮重叨扈從榮廣陌遍嘶初到馬上林時聽舊啼鶯解裝且醉都門酒自慶餘生際盛明和曽侍講禁中聞鶯韻棨字子啟號西墅甲申狀元緑隂疎雨澹朝霞紫禁啼鶯競物華聲度簫韶偏宛轉地臨霄漢絶喧譁纔穿瑣闥千條栁又隔薇垣萬樹花佳唱寄來難即和只愁貽笑大方家和鄒侍講雨後夜坐喜凉有作緝字仲熈號素菴吉水人一雨渾無六月炎御溝流水晚來添近居直院新開第初試凉衫舊賜縑古鼎香飄風滿席疎簾光射月當檐夜深不覺吟哦久詩法輸君律最嚴再和前韻雨餘瓊署不知炎此夕多君逸興添燈下展書横一榻酒邉濡翰掃千縑月驚棲鳥爭喧樹風約流螢直到檐我欲披襟同露坐休將禮法待人嚴三次前韻天近都城暑不炎晚來凉氣雨餘添樓臺何處秋横笛機杼隣家夜織縑吟對篆烟􅑀曲几卧看銀漢傍虛檐翻思褦襶江南日冠服何繇得整嚴酬朱逢吉先生見寄韻以真號芝山大理寺丞番陽人聖主鑾輿事北巡山川皆被寵光新榮當扈蹕叨清職忝預絲綸愧昔人丰采未瞻聞譽久緘題先寄見情真近知松桂凌寒好畢竟均霑雨露春和曽侍講題新建秘閣韻帝城東望勢岧嶤阿閣新成逼九霄玉署近臨青瑣闥粉垣新映赤闌橋夜忩燈火明蓮炬春暖笙歌識鳳韶誰似相如才獨贍賦成猶覺氣飄飄新成秘閣聳岧嶤碧瓦朱甍映紫霄翠栁夾栽香輦路玉欄斜轉御溝橋絲綸絢爛文成錦歌頌鏗鏘韻協韶定有青藜來照夜虹光髙逐五雲飄題華節婦巻夫病亟遂自縊華源長之妻鄒氏近仁女也偕老曽將百嵗期一朝凶變竟何為㣲軀只合從夫死大節寧堪使婢知鏡掩青鸞藏鈿匣繯垂白練繫雕楣于今同穴埋雙柩連理應生墓上枝挽計生岳𦙍中舎鳴鶴之子若翁已失平生望對客無言淚滿袪遺墨尚存新著藁小齋空積舊藏書樓成作記應難測地下修文恐不虛自古多才偏夭折茫茫造物竟何如挽張真人宇初字信甫號無為子四十二代天師憶昔瑶京相見日許同仙籍注清班遽聞馭氣遊無極不復焚香授大還笙鶴逍遥三島上樓臺縹緲九霄間世人空自藏遺翰邈矣高風不可攀和祭酒胡先生題種菊韻儼字若思號頥菴卒年八十二佳菊移從何處來髩絲相對共毰毸閒情未得籬邊種老眼長看客裏開花吐清香飄滿徑根培宿土砌成臺高風逺慕陶彭澤詩句應湏著酒催又次聞鴈韻燈殘孤館獨醒醒斷鴈那堪此際聽老去情懐渾似水年來踪跡尚如萍一天霜月飛何處千里闗山想寧馨料得豪家無此况酣歌清夜對娉婷北京八詠居庸叠翠峯巒叠叠樹冥冥黛翠浮光向日横髙聳青霄臨北極遥連紫塞到東瀛路通絶域來畨使天設重闗壯帝京四海車書今混一好磨崖石頌皇明玉泉垂虹樹杪潺湲落翠㣲分明一道玉虹垂天潢低映廣寒殿地脈潜通太液池遥望直從雲盡處近聽渾似雨來時煑茶不讓中泠水陸羽多應未及知瓊島春雲蓬島樓臺金碧暉春雲郁郁更霏霏曽為甘雨從龍去又向朝陽逐鳳飛玉几爐烟同縹緲彤垣花霧共依違從來此地多佳氣五色文成繞禁闈太液晴波翠浪粼粼帶碧烟瑶臺西畔玉樓前九重地隔人間世一片秋涵鏡裏天星斗轉時銀漢近芙蓉開處綵雲連此身已得隨鵷鷺共沐恩波祝萬年薊門烟樹雉堞㣲明散曙霞重重烟樹萬人家輪蹄雜遝香塵暗樓閣空濛酒斾斜翠栁隂邊棲宿雨絳桃繁處絢晴霞都人嵗嵗清明近此地㝷春競物華西山霽雪雪滿西山繞帝城凴闌清暁看新晴千章玉樹臨風倚九疊銀屏向日明都市酒香春已近御溝氷泮水初生天應預報豐年瑞萬姓謳歌樂太平盧溝暁月扈蹕重來趣暁裝雞聲殘月樹蒼蒼數峰雲影横空濶一帶波光入𣺌茫人語暗喧孤戍犬馬蹄寒踏滿橋霜望中風景皆詩思况復樓臺是帝鄉金臺夕照黄金此地曽延士極目平川夕照斜水遶易城遺霸業田連督亢屬農家蒼茫暝色烟中樹縹緲晴光雨外霞千古髙臺餘舊址西風殘栁集寒鴉送周編修復任還南京功叙十載詞林來考績兩京佳麗遍逰觀紀行隨處添新藁拜命歸時復舊官雨過秣陵山色好潮生楊子水容寛懸知别後重回首寒樹江雲路𣺌漫送李教諭之無錫孟昭諱湛送别都門酒滿巵吾鄊今喜得賢師中朝正值文風盛後學應䝉化雨施鴈度江淮霜落早馬行齊魯雪晴時故人相見如相問為説年來髩已絲仍翠樓為金溪趙公理賦若翁仙去竟如何手植琅玕已滿坡門口直開三徑入樓中應待七賢過晝長蒼雪飄簾幙夜靜清風響珮珂最好年年雷雨後階庭添得錦䙀多挽穆先生其子肅雍皆擢指揮聞説當年謁至尊布袍藜杖入軍門六韜適遇風雲㑹二子皆承雨露恩丘隴豈期身遽殁功勲應與國長存董公遮道真奇事太史於今可並論元夕賜宴觀燈應制紫禁春回景物饒千官陪宴賞元宵樓臺和影來三島燈月交輝徹九霄錦隊喧時呈角觝翠華臨處奏簫韶太平氣象年年好萬國謳歌仰聖朝人間元夕喜天晴况復繁華在帝京鳳輦遥臨雙闕迥鰲山髙聳萬燈明春風車馬填都市夜月笙歌滿禁城不是吾皇重時令要同黎庶樂昇平翠聳鰲山對闕開萬燈森列映樓臺初疑星宿薇垣聚又見神仙閬苑來火線走空飛夜電香車填道動春雷臣民共樂恩光裏願獻吾皇萬夀杯望近仙家十二城君王元夜宴瑶京月華且讓燈毬起春色先從火樹生平地蓬瀛開勝槩半天歌管奏新聲小臣願獻昇平頌萬嵗千秋仰聖明四友軒為陳考功賦每愛大夫多晚節復憐仙子占陽春此君既共稱三友我輩何妨屬四人歴盡嵗寒盟已舊生同風致意偏親㡬畨詩酒高軒下彼此忘形各任真送廖教諭再任松溪縣庠匆匆相送出都城回首松溪兩月程行藁近添新著述到官仍復舊師生壇開紅杏微風暖池長青芹細雨晴今嵗秋闈攀桂客多應講下占魁名遊天王寺用修撰王時彦韻英謚文安古寺尋幽竟夕暉敗垣芳草路依㣲鳥啼空院僧何在樹老閒庭鶴自歸靜對方池移石坐髙臨孤塔看雲飛平生自信心無著不是衰年始息機送友人投老還鄉髩已絲風流誰説異年時數間書屋鶯花繞千里樓船婢妾隨寶劍每將燈下看玉簫應向月中吹人生此樂如君少莫笑吴儂拂袖遲逢武當道士李幽巖用王修撰韻暫攜笙鶴逺朝天盡道丹成骨已仙巖搆往來馴虎豹荷衣著破帶雲烟嵗周甲子何曽記夜遇庚申便不眠囘首故山歸興好嘯歌風月浩無邊贈孫碧雲還武當纔朝金闕便言還自是髙風動聖顔身作地仙逢盛世靣承天語住名山重重臺殿空青上六六峯巒紫翠間料得塵緣無一㸃此心應只伴雲閒哭林侍講誌字尚黙號見一居士侯官人永樂辛夘解元壬辰㑹元榜眼春坊諭徳兼侍讀五十卒楊文貞公士竒表其墓早登科第占魁名載筆曽同客兩京夜靜玉堂邀看月春深丹禁坐聞鶯才華未及施經濟交誼寧知隔死生老我情懐怕傷感不勝雙泪為君傾送張中書愿中扈從出塞聖主巡邊馭六師君當扈蹕共稱宜天威震動風雲合漠野歸降雨露施䇿馬暁行隨綵仗濡毫夜直近彤墀人生際遇真非偶况復功名及盛時胡祭酒索寫洪厓圖依韻奉荅辭之儼字若思纔過中年又晚年筋骸疲憊眼茫然久將清事抛成嬾忽得佳章喜欲顛珠浦光寒秋見月玉田膏潤暖生烟便當十襲藏書篋留與兒孫作世傳纔過中年又晚年一身多病已頽然漫將詩酒愁邉遣不復毫縑醉裏顛數葉竹梢承雨露一拳苔石寄風烟若言貌得洪厓景仙跡猶難我輩傳題何雅言古柿山房巻山房栽柿久成林手澤傳芳直到今根與芝蘭同長養葉連椿桂共蕭森霜眀秋色垂朱實雨過春雲結翠隂每見竒材常輩出應知先徳種來深竹深處為劉孟功題萬竿森立草堂前門巷迂迴小徑穿席展翠隂留客醉詩題玉節許僧鐫未秋已覺凉生袂清夜那知月在天老我情懐怕蕭索却疑風雨若為眠茅屋為秋風所破有作西風昨夜起狂顛捲我茆齋屋頂穿紅日迸光來枕上白雲拖影到床前破鐺煮茗煎明月古硯濡毫蘸碧天一夜寒忩渾不寐寸心直至斗牛邊過淮安送周文威歸吳我昔送君君挈家君今回棹我天涯萍踪又向㡬時㑹蒲質共驚雙髩華淮海雨晴潮湧日邉城春暮雪漫沙江南最是闗情處茅屋暖風開杏花題赤壁圖當年坡老謫黄州與客曽從此地遊簫舞潜蛟幽壑底船迎孤鶴斷磯頭半篷月色氷輪暁萬頃波光玉宇秋三國英雄誰復在一樽還為酹江流潼川驛宰潘君復任持巻求詩三年傳舎官如舊來往追隨不厭頻掃逕慣迎天上客折梅長寄隴頭人驛樓樹暗淮烟暁官棹花明楚水春待我南歸重經過索茶呼酒莫相嗔登盱眙縣郭髙臨紫翠間泊舟乗興一躋攀荆揚南望無多路淮楚西來第一山僧舎逕幽松影合水祠碑在蘚痕斑登臨不用悲今古渡口寒潮日往還月篷軒軒居窄窄小於舟忩戸虛明瞰碧流月色正圓思載酒波光難定嬾垂鈎不憂平地風波起最喜近人星漢浮無限滄洲烟水趣謫仙何必跨鯨遊客中元夕對月異鄉何處看燈好片月多情對客懸遥憶故人千里共又看新嵗一畨圓愁中燈火逢今夕醉裏笙歌記往年踪跡漂流難定止舉杯端欲問青天出塞述懐欲扣天闗杳不通身投荒服逺從戎王孫誰復哀韓信行伍何繇拔吕䝉風折布稜邉地冷月眀笳吹塞樓空丹心去去終期報卑下那能得戰功從役鶴骨昻藏七尺身年來趨逐困紅塵順時語笑皆非我在已形骸轉屬人貧窶每遭同輩侮迂踈常畏宰官嗔獨能枕上畨畨夢尚與滄波白鳥親塞上五月見蝶感懐五月塞邊纔見蝶令人忽動故園情牡丹亭館微風暖芳草池塘細雨晴花底撲來歌扇小酒邊飛逐舞裙輕蘧蘧肯作江南夢沙漠應知負此生九日諸友讌集分韻得將字塞北秋髙思轉傷孤城風雨又重陽杯盤强欲酬佳節踪跡還驚老異鄉白髪幾人存故舊黄花何處覔清香烽塵那忍登髙望南國音書絶寄將寫家山圖贈松江陸宗善千里家山阻道途昔曽遊處漫成圖青山斷處非三泖白鳥飛邉是五湖楊栁陂塘茆屋小杏花村落酒旗孤殷勤寄與同來客此景江南彷彿無送子南歸二首孟端謫戍山西大同行都司安東中屯衛二子長黙字汝言次恒字汝貞黙子孫磚橋住恒子孫錢橋住離情於汝倍多愁相顧無言只淚流舊業未知還可葺邉城猶恐不宜留凍雲衰草横沙磧落月悲笳起戍樓歎我歸期難預卜好將詩禮襲箕裘情親不覺泪紛紛頓足牽衣未忍分後累定知殃及汝中年誰料苦從軍一身弓劍屯青海千里闗河望白雲汝母早亡遺幼弟古來同氣汝曽聞送曹勉省父後南歸故鄉南望路漫漫囘首嚴親淚眼看未别只言歸思切臨行猶覺去情難闗門月落鷄聲暁塞草霜枯鴈影寒知汝到家眠未穏又思行李促征鞍初歸征衣漠漠帶風沙暫得歸來重可嗟在客每憂難作客到家誰信却無家解裝羞貰鄰翁酒借榻多分野衲茶堪笑此身淪落久夢中猶自謫天涯宿雨源上人山房寫懐諱法湧姑蘇人住持中天竺西風林下髩蕭然轉眼中年近晚年蹤跡自憐飄泊裡情懐偏愛寂寥邉秋燈茗椀同僧話夜月藜林對鶴眠自喜拙謀從事簡豈應髙尚絶塵緣次韻詠獨鶴用西源韻昂昂絶俗誰為侣不是髙僧即隠君逺水獨歸憐片影空林清唳憶同羣夢隨坡老舟中月舞罷支郎榻外雲惆悵我來難近狎飄然猶似避塵紛酬承天寺幻師病中見寄語話相投意便親底須交久往來頻半生未得吾忘我一黙方知妙入神大患有身身是患至真無迹迹非真是非形迹俱忘却可擬當年問病人白雲深處為陳孟端題髙隠白雲深復深階除晴晝亦生隂山藏暝色迷歸鶴忩捲朝嵐恐潤琴忽爾去留那有跡飄然舒巻絶無心道人只自閒怡悦俗客要來難便㝷題逺碧樓愛爾樓居髙百尺每來凴檻極天涯望窮絶嶺一痕斷坐對遥空四面垂樹抄平湖春雨後烟深芳草夕陽時才疎未敢追王粲興入蒼茫獨詠詩重過虎丘馬天雨上人寫畫世味年來冷似氷名山猶喜得重登百年心事誰知已半日閒情獨訪僧木葉下時風淅瀝莓苔掃處石崚嶒寫成一片秋林意應對清吟雨夜燈送范宗輝歸四明省親對酒長歌遊子吟酒闌歌罷泪盈襟百年不是逢知己寸草何繇得遂心烏鳥聚時吳樹晚白雲飛處越山隂到家拜舞怡親日應説侯門待士深黄廣文席上詠白甆杯愁把相逢一笑開廣文今夕試新杯淺深自是甄陶出製作應從模範來清夜舉時宜問月初春攜處好㝷梅摩挲醉眼燈前看玉質娟娟絶㸃埃耳聵自嘲自喜從今不畏雷是非無較轉癡呆心情要與分眀解指掌湏教㸃畫來每事應酬將意測卒時呼喚肯頭迴偶逢生客初相訪未及交談便指腮謝吕先生惠幅巾敏字志學烏紗寄恵承髙誼兩帶翩翩一幅全製度想從周禮出風流得自晉人傳寒爐坐守偏相稱暁鏡看來亦自妍昨夜㝷梅到山寺僧言疑是老逋仙為夏以亷寫松於扇寵拜秦封未足誇昂霄聳壑勢槎牙掃烟曽見焼成墨釀酒常思剰采花夜靜風聲驚鳥雀月明林影寫龍蛇携歸好為而翁夀嵗晚相看色轉嘉題蕭仲和戍成都思親巻諱箎號蒼崖劍閣崢嶸列翠岑東吳一望一沾襟不惟客久懐鄉切復恐親尤念子深甘㫖百年烏鳥志闗河千里白雲心知君近得榮歸好愛日惟憂暮景侵寄樗林華先生寅可字汝翼先生眼裏雖無子懐抱老年能自開令女素稱閨閣秀外甥尤具孝亷材一笻吟影梅邉月兩屐行蹤竹下苔别久令人想髙致雪中應擬泛舟來為夏雪洲舟中屏上寫竹一剪輕雲落小舟漫將書法效湖州清㳺便欲邀坡老雅好還宜載子猷篷底影横湘浦月燈前聲帶海門秋興來欲作長竿去釣却連鰲訪十洲贈徐君邦孝𦙍户部侍郎憲字元度之孫難後不知何處在客中相見髩絲新此身已老誰知已舊業如今盡屬隣歸夢幾回膠嶺月借耕十畆練塘春人生萬事應難料未信長年孺子貧用韓先生看梅韻述懐奕字公望吳人號䝉菴嗅梅林下看新晴頓覺蕭然俗慮清事往語人猶在夢才疎于世若忘情雨添江水春無跡雪墮松梢夜有聲自古人生須適意是非身後托誰明適閒翁以松蕈風銷見餉以詩戲呈寄來佳品見髙情露菌風銷始識名翠釜煮時雲朶朶玉纎傳處雪盈盈香甘絶勝牛酥餅嫩滑偏宜豆乳􅅅却愛老饕難便飽吟腸依舊作雷鳴釣詩鈎好句如璜得者難江天佳趣浩漫漫長吟對酒初投餌小立支笻勝把竿興逐白鷗揮綵筆思牽華藻出層瀾只今湖海多風雅不獨名髙七里灘煅詩爐物情為炭趣為銅始信經營意匠工光熖騰衝天上下詞鋒淬就劍雌雄推敲句法從精鍊陶冶心雲入混融雅頌百篇存古製定將槖籥鼓淳風貯詩囊吳奴背上日隨行小李當時早得名檃括尋常風月趣包容今古詠歌情珎珠粲粲光華滿文錦輝輝彩色明累牘聨篇藏已久未逢刪采向誰傾送謝長司歸山西守制勉字公載蒲州人陞大理丞左遷花縣居蓮幕故道經行尚避驄正待𤓰期登上考遽聞椿夀告初終松楸望逺愁雲外山水程多淚眼中更好節哀思為國莫徒傷毁慟蒼穹趙縣丞以事繫法司乃弟自台州來赴難及獄平始告歸省以詩送之縣丞名孝禮字次進急難每聞人共勉况君骨肉最情深不惟友愛弟兄義正欲怡愉父母心花底醉歌忘旅况燈前懽叙話鄉音到家具慶尤堪