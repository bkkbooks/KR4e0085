body:
  text: 主舍人詩集卷一明王紱撰白華美孝子也彼白者華維色之潔彼美君子修德孔哲修德伊何欲親之悅彼白者華維色之純彼美君子修德孔仁修德伊何以安厥親厥親在堂既悅且安旨酒稱壽室家相歡朝夕在斯外慕曷干君子之行莫先乎孝是曰順德有禆名教子孫百世是則是效白華四章章六句瀨水美仲琰也史仲琰能紹先志故美之瞻彼瀨水其流湯湯有美君子築室于傍厥心孔臧受天之祥瞻彼瀨水湯湯其流有美君子築堂于丘厥德允修受天之休有澤可漁有丘可鋤我堂我居先人之廬我樂我志先人之書惟爾先哲積善有基一於為善而無自欺爰及後昆及慶之餘後昆振振德鍾於門繼爾先志此心常存朂哉敬哉薄俗斯敦瀨水五章章六句雜詩鴻鵠志四海燕雀賀櫩端四海一何逺櫩端亦以安扶搖豈不慕跡拘諒尤難鍛羽喧朝景安得追風翰俯啄蕭艾間仰視天風寒斯舉咫尺足何必萬里摶撫已宜自養勿多身外干其二志鬱食哽咽情歡酒忘醉如何飲食間憂樂竟莫類達人無不可一以理自㑹時序侵燠寒晨昏互明晦茍能守吾中外患亦何憝忠信與篤敬乃足寡尤悔賢哉子張紳吾當永為佩其三秋旦露氣白初陽淡無暉羣雞正亂呌棲禽猶倦飛我行適中野躑躅烟路微蒼莽荆棘深零露霑裳衣去去既寡歡惻惻中心違素志諒難易知音古尤稀側身復惆悵拂旦吾當歸雜詩楚人獻竒璞號泣足見傷宋愚得燕石什襲固以藏至寶終自白瓦礫歸糞墻遭時自重輕沒世誰短長儀秦乃赫赫孔孟徒遑遑仁義信迂濶功利足富彊舉世已如此念之熱中腸其二雅樂古而淡其如世不好鄭聲何浸淫四座舞且蹈感慨既異致善惡難類報禴天苦幽𤣥紛紛媚於竈所享茍非誠罪福恐顛倒立身豈無術理物良有道曽聞舞干羽苗格罷征討其三淒風西北來時序屬秋暮林野何蕭條草木怨霜露霜露亦何心大化運行故須臾屆嚴冬堅冰日凝沍蛟龍已沈淵蟄蟲亦坯户塗我林下屋裂我機上布陽春望望遙薄言善調護訪陳羽士道寧因贈我生樂夷曠幽抱常沖虛偶客京華塵不異林泉居時來訪仙侶相與論道書凝神入無象妙觀天地初物我既莫立孰謂形迹拘吹笙碧桃春天風動霞裾孤雲度碧落六合乃吾廬出門感羣動役役將何如雜詩客有三代器寶之金玉重考制謂尊彞求形類瓶甕文欵隱斑駁光潤豈磨礱所嗟去古逺未足適時用什襲雖珍藏棄置相伯仲縱有好竒者相看為玩弄題悅心卷人生貴有養所養將如何惟以養吾心一善靡有他俯仰茍無愧靈臺藹天和嗤彼夸毗人嗜欲何其多所養亦以異紛紛蹈風波仁義譬芻豢千載吾師軻公子得野鳥公子得野鳥來自虞羅中羽毛何燦燦聲音復嗈嗈珍愛日為玩殷勤貯雕籠雕籠豈不貴勝彼荆棘叢飲啄就左右乃足安微躬野鳥性難馴飛撲尤忡忡比類忍莫同永隔雌與雄孰知野鳥苦秪恱公子容為翰林典籍沈民則題樂琴書處沈君搆華軒藏書復藏琴書以載古道琴以傳古音古人不可見唯此悅我心我心既自悅外慮俱銷沈涼生深竹淨日轉髙梧陰絃誦茍世守奚須滿籝金送楊得昂諱僶號靜約鴻山巨族我適桑乾歸君猶五溪去飄流若萍蓬何繇復相遇迢迢江上山厯厯煙中樹後夜月明時相思渺何處其二數載不相見一見驚復喜翻思兩地情音問隔千里宿雨暗洲渚飛鴻度江水孤棹即飄然離愁又重起題秋菊軒九月霜露零我氣亦云肅草木盡凋瘁而有籬下菊粲粲如有情盈盈抱幽獨我欲餐其英采之不盈掬呼兒具雞黍白酒正可漉素心二三人於焉敘心曲陶然付一醉萬事亦已足詠歌柴桑詩千載有餘馥瞻雲軒慈顔日已衰遊子日已違路阻千里修心逐孤雲飛雲飛想其下輕陰覆庭闈何繇獲終養日舞斑斕衣王事靡有程嵗徂曷言歸望望徒自傷暮景西山微為張生寫竹思安登永樂壬辰進士陜西憲副卒年七十九生也才弱齡骨氣已拔俗青襟三尺強對客瑩如玉頗亦好清事揖我求寫竹我方困塵途懷抱苦煩燠翰墨交久違硯破筆已秃憐渠意甚勤聊為掃新緑生能㑹我心進益必宜篤切磋與琢磨更請歌淇澳味易齊為周叔訓賦傳厚味人所嗜子獨味於道味道夫如何羲經日窮討大而天地外細則秋毫杪所遇各有味咀嚼期了了至味不可言惟應自知好非苦亦非甘忘飢復忘飽淡泊養吾神泰和沃吾抱長年味斯味兀兀不知老掩卷坐忘言見此庭前草晴光宿雨收逺色連天杳咄彼芻豢徒胡為養其小淡雲巢大學士黃君嘗命㒒作淡雲巢圖為其尊翁諱性字思恭先生壽復徵詩遂賦有客居東山結廬山之隅林深藹芳潤清陰閟庭除泊然入無倪與時相卷舒自名淡雲巢其志將焉如雲以願從龍巢以産鳳雛及茲際昌運嘉應良不虛鳯既上阿閣和鳴向朝曦雲乃爛碧落昭回五綵垂詎學巢與由負此唐虞時寫墨竹與蜀府明長史贈别相逢意方洽相别情尤難殷勤欲有贈唯此青琅玕矯矯蒼龍安濯濯丹鳯翰稟兹拔俗韻髙拂青雲端願言君子心冰霜同嵗寒寫竹贈王孟彬紀善昔我王子猷襟懷淡而沖獨結此君好彌久情愈隆不可一日無珍愛金玉同有竹輒宜造肯令通主翁我亦抱茲癖豪縑托幽叢遐躅邈難繼與君挹清風寫竹寄贈顧教授祿謹中秋聲起巫峽暝色迷湘渚悵望千里遙佳人渺何許幽期邈難值欲往復延佇中夜獨遐思西忩颯然雨寫竹寄琴士張逢吉美人昔相見為我鳴瑤琴初彈别鶴怨復奏孤鸞吟掩抑弄餘意華堂夜沉沉涼月照綺席雲飈度瓊林一與美人别令我憂思深塵囂日盈耳何繇滌煩襟我欲裁嶰谷逺諧美人心六律既已調噓陽翕羣陰美人如見與先此通微忱相期洞庭野共奏鈞天音題成趣軒桑麻日已長稼穡日已成門巷蔭榆柳隔屋繅車鳴生平寡營為遂此田園情衣食苦不乏公賦尤寬平舉家情欣欣淡然忘世榮力作雖云勞濁酒時共傾豈意事髙尚所樂安吾生盆裏黃楊黃楊乃嘉植岷蜀多産之喬柯起百尺小幹猶拱圍作器不沾垢櫛具尤其宜故人有好事全株逺相遺厥髙僅盈咫徑不踰分釐置之苜蓿叢何繇别竒姿況茲種來久十易寒暑時顔色固自好長茂何遲遲賦性恐或異雨露寧有私曽聞厄於閏此理疑見欺水土託盆盎滋養良可知嗟豫久寂寞對此心神怡親之若賔友愛護如嬰兒清晝置書几良宵露階墀時時為灌灑元氣猶淋漓叢葉藹芳潤孤根尚撑支願言保貞操與世相推移材良召斤斧曷用昂霄為唯應處巖壑庶可全天資題清適軒修鱗泳深淵徑翮凌遙空命分不可易出處諒難同達人㑹斯理委順安厥躬外嗜既莫奪襟懷淡而沖蔡君夷曠士養素烟霞中軒居面湖水几案羅羣峯開樽待明月展席延清風心閒體常逸神完氣彌充惟以適所適寧煩計窮通咄彼夸毗人冒進何忡忡患得復患失冰炭交心胸悵然慕髙躅無繇得相從琴室為林典樂賦楣間揭寶翰床上橫玉琴對客未成弄令人先斂襟地位近彤邸門徑幽且深瑤草露盈砌琪花香滿林應知月明夜時有鸞鳯吟我來偶相訪簾垂晝沈沈為鼓一再行宛見名軒心靈飈度餘韻祥烟散微陰氣和體自適神靜心愈欽曲終莫敢問訝是鈞天音送闕秀才歸江右京國久為客悵然懷故山孰云乏知已念親已頽顔窮居恥明時曠懷良獨難因思衣錦榮何如綵衣斑空江一鳥度逺道孤舟還分手復延佇極目蒼茫間送端木員外孝思養病歸溧上諱智南昌人善草書都門已設祖冠蓋聚朋儔宴别未云已騶從羅道周大夫何賢哉寵被君恩優為郎列仙署弄翰登瀛洲內帑出賜衣大官具時羞虛懷戀闕心補報嗟無由奈兹抱病質霜鬢颯已秋上疏得優許養痾還舊丘舊丘況京甸咫尺溧水陬依依農圃鄰藹藹桑柘稠頺齡尚可駐餘生得安休悠然遂髙志那復生離憂於時正陽月霜寒水痕收飄颻逺空雲浩蕩滄波鷗私懷徒嘆羡逸駕安可留題梅花結心已鐵石陽春忽先布發此瓊瑤英寧能慮霜露淡然絶世紛幽人雅襟度何如洛陽花池館資貴富姚黃與魏紫綺麗相誇妬春風閟重扃車馬日馳騖遂令貧者心對酒起遐慕乃知遊冶人誰復重貞素流澌古澗春殘雪空江暮清香不自知豈意人相顧題靜庵卷為黃學士乃尊作性字思恭永樂有髙士簮纓舊名門耆年際昭代有子承君恩絲綸慎所職密勿居詞垣贊襄竭忠藎惟思濟元元先生遂髙志悠然樂田園種植森且繁芝蘭滿階軒沖懷淡無慮隱几時忘言山光散餘靄水色明朝暾自得靜者妙豈云厭塵喧賜金屢歸奉日以供盤餐時時叙鄰叟倒此花下樽酒酣念恩澤一一相與論中心增感激永矢惟弗諼嗟哉靜中意乃有仁道存髙風振千古里俗應彌敦代作送卓民逸歸浙東迎養憐君憶親苦我亦别親久千里隔庭闈孤雲幾回首君今得歸省而我尚株守惆悵送君行澘然淚盈手春潮浙水船夜市蘭陵酒到家春未闌園林正花栁風飄萊子服杯獻蟠桃壽此志君已遂此樂我何有我亦欲效君未卜如君否題思本堂吳元凱求吳生故鄉來相見出詩卷自言搆新宇思本揭堂扁所哀怙恃恩造物苦多舛存亡既莫及罔極情難展徒懷風木悲對客淚常泫願言求名筆幽光庶揚闡時時一披覽或俾哀悰遣嗟余久淹泊名卑材復謭拒生固辭謝再四終難免嗟哉吳生賢所志匪浮淺能存孝悌心悖理固應鮮惟恐人弗思能思即為善況復思務本本厚支自衍慎勿事虛文浮華肆誇演慎勿無益思戚戚徒悲愐所貴在立身名揚身益顯殷勤為生言進善當自勉蔡芝林為蔣公進求畫扇遂題芝林字元昶蔣君我未識好事能延賓從遊蔡夫子是可知其人謂我隘而介傲兀長居貧尚耽山水癖豪縑掃嶙峋一介不以取尤難輒交親片紙疇可得吾將永為珍夫子為之請一一重具陳仍持君扇來求寫湘江春我方習吾靜天遊浩無垠適聞夫子言笑落頭上巾丈夫貴知巳誼合情便真茍能志吾志寧謂非吾倫況聞君逺祖三徑招隱淪清風千載餘遐躅君能遵漬筆一揮灑翛翛見霜筠交加林影間團團月如銀時方涼雨歇齊居絶纎塵緬焉懷二仲安能與之鄰擲扇返夫子衣袂凌風振為我先謝君美酒宜多詢秋髙月明夜直造君寧嗔呈太常少卿雲巖先生髙巖何巍巍卿雲日復聚孕秀鍾竒才靈氣藹寰宇已聞追䕫龍詎肯效巢許文章翊昌運禮樂佐明主陽回棘寺春月滿齊宫午尊榮位崇秩學力在稽古自憐牛馬走質凡性尤魯雖懷問學心碌碌庸足數徒切瞻仞墻無由造堂户居然成涸鱗久矣困焦土願公巖上雲化作天下雨寫竹贈廖紀善霜風動髙秋草木抱悽惻唯此幽篁枝含翠終自得虛心養直氣徑節凌寒色持以贈君子願言崇令德為姚生題終養堂姚生美昆季孝養怡親顔嘉味極甘旨彩衣舞斕斑慈烏堂下啼斜陽薄西山所思得終養區區百年間百年復能幾離㑹尤相關來日良可愛去日難再還美哉孝子心及時常追歡嗟豫命獨舛怙恃早已艱何繇奉百年未得供一餐因君欲題贈使我摧心肝題萬安山樵山髙樵徑險山深樵徑迂采樵雖云勞覽勝尤足娛飛泉落林杪好鳥鳴丘隅歌逐天風還身與閒雲俱日夕行負薪烟深望吾廬得失既莫較孰知賢與愚嗟哉朱買臣富貴將焉如題義方書舍我昔童丱時䝉養絶浮靡朝夕常趨庭頗解學詩禮奈何才弱冠早已失怙恃誨言何繇聞定省不復理徒懷風木悲沒齒殊未巳及余生兩雛將以托宗祀既欲承箕裘當令業經史無何我多故謫戍向邊鄙迢迢父子心隔越數千里惟恐有存殁不暇較賢否漂流無定居嵗月動盈紀幸余初還家無恙共驚喜踉蹌拜我前並立肩可比弱質雖成人愚騃誠可恥大兒僅識丁唯足代耘耔小兒復癡頑真乃豚犬耳近令親筆硯十日書一紙我欲痛責渠隱忍輒中止吁嗟我平生父子乃如是邢君義方訓諸郎盡賢嗣芝蘭滿階庭玉樹映屏几嵗時行具慶稱壽羅拜跽嘉賓每過從迎立具甘旨傳家務淳厚動必蹈前軌瞻彼天倫間藹若和風裏椿桂同敷榮雨露光薿薿緬懷燕山竇今昔良可擬所云積陰德諒亦自兹始推此家政齊可致風俗美詩成發三嘆愧我曷能企豈惟頌君賢尤當示吾子題孝子曹鏞卷曹君本右族乃是武惠孫孝義出天性辭貌恭而溫念昔父早沒而獨母氏存母子守清素終鮮弟與昆窮居力弗贍藜藿供盤飱時有好善者有女願與婚既以承祭祀復茲奉晨昏奈何頗成立母老病且殙迎醫及禱祈徒然自趨奔母病日已劇惻惻心憂煩於焉割其股調和煮成䭈一啜病即愈依然對庭萱後來病屢作夫婦相與言再三至刲肝聞者驚心魂老天念其誠遂使母子完曽從視其傷肌膚尚留痕母壽盡天年此心可無寃至今問其故對客聲猶吞嗟哉孝子心勇為過孟賁殺身以成仁況茲罔極恩唯知母所重此身何暇論世多不情子貶議爭囂喧聖朝崇孝治特為旌其門豈徒事奬勸要使薄俗敦吾知孝義名千古留乾坤閒居與沈修撰小酌寫枯木竹石遂題我本山澤臞棲身伴樵漁謬承翰墨選布衣登石渠朝野孰云異依然樂閒居地位近清禁事罕人迹疏遂令公宇中乃若幽人廬苔蘚上階砌竹樹羅前除匪惟宜壺觴況茲有琴書文㑹不待速朝夕與之俱俯仰皆自適此樂將焉如題耕讀軒出處既莫同趣舍亦云異君子適其宜窮達歸一致世榮吾豈薄先業非可棄復恐素心違蹇跡同顛躓耕田食吾力讀書樂吾志欣欣一家親朝夕寡憂慮俯仰茍自得外慕奚足嗜鹿門非求安南陽豈忘世古人不可見唯將古心契過沈修撰留酌醉後書贈旅跡無可往兀然生隱憂素性本簡拙出門寡綢繆感君獨知己情真久交遊況茲相近居來往常遲留笑談散堙鬱杯酒屢勸酬供具即所有無煩備時羞陶然各盡醉不忮亦不求人生契合難數造君母尤題畫芳春始云邁倐忽驚素秋志業獨未就嵗月不我留羇懷渺難托寫此林塘幽喬木蔭苔徑孤亭俯清流悠然故園想詎敢為身謀含情委豪素庶或宜神遊雨中過歐陽編修館題竹木畫上我生本寂莫況茲久羇旅偶君素心人來往迭賓主秋聲動髙樹暝色渺烟渚孤館坐題詩蕭蕭正風雨題松鶴軒吾宗有令弟所志樂夷簡載筆遊兩京襟抱常坦坦自言外祖翁素不治資産平生有研田耕穫同渭滻揮毫擬羲獻伯仲固無赧前朝雖薄宦名士交無限所居有長松蔚蔚張羽繖上有雙白鶴對之怡嵗晚吳興趙公子書價重圭瓉為寫松鶴軒騫翥龍蛇綰翁今久仙去往事不可挽軒居成丘墟軒扁獨遺版青松未化石白鶴去不返追昔成夢寐令人淚長澘求君為寫圖庶或哀可剷君當憫其情不敢數催儹我亦重其請不敢辭以懶欣然為一揮庭宇已蕭散須㬰㸃染成髙致如在眼急須潤吾筆沽酒奉杯盞九原如可作翁亦笑而莞為徐學正曦叔寄題其尊翁晚香卷徐君素髙尚雅志難適俗慕彼柴桑翁種此籬下菊黃花秋正繁白酒時一漉一觴聊獨傾三嗅仰餘馥有兒抱遺經典教濓溪曲迎養固靡遑時奉千里祿較之五男兒此時亦已足何當結比鄰嵗晚相往復寫畫題贈蘇性初歸吳復號宜闕我家住錫麓君家住吳城相去百里近一日孤帆程君才日方茂我鬢日已白相逢一笑間共作京華客君今忽歸去别我將晨征懷哉舊猿鶴寫此丘壑情丘壑不可戀宜奮青雲志長安三月春沽酒待君至五月䝉賜衣五端自知素蹇劣謬忝列近侍孰云載筆勤清禁日無事聖心念長夏恩以絺綌賜感激既盈襟持歸復滿笥光榮動鄰曲喜色見僮婢服之固難忘無補獨深愧偶成題畫玉署坐涼思野人忝簮纓謬以染翰職遂得陪羣英疏雨淡東旭嘉樹蔭西清樂茲館閣靜悠然抱閒情於焉弄豪素澗谷紛縱橫幽徑遵曲岸鳴泉繞孤亭同遊固未暇寓目猶可并菲才惜何補生幸承休明獨善堂為施惟政賦窮達雖不同在我固無異獨善與兼善此道一而二施君素髙尚衡陽久藏器雖曽佐花縣牛刀聊小試未幾即歸休自謂猶未至築堂南面嶽相髙爭氣勢講道通天人讀書飽經濟遲當達天朝揄揚明至治不見有莘士躬耕豈忘世幡然一旦起惠澤蒼生被君今已白頭明時幸遭值願言發其藴青雲奮髙志勿效棲棲人林居事幽致永嘉勝概卷為黃太守賦永嘉古名郡山水足清賞王謝舊登厯境在人已往遺躅不可攀千載徒追仰黃侯來牧守政暇愛西爽邀人繪成圖厯厯如在掌嵐光樹蒼翠海氣天沆漭松塢出禪宫花汀隱漁榜桑麻接屋青機杼連村響樓臺俯崇墉阡陌遍膏壤倣佛行春時笙歌散輪鞅慙余謬通籍染翰近天仗披圖諒難即神遊起遐想題畫贈李醫士士文養痾坐虛館何繇制頽齡藥物固所賴奈此白髮生據梧聊自適褰幔當前楹涼風颯已至庭柯落秋聲天空暮雲逺日落遙山橫攄懷託豪素悠悠塵外情卷之聊遺君非敢侔報瓊平易齊為李先輩李君素聞道襟抱常坦夷富貴與貧賤此志終不移蕭然一室中和氣藹春熙厯險思詭遇校之孰為宜重過劉竹深孟功敏昨朝復今晨造君何其頻我來適我暇君喜良不嗔語言有餘味所樂皆天真都城十萬家淡泊情偏親臘日梁修撰用之以還家初散紫宸朝七字為韻命賦七首大化無停機寒暑如循環嵗華忽云暮陽和亦已還人生百年內憂喜互相關顧匪金石姿安得長朱顔達人㑹斯理意與雲俱閒聞道愧獨晚衰也吾何歎右還字憶我童稚時鄉儺競喧譁自從别鄉縣嵗嵗天之涯俯仰能幾時兩鬢忽已華今年在京國臘蟻泛流霞酡顔發髙詠悠悠興何賒皇風無逺邇四海同一家右家字寒旭上東觀殘雪明石渠嘉平錫華宴曉入承明廬珮珂肅西清韶音聞笙竽自顧草木同澤被仁風噓孰知四序周正茲萬物初報國乏經濟白首徒嗟吁右初字八蠟聞古禮臘日在兹旦迎祭思報勞貓虎禦田患鑾輿幸郊原校獵旌旗燦獲禽足練武震蕩妖氛散上以共乾豆下以具賓饌時雍年榖豐河海永清宴右散字十五初志學性頗嗜經史謀生計已疏豈復親耒耜自期德業成拾芥取青紫中季遂蹉跎五十始從仕扈從遊兩京伏臘已三祀寸勞不能效竊祿抱深恥右紫字瑤花已三白臘戍當茲晨田家願豐稔對此尤欣欣嵗功已云畢斗酒敘比鄰共言足公賦擊壤同堯民慚豫不耕者承乏侍紫宸素餐不見斥惟應仰皇仁右宸字我本山澤民浪跡隨漁樵豈意䝉齒録置身事清朝矧居翰林場交好皆英僚歲時遇伏臘詩酒常見招壯懷固浩浩白髮何蕭蕭醉來目雲漢寂默神彌超右朝字送炯竺庵之寧波都綱師本學佛徒而我忝從仕儒墨雖不同崇教各鳴世泝流求其原要亦無二致皇朝設僧司統屬官府例自非名勝流此職良不易師今預兹選領命辭丹陛都城雪初晴越水春將媚齊餘只翻經公退但哦偈難忘北闕心廣演西乾意慚余老無成素餐糜廩餼終當效季真共結方外契為遊伯瓌題靜觀卷羣動日擾擾何由止囂煩我心一以靜庶或澄其源天髙四山寂日落孤雲騫至理無不在朝市同丘園君應領斯妙吾亦忘吾言贈友君家住蘇城我家居錫縣鄉里舊知名都門才識面君當職管庫我幸勤筆硯退公無所為得暇輒相見清玩常命觀芳樽屢叨宴交情尚平易世務總諳練處靜惟端莊遇劇即通變歎羡徒爾嘉懷慚未能薦適茲代者至復預天官選誰言九霄長獨快六翮健扶搖良可期惟恐迹相逺送松溪宰周景辰調連城君從松溪來又復連城去宦逰若萍蓬流轉那能住百年多逺别握手幾歡遇況茲當暮齡幽抱復難訴都門一杯酒回首知何處天南與天北相思渺雲樹病起寫山水圖謝張逢吉先生少小昧調攝動或違天和逮茲晚年至疾疢宜其多所念竊美祿置身在鑾坡寸效未及施報國將如何張君負竒術垂情屢見過爰以慰微志匪徒起沈痾日來力漸完稍能盻庭柯殷勤理冠屨載振朝天珂感德曷云喻銘心久難磨揮毫寫山水持奉志靡他山以崇令德水以衍後波題畫衡門掩秋色苔徑淨無塵人跡雖罕至簡編良可親修篁度涼颸髙梧落繁陰時應散幽寂采藥過中林為王彥本題樂善堂萬類既莫齊人生有賢愚所趨各異向所樂亦已殊仰惟古聖哲動與道誼俱窮巷雖飲水寸心常有餘咄彼夸毗人多貪竟忘劬茍得適暫欣旋踵即憂虞吾宗有佳士近寓都城居形迹隱㕓市心志在詩書生業惟足用何嘗逞豐腴有妻主中饋有子從師儒老老復幼幼一家常宴如我適扈蹕來相延過其廬新酒初潑醅時羞問園蔬維時春正好芝蘭滿階除纍觴不知醉賔主情怡愈譜牒未暇論亦足敘友于髙堂扁樂善此語良不虛酒闌袖出卷辭章揖我須我惟三槐澤今尚䝉沾濡後裔能不墜其亦在子歟願言崇令德始終永無渝贈胡都給事中濙洪武庚辰進士少傅兼太子太傅禮部尚書卒年八十九贈太保諡忠安都給事中胡君源潔文雅清慎志趣髙朗與豫有同郡之好嘗自大江而上岷蜀繇關陜至於中原凡名山古蹟之間履無不至今年邂逅北京同宿寓所因得扣其登覽之勝聞見之廣不覺令人鄙吝頓消而神爽飛越也遂賦詩美之皎皎瑤臺鶴濯濯冰霜姿宿昔有仙契於焉慕安期翺翔厯蓬瀛飲啄來上池寸丹久已就八表隨所之靜與元氣并動與祥飈馳罔象莫可測𤣥珠應自知乃令雞鶩羣矯首徒嗟咨寄贈任給事中時在武當山中君本霄漢客降謫留人間人間不可住又復逰名山彩霞絢春衣瑤草腴朝餐髙風邈難及悢悢心所攀和曽侍講古意棨字子啓永樂甲申狀元靡靡風外花濯濯路傍栁盈盈馬上姝皎皎出素手揮鞭度南陌行人盡回首芳香襲和風皓綵奪目久轉盻睹他人百媚自成醜孰云君子配終恐匪佳偶㑹合寧不歡别離恐難守懷哉羅敷言使君婦自有寄鄉友沈得淵沈君非凡流宿稟尚髙潔羡門注仙籍安期守真訣偶然落人寰世味遍已閲混迹雖同塵心神乃超絶蕭然一室內隱几常自恱時把玉簫吹翔鸞舞明月中秋玉堂宴集分韻得霄字素秋已云半清風滌炎歊況茲良夜月清光湛層霄玉堂有仙侣觴詠集英寮不以殘朽遺折簡頻見招頽然顧我影白髮何蕭蕭道同話自契意適興彌超佳章比金石迭奏諧雲韶匪徒愜清賞所樂際昌朝沈沈漏將曙遲遲斗轉杓良㑹自忘寐詎謂永茲宵題喬柯竹石涼風起東觀朝雨灑西清琅玕亞琪樹瑟瑟鳴秋聲爽氣集几研逸興悠然生染翰適餘暇聊茲寫閒情殷勤欲持贈披玩久屏營多君美無度素抱幽人貞願言勵髙節固此嵗寒盟題畫髙林俯清流小徑遵岸曲書聲松桂深知有幽人屋索居非遁跡讀書豈干祿義理發我䝉悅懌心自足古人已云逺古道宜自朂掩卷三嘆餘江天晚涵緑閏九月王修撰直宅對菊分韻得喜字送其兄行敏故人勞逺來所念在難弟久别忽相親安能不相喜況茲值閏九黃菊正靡靡掇英泛芳樽時羞雜陳几匪徒敘友于簮纓集鄉里顧余忝同姓相愛䝉見齒意洽形俱忘秩秩循有禮既夕復秉燭觴詠情難已天倫固云樂文㑹尤足美明河轉虛簷零露襲華綺衆賔雖已散遲留獨未起明發理歸橈離憂復茲始暮上吕梁洪黃河從西來萬里走濁渾吕梁乃故道勢若逸馬奔我來趨王程至此日已昏挽夫識豫意駕牛乘夜喧灘回石亂鬬水與船相吞攀援一失勢轉眼不可存巨纜雖云牢懷畏時自捫須臾際安流稍覺寧心魂因之勞其勤斗米代雙樽汝勞勿復道吾儕賴君恩夢兩兒兩兒别來久纍夜夢何頻得非我念兒無乃兒憶親夢中宛如昔田廬荒且貧猶能具雞黍為父招比鄰覺來尚征途渺然萬里身歸期固難必歸夢諒非真願言各努力進善光前人忠君我自勉孝悌兒當勤題徐訓導廷獻魁山舊隱人品如瞻斗山名合應魁地靈知孕秀天賦肯淹才筆陳驚同列文光燭上台髙攀蟾窟桂勇躍禹門雷已作鵾鵬化空令猿鶴猜經橫芹泮靜琴弄杏花開宦志雲霄待鄉心嵗月催黃殘松徑菊緑遍石田苔若便尋歸駕移文恐勸回呈太常少卿髙先生禮樂推三代文章似六經應時明出處當世仰儀刑賈誼趨宣室桓榮表漢廷青雲登棘位皓月映槐㕔大筆頻追諡豐碑屢作銘祝釐迎茂祉贊祀答穹靈聖主加榮寵儒林慕德馨聲名騰宇宙黼黻佐朝廷小子成樗散明公耀德星朽材難切琢鈍刃冀摩硎得照青藜火甘為白澤釘髙山恆仰止鄙業久荒寧詎敢思推挽何繇乞建瓴鮒魚愁旱轍籠鳥羡秋𡨕未許升堂室深懷捧户扃可憐昏瞀久欣覩鳯凰翎送趙僉事之福建任鸞棲淹枳棘鶚薦出風塵重寄藩維任榮遷耳目臣拜恩辭北闕僉憲入南閩驛路梅含笑都亭柳帶顰馬行吳地曉帆度浙江春㕔宇榕花合園林荔子新好山供日詠列郡待時巡本在紏彈職宜加撫育仁威聲銷墨吏疾苦拯黎民佇聽廉明譽君無讓古人上邑宰韓相公三十韻約字博文東河人號清軒纍官保定知府朝廷分郡邑守令職羣英列宿郎官象親民父母情學能知大體志在不虛聲廉介寒冰潔襟懷夜月明牛刀才小試驥足暫淹程木鐸來東魯絃歌亞武城下堂延德齒分俸給孤㷀待吏如奴僕同官若弟兄得人無不舉守節盡皆旌厚俗行鄉飲矜農緩賦征薄徭猶念重疑罪必從輕懦弱皆能立豪強莫敢攖便期銷獄訟何必事笞榜退食親琴瑟橫經難友生禮儀全考古動靜一於誠鬼泣淫祠毁神歆正典行黌宫登俊乂壇社潔牢牲蝗旱隨時雨陰霾不日晴野人多頌德朝士素知名百廢咸興葺羣黎享太平市廛泉湧貨郊墅屋連甍煙草人閒牧花村犬不驚酒肴歡伏臘溫飽樂蠺耕獨嘆還家客嘗為守塞兵病軀來絶域悲涕省先塋牢落傷弓鳥漂流泛海萍無因舒羽翼徒切羡鯤鯨燕石終身誤吳絲上鬢縈年華留莫挽志業苦無成安得除邊籍相容列下氓題蘭蕙軒武林陳仲和二子德中景中陳氏好兄弟宛如蘭蕙姿幽馨殊可愛雅操不求知但自栽培好何妨采佩遲叢深滋雨露茁長滿階墀芳澤傳先世香名達盛時和風同一室相對兩怡怡送祖人韶石住惠山諱懷祖真性海之弟子故鄉人到喜況是故鄉僧寓館才相見歸途又欲登杯浮辭建業鐘動下蘭陵新領禪宫席單傳祖𣲖燈性圓滄海月行潔玉壺冰舊社髙風振名泉勝槩增别情江渺渺鄉思樹層層憑語烟霞侶塵緣稅未能王舍人詩集卷一
