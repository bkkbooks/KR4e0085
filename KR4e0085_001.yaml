body:
  text: 主舎人詩集卷一明王紱撰白華美孝子也彼白者華維色之潔彼美君子修徳孔哲修徳伊何欲親之悦彼白者華維色之純彼美君子修徳孔仁修徳伊何以安厥親厥親在堂既悦且安旨酒稱壽室家相懽朝夕在斯外慕曷干君子之行莫先乎孝是曰順徳有禆名教子孫百世是則是傚白華四章章六句瀬水美仲琰也史仲琰能紹先志故美之瞻彼瀬水其流湯湯有美君子築室于傍厥心孔臧受天之祥瞻彼瀬水湯湯其流有美君子築堂于丘厥徳允修受天之休有澤可漁有丘可鋤我堂我居先人之廬我樂我志先人之書惟爾先哲積善有基一於為善而無自欺爰及後昆及慶之餘後昆振振徳鍾於門繼爾先志此心常存朂哉敬哉薄俗斯敦瀬水五章章六句雜詩鴻鵠志四海燕雀賀櫩端四海一何逺櫩端亦以安扶搖豈不慕跡拘諒尤難鍛羽喧朝景安得追風翰俛啄蕭艾間仰視天風寒斯舉咫尺足何必萬里摶撫已宜自養勿多身外干其二志鬰食哽咽情懽酒忘醉如何飲食間憂樂竟莫類達人無不可一以理自㑹時序侵燠寒晨昏互明晦茍能守吾中外患亦何憝忠信與篤敬乃足寡尤悔賢哉子張紳吾當永為佩其三秋旦露氣白初陽淡無暉羣雞正亂呌棲禽猶倦飛我行適中野躑躅烟路㣲蒼莽荆棘深零露霑裳衣去去既寡懽惻惻中心違素志諒難易知音古尤稀側身復惆悵拂旦吾當歸雜詩楚人獻竒璞號泣足見傷宋愚得燕石什襲固以藏至寳終自白瓦礫歸糞墻遭時自重輕没世誰短長儀秦乃赫赫孔孟徒遑遑仁義信迂濶功利足富彊舉世已如此念之熱中膓其二雅樂古而澹其如世不好鄭聲何浸淫四座舞且蹈感慨既異致善惡難類報禴天苦幽𤣥紛紛媚於竈所享茍非誠罪福恐顛倒立身豈無術理物良有道曽聞舞干羽苗格罷征討其三淒風西北来時序屬秋暮林野何蕭條草木怨霜露霜露亦何心大化運行故須臾屆嚴冬堅冰日凝沍蛟龍已沈淵蟄蟲亦坯户塗我林下屋裂我機上布陽春望望遙薄言善調䕶訪陳羽士道寧因贈我生樂夷曠幽抱常沖虚偶客京華塵不異林泉居時来訪仙侶相與論道書凝神入無象妙觀天地初物我既莫立孰謂形迹拘吹笙碧桃春天風動霞裾孤雲度碧落六合乃吾廬出門感羣動役役將何如雜詩客有三代器寳之金玉重考制謂尊彞求形類缾甕文欵隠斑駁光潤豈磨礱所嗟去古逺未足適時用什襲雖珍藏棄置相伯仲縦有好竒者相看為玩弄題悦心卷人生貴有養所養將如何惟以養吾心一善靡有他俛仰茍無愧靈臺藹天和嗤彼夸毘人嗜欲何其多所養亦以異紛紛蹈風波仁義譬芻豢千載吾師軻公子得野鳥公子得野鳥来自虞羅中羽毛何燦燦聲音復嗈嗈珍愛日為翫殷勤貯雕籠雕籠豈不貴勝彼荆棘叢飲啄就左右乃足安㣲躬野鳥性難馴飛撲尤忡忡比類忍莫同永隔雌與雄孰知野鳥苦秪恱公子容為翰林典籍沈民則題樂琴書處沈君搆華軒藏書復藏琴書以載古道琴以傳古音古人不可見唯此悦我心我心既自悦外慮俱銷沈涼生深竹浄日轉髙梧陰絃誦茍世守奚須滿籝金送楊得昂諱僶號静約鴻山鉅族我適桑乾歸君猶五溪去飄流若萍蓬何繇復相遇迢迢江上山厯厯煙中樹後夜月明時相思渺何處其二數載不相見一見驚復喜翻思兩地情音問隔千里宿雨暗洲渚飛鴻度江水孤棹即飄然離愁又重起題秋菊軒九月霜露零我氣亦云肅草木盡凋瘁而有籬下菊粲粲如有情盈盈抱幽獨我欲餐其英采之不盈掬呼兒具雞黍白酒正可漉素心二三人於焉敘心曲陶然付一醉萬事亦已足詠歌柴桑詩千載有餘馥瞻雲軒慈顔日已衰遊子日已違路阻千里脩心逐孤雲飛雲飛想其下輕陰覆庭闈何繇獲終養日舞斑斕衣王事靡有程嵗徂曷言歸望望徒自傷暮景西山㣲為張生寫竹思安登永樂壬辰進士陜西憲副卒年七十九生也纔弱齡骨氣已拔俗青衿三尺強對客瑩如玉頗亦好清事揖我求寫竹我方困塵途懷抱苦煩燠翰墨交久違硯破筆已秃憐渠意甚勤聊為掃新緑生能㑹我心進益必宜篤切磋與琢磨更請歌淇澳味易齋為周叔訓賦傳厚味人所嗜子獨味於道味道夫如何羲經日窮討大而天地外細則秋毫杪所遇各有味咀嚼期了了至味不可言惟應自知好非苦亦非甘忘飢復㤀飽澹泊養吾神泰和沃吾抱長年味斯味兀兀不知老掩卷坐忘言見此庭前草晴光宿雨收逺色連天杳咄彼芻豢徒胡為養其小澹雲巢大學士黄君嘗命㒒作澹雲巢圖為其尊翁諱性字思恭先生壽復徵詩遂賦有客居東山結廬山之隅林深藹芳潤清陰閟庭除泊然入無倪與時相卷舒自名澹雲巢其志將焉如雲以願從龍巢以産鳳雛及茲際昌運嘉應良不虛鳯既上阿閣和鳴向朝曦雲乃爛碧落昭囘五綵垂詎學巢與由負此唐虞時寫墨竹與蜀府明長史贈别相逢意方洽相别情尤難殷勤欲有贈唯此青琅玕矯矯蒼龍安濯濯丹鳯翰稟兹拔俗韻髙拂青雲端願言君子心冰霜同嵗寒寫竹贈王孟彬紀善昔我王子猷襟懷澹而沖獨結此君好彌久情愈隆不可一日無珍愛金玉同有竹輒宜造肯令通主翁我亦抱茲癖豪縑托幽叢遐躅邈難繼與君挹清風寫竹寄贈顧教授禄謹中秋聲起巫峽暝色迷湘渚悵望千里遙佳人渺何許幽期邈難值欲徃復延佇中夜獨遐思西忩颯然雨寫竹寄琴士張逢吉美人昔相見為我鳴瑤琴初彈别鶴怨復奏孤鸞吟掩抑弄餘意華堂夜沉沉涼月照綺席雲飈度瓊林一與美人别令我憂思深塵囂日盈耳何繇滌煩襟我欲裁嶰谷逺諧美人心六律既已調嘘陽翕羣陰美人如見與先此通㣲忱相期洞庭野共奏鈞天音題成趣軒桑麻日已長稼穡日已成門巷蔭榆柳隔屋繅車鳴生平寡營為遂此田園情衣食苦不乏公賦尤寛平舉家情欣欣澹然忘世榮力作雖云勞濁酒時共傾豈意事髙尚所樂安吾生盆裏黄楊黄楊乃嘉植岷蜀多産之喬柯起百尺小榦猶拱圍作器不沾垢櫛具尤其宜故人有好事全株逺相遺厥髙僅盈咫徑不踰分釐置之苜蓿叢何繇别竒姿況茲種來久十易寒暑時顔色固自好長茂何遲遲賦性恐或異雨露寧有私曽聞厄於閏此理疑見欺水土託盆盎滋養良可知嗟予久寂寞對此心神怡親之若賔友愛䕶如嬰兒清晝置書几良宵露堦墀時時為灌洒元氣猶淋漓叢葉藹芳潤孤根尚撑支願言保貞操與世相推移材良召斤斧曷用昂霄為唯應處巖壑庶可全天資題清適軒脩鱗泳深淵勁翮凌遙空命分不可易出處諒難同達人㑹斯理委順安厥躬外嗜既莫奪襟懷澹而沖蔡君夷曠士養素烟霞中軒居面湖水几案羅羣峯開樽待明月展席延清風心閒體常逸神完氣彌充惟以適所適寧煩計窮通咄彼夸毘人冒進何忡忡患得復患失冰炭交心胷悵然慕髙躅無繇得相從琴室為林典樂賦楣間掲寳翰床上横玉琴對客未成弄令人先斂襟地位近彤邸門逕幽且深瑤草露盈砌琪花香滿林應知月明夜時有鸞鳯吟我来偶相訪簾垂晝沈沈為鼓一再行宛見名軒心靈飈度餘韻祥烟散㣲陰氣和體自適神静心愈欽曲終莫敢問訝是鈞天音送闕秀才歸江右京國久為客悵然懷故山孰云乏知已念親已頽顔窮居恥明時曠懐良獨難因思衣錦榮何如綵衣斑空江一鳥度逺道孤舟還分手復延佇極目蒼茫間送端木員外孝思養病歸溧上諱智南昌人善草書都門已設祖冠盖聚朋儔讌别未云已騶從羅道周大夫何賢哉寵被君恩優為郎列仙署弄翰登瀛洲内帑出賜衣大官具時羞虚懷戀闕心補報嗟無由奈兹抱病質霜髩颯已秋上疏得優許養痾還舊丘舊丘況京甸咫尺溧水陬依依農圃隣藹藹桑柘稠頺齡尚可駐餘生得安休悠然遂髙志那復生離憂於時正陽月霜寒水痕收飄颻逺空雲浩蕩滄波鷗私懷徒嘆羨逸駕安可留題梅花結心已鐵石陽春忽先布發此瓊瑤英寧能慮霜露澹然絶世紛幽人雅襟度何如洛陽花池館資貴富姚黄與魏紫綺麗相誇妬春風閟重扃車馬日馳騖遂令貧者心對酒起遐慕乃知遊冶人誰復重貞素流澌古磵春殘雪空江暮清香不自知豈意人相顧題静庵卷為黄學士乃尊作性字思恭永樂有髙士簮纓舊名門耆年際昭代有子承君恩絲綸慎所職宻勿居詞垣賛襄竭忠藎惟思濟元元先生遂髙志悠然樂田園種植森且繁芝蘭滿階軒沖懷澹無慮隠几時忘言山光散餘靄水色明朝暾自得静者妙豈云厭塵喧賜金屢歸奉日以供盤飡時時叙隣叟倒此花下樽酒酣念恩澤一一相與論中心増感激永矢惟弗諼嗟哉静中意乃有仁道存髙風振千古里俗應彌敦代作送卓民逸歸淛東迎養憐君憶親苦我亦别親久千里隔庭闈孤雲幾迴首君今得歸省而我尚株守惆悵送君行澘然淚盈手春潮淛水船夜市蘭陵酒到家春未闌園林正花栁風飄萊子服盃獻蟠桃壽此志君已遂此樂我何有我亦欲效君未卜如君否題思本堂呉元凱求吳生故鄉来相見出詩卷自言搆新宇思本掲堂扁所哀怙恃恩造物苦多舛存亡既莫及㒺極情難展徒懷風木悲對客淚常泫願言求名筆幽光庶揚闡時時一披覽或俾哀悰遣嗟余久淹泊名卑材復謭拒生固辭謝再四終難免嗟哉吳生賢所志匪浮淺能存孝悌心悖理固應鮮惟恐人弗思能思即為善況復思務本本厚支自衍慎勿事虚文浮華肆誇演慎勿無益思戚戚徒悲愐所貴在立身名揚身益顯殷勤為生言進善當自勉蔡芝林為蔣公進求畫扇遂題芝林字元㫤蔣君我未識好事能延賓從㳺蔡夫子是可知其人謂我隘而介傲兀長居貧尚躭山水癖豪縑掃嶙峋一介不以取尤難輒交親片紙疇可得吾將永為珍夫子為之請一一重具陳仍持君扇来求寫湘江春我方習吾静天㳺浩無垠適聞夫子言笑落頭上巾丈夫貴知巳誼合情便真茍能志吾志寧謂非吾倫況聞君逺祖三逕招隠淪清風千載餘遐躅君能遵漬筆一揮灑翛翛見霜筠交加林影間團團月如銀時方涼雨歇齋居絶纎塵緬焉懷二仲安能與之隣擲扇返夫子衣袂凌風振為我先謝君美酒宜多詢秋髙月明夜直造君寧嗔呈太常少卿雲巖先生髙巖何巍巍卿雲日復聚孕秀鍾竒才靈氣藹寰宇已聞追䕫龍詎肯效巢許文章翊昌運禮樂佐明主陽囘棘寺春月滿齋宫午尊榮位崇秩學力在稽古自憐牛馬走質凡性尤魯雖懷問學心碌碌庸足數徒切瞻仞墻無由造堂户居然成涸鱗久矣困焦土願公巖上雲化作天下雨寫竹贈廖紀善霜風動髙秋草木抱悽惻唯此幽篁枝含翠終自得虚心養直氣勁節凌寒色持以贈君子願言崇令徳為姚生題終養堂姚生美昆季孝養怡親顔嘉味極甘旨彩衣舞斕斑慈烏堂下啼斜陽薄西山所思得終養區區百年間百年復能幾離㑹尤相關来日良可愛去日難再還美哉孝子心及時常追懽嗟予命獨舛怙恃早已艱何繇奉百年未得供一餐因君欲題贈使我摧心肝題萬安山樵山髙樵徑險山深樵徑迂采樵雖云勞覽勝尤足娛飛泉落林杪好鳥鳴丘隅歌逐天風還身與閒雲俱日夕行負薪烟深望吾廬得失既莫較孰知賢與愚嗟哉朱買臣富貴將焉如題義方書舎我昔童丱時䝉養絶浮靡朝夕常趨庭頗解學詩禮奈何纔弱冠早已失怙恃誨言何繇聞定省不復理徒懷風木悲没齒殊未巳及余生兩雛將以托宗祀既欲承箕裘當令業經史無何我多故謫戍向邊鄙迢迢父子心隔越數千里惟恐有存殁不暇較賢否漂流無定居嵗月動盈紀幸余初還家無恙共驚喜踉蹌拜我前並立肩可比弱質雖成人愚騃誠可恥大兒僅識丁唯足代耘耔小兒復癡頑真乃豚犬耳近令親筆硯十日書一紙我欲痛責渠隠忍輒中止吁嗟我平生父子乃如是邢君義方訓諸郎盡賢嗣芝蘭滿階庭玉樹暎屏几嵗時行具慶稱壽羅拜跽嘉賓每過従迎立具甘旨傳家務淳厚動必蹈前軌瞻彼天倫間藹若和風裏椿桂同敷榮雨露光薿薿緬懷燕山竇今昔良可儗所云積陰徳諒亦自兹始推此家政齊可致風俗美詩成發三嘆愧我曷能企豈惟頌君賢尤當示吾子題孝子曹鏞卷曹君本右族乃是武惠孫孝義出天性辭貌恭而温念昔父早没而獨母氏存母子守清素終鮮弟與昆窮居力弗贍藜藿供盤飱時有好善者有女願與婚既以承祭祀復茲奉晨昏奈何頗成立母老病且殙迎醫及禱祈徒然自趨奔母病日已劇惻惻心憂煩於焉割其股調和煑成䭈一啜病即愈依然對庭萱後来病屢作夫婦相與言再三至刲肝聞者驚心魂老天念其誠遂使母子完曽從視其傷肌膚尚留痕母壽盡天年此心可無寃至今問其故對客聲猶吞嗟哉孝子心勇為過孟賁殺身以成仁況茲㒺極恩唯知母所重此身何暇論世多不情子貶議争囂喧聖朝崇孝治特為旌其門豈徒事奬勸要使薄俗敦吾知孝義名千古留乾坤閒居與沈修撰小酌寫枯木竹石遂題我本山澤臞棲身伴樵漁謬承翰墨選布衣登石渠朝野孰云異依然樂閒居地位近清禁事罕人迹疎遂令公宇中乃若幽人廬苔蘚上堦砌竹樹羅前除匪惟宜壺觴況茲有琴書文㑹不待速朝夕與之俱俯仰皆自適此樂將焉如題耕讀軒出處既莫同趣舎亦云異君子適其宜窮達歸一致世榮吾豈薄先業非可棄復恐素心違蹇跡同顛躓耕田食吾力讀書樂吾志欣欣一家親朝夕寡憂慮俯仰茍自得外慕奚足嗜鹿門非求安南陽豈㤀世古人不可見唯將古心契過沈修撰留酌醉後書贈旅跡無可徃兀然生隠憂素性本簡拙出門寡綢繆感君獨知己情真久交遊況茲相近居来徃常遲留笑談散堙鬰杯酒屢勸酬供具即所有無煩備時羞陶然各盡醉不忮亦不求人生契合難數造君母尤題畫芳春始云邁倐忽驚素秋志業獨未就嵗月不我留羇懷渺難托寫此林塘幽喬木蔭苔逕孤亭俯清流悠然故園想詎敢為身謀含情委豪素庶或宜神遊雨中過歐陽編修館題竹木畫上我生本寂莫況茲久羇旅偶君素心人来徃迭賓主秋聲動髙樹暝色𣺌烟渚孤館坐題詩蕭蕭正風雨題松鶴軒吾宗有令弟所志樂夷簡載筆遊兩京襟抱常坦坦自言外祖翁素不治資産平生有研田耕穫同渭滻揮毫儗羲獻伯仲固無赧前朝雖薄宦名士交無限所居有長松蔚蔚張羽繖上有雙白鶴對之怡嵗晚吳興趙公子書價重圭瓉為寫松鶴軒騫翥龍蛇綰翁今久仙去徃事不可挽軒居成丘墟軒扁獨遺版青松未化石白鶴去不返追昔成夢寐令人淚長澘求君為寫圖庶或哀可剷君當憫其情不敢數催儹我亦重其請不敢辭以嬾欣然為一揮庭宇已蕭散須㬰㸃染成髙致如在眼急須潤吾筆沽酒奉杯琖九原如可作翁亦笑而莞為徐學正曦叔寄題其尊翁晚香卷徐君素髙尚雅志難適俗慕彼柴桑翁種此籬下菊黄花秋正繁白酒時一漉一觴聊獨傾三嗅仰餘馥有兒抱遺經典教濓溪曲迎養固靡遑時奉千里禄較之五男兒此時亦已足何當結比隣嵗晚相徃復寫畫題贈蘇性初歸吳復號宜闕我家住錫麓君家住吳城相去百里近一日孤帆程君才日方茂我髩日已白相逢一笑間共作京華客君今忽歸去别我將晨征懷哉舊猿鶴寫此丘壑情丘壑不可戀宜奮青雲志長安三月春沽酒待君至五月䝉賜衣五端自知素蹇劣謬忝列近侍孰云載筆勤清禁日無事聖心念長夏恩以絺綌賜感激既盈襟持歸復滿笥光榮動隣曲喜色見僮婢服之固難㤀無補獨深愧偶成題畫玉署坐涼思野人忝簮纓謬以染翰職遂得陪羣英疎雨澹東旭嘉樹蔭西清樂茲館閣静悠然抱閒情於焉弄豪素磵谷紛縦横幽逕遵曲岸鳴泉遶孤亭同㳺固未暇寓目猶可并菲才惜何補生幸承休明獨善堂為施惟政賦窮達雖不同在我固無異獨善與兼善此道一而二施君素髙尚衡陽久藏器雖曽佐花縣牛刀聊小試未幾即歸休自謂猶未至築堂南面嶽相髙争氣勢講道通天人讀書飽經濟遲當達天朝揄揚明至治不見有莘士躬耕豈㤀世幡然一旦起惠澤蒼生被君今已白頭明時幸遭值願言發其藴青雲奮髙志勿效棲棲人林居事幽致永嘉勝概卷為黄太守賦永嘉古名郡山水足清賞王謝舊登厯境在人已徃遺躅不可攀千載徒追仰黄侯来牧守政暇愛西爽邀人繪成圖厯厯如在掌嵐光樹蒼翠海氣天沆漭松塢出禪宫花汀隠漁榜桑麻接屋青機杼連村響樓臺俯崇墉阡陌遍膏壤彷彿行春時笙歌散輪鞅慙余謬通籍染翰近天仗披圖諒難即神遊起遐想題畫贈李醫士士文養痾坐虚館何繇制頽齡藥物固所頼奈此白髪生據梧聊自適褰幔當前楹涼風颯已至庭柯落秋聲天空暮雲逺日落遙山横攄懷託豪素悠悠塵外情卷之聊遺君非敢侔報瓊平易齋為李先輩李君素聞道襟抱常坦夷富貴與貧賤此志終不移蕭然一室中和氣藹春熈厯險思詭遇校之孰為宜重過劉竹深孟功敏昨朝復今晨造君何其頻我来適我暇君喜良不嗔語言有餘味所樂皆天真都城十萬家澹泊情偏親臘日梁修撰用之以還家初散紫宸朝七字為韻命賦七首大化無停機寒暑如循環嵗華忽云暮陽和亦已還人生百年内憂喜互相關顧匪金石姿安得長朱顔達人㑹斯理意與雲俱閒聞道愧獨晚衰也吾何歎右還字憶我童稚時鄉儺競喧譁自從别鄉縣嵗嵗天之涯俯仰能幾時兩鬢忽已華今年在京國臘蟻汎流霞酡顔發髙詠悠悠興何賒皇風無逺邇四海同一家右家字寒旭上東觀殘雪明石渠嘉平錫華宴曉入承明廬珮珂肅西清韶音聞笙竽自顧草木同澤被仁風嘘孰知四序周正茲萬物初報國乏經濟白首徒嗟吁右初字八蜡聞古禮臘日在兹旦迎祭思報勞貓虎禦田患鑾輿幸郊原校獵旌旗燦獲禽足練武震蕩妖氛散上以共乾豆下以具賓饌時雍年榖豐河海永清宴右散字十五初志學性頗嗜經史謀生計已疎豈復親耒耜自期徳業成拾芥取青紫中季遂蹉跎五十始從仕扈從遊兩京伏臘已三祀寸勞不能効竊禄抱深恥右紫字瑤花已三白臘戍當茲晨田家願豐稔對此尤欣欣嵗功已云畢斗酒敘比隣共言足公賦擊壤同堯民慚予不耕者承乏侍紫宸素餐不見斥惟應仰皇仁右宸字我本山澤民浪跡隨漁樵豈意䝉齒録置身事清朝矧居翰林場交好皆英僚歳時遇伏臘詩酒常見招壯懷固浩浩白髮何蕭蕭醉來目雲漢寂黙神彌超右朝字送炯竺庵之寧波都綱師本學佛徒而我忝從仕儒墨雖不同崇教各鳴世泝流求其原要亦無二致皇朝設僧司統屬官府例自非名勝流此職良不易師今預兹選領命辭丹陛都城雪初晴越水春將媚齋餘只翻經公退但哦偈難㤀北闕心廣演西乾意慚余老無成素餐糜廩餼終當效季真共結方外契為㳺伯瓌題静觀巻羣動日擾擾何由止囂煩我心一以静庶或澄其源天髙四山寂日落孤雲騫至理無不在朝市同丘園君應領斯妙吾亦㤀吾言贈友君家住蘇城我家居錫縣鄉里舊知名都門才識面君當職筦庫我幸勤筆硯退公無所為得暇輒相見清玩常命觀芳樽屢叨讌交情尚平易世務摠諳練處静惟端莊遇劇即通變歎羨徒爾嘉懷慚未能薦適茲代者至復預天官選誰言九霄長獨快六翮徤扶搖良可期惟恐迹相逺送松溪宰周景辰調連城君従松溪来又復連城去宦逰若萍蓬流轉那能住百年多逺别握手幾懽遇況茲當暮齡幽抱復難愬都門一杯酒囘首知何處天南與天北相思𣺌雲樹病起寫山水圖謝張逢吉先生少小昧調攝動或違天和迨茲晚年至疾疢宜其多所念竊美禄置身在鑾坡寸效未及施報國將如何張君負竒術垂情屢見過爰以慰㣲志匪徒起沈痾日来力漸完稍能盻庭柯殷勤理冠屨載振朝天珂感徳曷云喻銘心久難磨揮毫寫山水持奉志靡他山以崇令徳水以衍後波題畫衡門掩秋色苔徑浄無塵人跡雖罕至簡編良可親修篁度涼颸髙梧落繁陰時應散幽寂采藥過中林為王彦本題樂善堂萬類既莫齊人生有賢愚所趨各異向所樂亦已殊仰惟古聖哲動與道誼俱窮巷雖飲水寸心常有餘咄彼夸毘人多貪竟㤀劬茍得適暫欣旋踵即憂虞吾宗有佳士近寓都城居形迹隱㕓市心志在詩書生業惟足用何嘗逞豐腴有妻主中饋有子従師儒老老復幼幼一家常宴如我適扈蹕来相延過其廬新酒初潑醅時羞問園蔬維時春正好芝蘭滿階除累觴不知醉賔主情怡愉譜牒未暇論亦足敘友于髙堂扁樂善此語良不虚酒闌袖出卷辭章揖我須我惟三槐澤今尚䝉沾濡後裔能不墜其亦在子歟願言崇令徳始終永無渝贈胡都給事中濙洪武庚辰進士少傅兼太子太傅禮部尚書卒年八十九贈太保謚忠安都給事中胡君源潔文雅清慎志趣髙朗與予有同郡之好嘗自大江而上岷蜀繇闗陜至於中原凡名山古蹟之間履無不至今年邂逅北京同宿寓所因得扣其登覽之勝聞見之廣不覺令人鄙吝頓消而神爽飛越也遂賦詩美之皎皎瑤臺鶴濯濯冰霜姿宿昔有仙契於焉慕安期翺翔厯蓬瀛飲啄来上池寸丹久已就八表隨所之静與元氣并動與祥飈馳㒺象莫可測𤣥珠應自知乃令雞鶩羣矯首徒嗟咨寄贈任給事中時在武當山中君本霄漢客降謫留人間人間不可住又復逰名山彩霞絢春衣瑤草腴朝餐髙風邈難及悢悢心所攀和曽侍講古意棨字子啓永樂甲申狀元靡靡風外花濯濯路傍栁盈盈馬上姝皎皎出素手揮鞭度南陌行人盡囘首芳香襲和風皓綵奪目久轉盻睹他人百媚自成醜孰云君子配終恐匪佳偶㑹合寧不歡别離恐難守懷哉羅敷言使君婦自有寄鄉友沈得淵沈君非凡流宿稟尚髙潔羨門注仙籍安期守真訣偶然落人寰世味遍已閱混迹雖同塵心神乃超絶蕭然一室内隠几常自恱時把玉簫吹翔鸞舞明月中秋玉堂宴集分韻得霄字素秋已云半清風滌炎歊況茲良夜月清光湛層霄玉堂有仙侣觴詠集英寮不以殘朽遺折簡頻見招頹然顧我影白髮何蕭蕭道同話自契意適興彌超佳章比金石迭奏諧雲韶匪徒愜清賞所樂際昌朝沈沈漏將曙遲遲斗轉杓良㑹自㤀寐詎謂永茲宵題喬柯竹石涼風起東觀朝雨灑西清琅玕亞琪樹瑟瑟鳴秋聲爽氣集几研逸興悠然生染翰適餘暇聊茲寫閒情殷勤欲持贈披玩久屏營多君美無度素抱幽人貞願言勵髙節固此嵗寒盟題畫髙林俯清流小徑遵岸曲書聲松桂深知有幽人屋索居非遯跡讀書豈干禄義理發我䝉悦懌心自足古人已云逺古道宜自朂掩卷三嘆餘江天晚涵緑閏九月王修撰直宅對菊分韻得喜字送其兄行敏故人勞逺来所念在難弟久别忽相親安能不相喜況茲值閏九黄菊正靡靡掇英汎芳樽時羞雜陳几匪徒敘友于簮纓集鄉里顧余忝同姓相愛䝉見齒意洽形俱㤀秩秩循有禮既夕復秉燭觴詠情難已天倫固云樂文㑹尤足美明河轉虚簷零露襲華綺衆賔雖已散遲留獨未起明發理歸橈離憂復茲始暮上吕梁洪黄河従西来萬里走濁渾吕梁乃故道勢若逸馬奔我来趨王程至此日已昏挽夫識予意駕牛乗夜喧灘囘石亂鬬水與船相呑攀援一失勢轉眼不可存巨纜雖云牢懷畏時自捫須臾際安流稍覺寧心魂因之勞其勤斗米代雙樽汝勞勿復道吾儕頼君恩夢兩兒兩兒别來久累夜夢何頻得非我念兒無乃兒憶親夢中宛如昔田廬荒且貧猶能具雞黍為父招比鄰覺來尚征途𣺌然萬里身歸期固難必歸夢諒非真願言各努力進善光前人忠君我自勉孝悌兒當勤題徐訓導廷獻魁山舊隠人品如瞻斗山名合應魁地靈知孕秀天賦肯淹才筆陣驚同列文光燭上台髙攀蟾窟桂勇躍禹門雷已作鵾鵬化空令猿鶴猜經横芹泮静琴弄杏花開宦志雲霄待鄉心嵗月催黄殘松逕菊緑遍石田苔若便尋歸駕移文恐勸迴呈太常少卿髙先生禮樂推三代文章似六經應時明出處當世仰儀刑賈誼趨宣室桓榮表漢廷青雲登棘位皓月映槐㕔大筆頻追諡豐碑屢作銘祝釐迎茂祉賛祀答穹靈聖主加榮寵儒林慕徳馨聲名騰宇宙黼黻佐朝廷小子成樗散明公耀徳星朽材難切琢鈍刃冀摩硎得照青藜火甘為白澤釘髙山恒仰止鄙業久荒寧詎敢思推輓何繇乞建瓴鮒魚愁旱轍籠鳥羨秋𡨕未許升堂室深懷捧户扃可憐昬瞀久欣覩鳯凰翎送趙僉事之福建任鸞棲淹枳棘鶚薦出風塵重寄藩維任榮遷耳目臣拜恩辭北闕僉憲入南閩驛路梅含笑都亭柳帶顰馬行吳地曉帆度浙江春㕔宇榕花合園林荔子新好山供日詠列郡待時巡本在紏彈職宜加撫育仁威聲銷墨吏疾苦拯黎民佇聴廉明譽君無讓古人上邑宰韓相公三十韻約字博文東河人號清軒累官保定知府朝廷分郡邑守令職羣英列宿郎官象親民父母情學能知大體志在不虚聲㢘介寒冰潔襟懷夜月明牛刀纔小試驥足暫淹程木鐸来東魯絃歌亞武城下堂延徳齒分俸給孤㷀待吏如奴僕同官若弟兄得人無不舉守節盡皆旌厚俗行鄉飲矜農緩賦征薄徭猶念重疑罪必從輕懦弱皆能立豪強莫敢攖便期銷獄訟何必事笞榜退食親琴瑟横經難友生禮儀全考古動静一於誠鬼泣淫祠毁神歆正典行黌宫登俊乂壇社潔牢牲蝗旱隨時雨陰霾不日晴野人多頌徳朝士素知名百廢咸興葺羣黎享太平市廛泉湧貨郊墅屋連甍煙草人閒牧花村犬不驚酒肴懽伏臘温飽樂蠺耕獨嘆還家客嘗為守塞兵病軀来絶域悲涕省先塋牢落傷弓鳥漂流汎海萍無因舒羽翼徒切羨鯤鯨燕石終身誤吳絲上髩縈年華留莫挽志業苦無成安得除邊籍相容列下氓題蘭蕙軒武林陳仲和二子徳中景中陳氏好兄弟宛如蘭蕙姿幽馨殊可愛雅操不求知但自栽培好何妨采佩遲叢深滋雨露茁長滿階墀芳澤傳先世香名達盛時和風同一室相對兩怡怡送祖人韶石住恵山諱懷祖真性海之弟子故鄉人到喜況是故鄉僧寓館纔相見歸途又欲登杯浮辭建業鐘動下蘭陵新領禪宫席單傳祖𣲖燈性圓滄海月行潔玉壺冰舊社髙風振名泉勝槩増别情江𣺌𣺌鄉思樹層層憑語烟霞侶塵緣稅未能王舍人詩集卷一
