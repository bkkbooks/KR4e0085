body:
  text: 王舍人詩集卷二明王紱撰過華叔端草堂寫晴雨竹壁上諱恪號賔晹卒年七十七我愛君家逺城郭繞簷竹色侵簾幕醉中揮翰寫晴梢湘雲一剪春陰薄看來頓覺風氣清耳邊恍若聞秋聲嘯歌到晚不歸去高卧翠陰呼月明高軒置酒延夕曛眼前知己無如君枯腸醉後有芒角手揮高節凌青雲圖成自覺精靈聚素壁俄然儀鳳羽擬得秋聲直造來剪燭連床聽風雨溪山烟雨圖為包公愷寫溪山茆屋知何處隔岸青山暗烟樹一棹誰兮路欲迷緣流似逐桃花去嗟豫落寞江海濵到今懶欲問通津因君扇底塗狂墨煙雨蒼茫一片春為宣指揮題枯水竹石修竹娟娟淨如洗古木槎牙半空倚莫嫌怪石長蒼苔當年曾中將軍矢將軍年少多竒勳平生意氣凌秋雲他年太史書勳業汗簡須當用此君吳姬留客行吳姬年少才十六能抱琵琶唱新曲愁連山黛鎖青蛾汗透霞綃濕香玉問郎今去宿誰家郎須聽妾彈琶琶吳城有酒不肯住巴姬未必顔如花遲留那得情相與芳心一一絃中語空江霜落呌征鴻孤棹風高響秋雨須臾倣佛臨三湘切切哀猿堪斷腸巫陽雲暗楚臺曉故山不見關山長彈到悲笳少三拍郎心欲去何匆迫挽郎不住郎過船滿江月色秋潮白題枯木修篁圖老幹昂霄幾千丈天籟時聞夜聲響一竿修竹共蕭森復托絲蘿半空上寒姿久抱幽人貞良材孰肯摧為薪總令匠氏未相遇故山風雨年年春早行索水雞鳴晨炊戒輪鞅閉門一㸃明星上路出長林不見人煙深咿軛車聲響須臾日出氣象分往來行旅才紛紜僕夫笑指都城近宫殿岧嶤五色雲為楮府髙先生賦牧雲歌我聞黃初平牧石驚其兄至今山中石尚作羝羊形又聞蘇子卿風雪牧北庭辛勤十九年猶持漢家旌未聞牧雲誰氏子牧雲自號逃其名雲中所牧竟何物以雲為牧何所憑比之牧石仙猶乃繫塵纓意為牧雲人足不到邊城但見長裾曵侯第傍人指是侯門英靜中默與元氣㑹雄談四座風雷驚端倪變化竟莫測顯晦孰可知其情得非當年豢龍氏馴致神物驅幽靈豐隆施鞭掣明電天吳出浪翻滄溟厥術乃至是厥德良可稱吾將薦之逹天府遊帝廷好施霖雨蘇蒼生嗚呼好施霖雨蘇蒼生題張縣丞凝翠軒卷張君結廬修竹裏一榻清風淨如洗幾畨過雨看新晴簾捲春陰落烏几自從作官今未回家僮日掃林間苔何當直造遂吟嘯不問主人毋見猜少婦行東家少婦年十五嫁得良人出為賈經年書到不言歸肯念春閨别離苦西鄰年少猶空房紅纓白馬羽林郎眼傳芳意已相密願作雙棲鴛與鴦朝聞賈死驚未訃暮奔已作西家婦六親䝉恥無光輝方逞妖淫濃態度歡情得遂無幾時羽林從征須别離欲去翻思疇昔事叮嚀恐亦還家遲妾言勸郎郎勿疑妾今貞守無他為可憐婦道真能盡去後郎心肯全信為夏叔度寫葡萄子雪洲之上因賦叙别我生負氣尤好竒襟懷抑塞蟠蛟螭屢遭屈折莫我知向人委順長低埀倘爾逢君雪洲上酌我涼州寄來釀醉傾墨汁為君塗一吐胸中氣千丈維時雨歇凉風生薄陰零亂縱復橫蟄龍蛻骨冷雲濕驪珠出海秋蟾明坐間觀者皆驚訝何繇寶帳人間掛恐令癡眼起貪心主者收藏始知畫知我如君能有幾此術聊將逰戲耳白鷗湖海一身輕長揖謝君吾去矣題青山白雲圖我曾九龍山下住結廬正在雲深處日日看山還看雲長教剪却當簷樹無端一别猿鶴羣馬蹄南北徒紛紜塵途底事拂衣晚回頭愧負山中雲贈竹隱君家繞屋多修竹簷外時聞響寒玉雨歇林忩風日姸春陰一榻侵衣緑閉戶常令俗駕回從教三徑長蒼苔豫今亦有王猷癖直造休嫌數往來倭扇謡倭人繭紙摺為扇缺月生輝銀滿面闕下年年多貢餘都人重購何紛如杭工巧黠思爭利效倭為扇渾無異價亷百十人不慊說是倭來方道地倭來道便經杭州亷價却將杭扇收倭收杭扇堪驚怪轉眼街頭髙價賣買扇還家誇扇真街頭持賣真倭人倭人繭紙摺為扇缺月生輝銀滿面闕下年年多貢餘都人重購何紛如倭言我扇不欲利只欲人間古銅器器好年多扇亦多猶解摩挲看欵識倭能論器不論財尊罍彞鼎填街來幾人懷金不得扇手中無器空徘徊吁嗟古器日應少倭貢年年扇來好送醫士張孟經歸華亭張君深得活人理白髮蕭騷垂兩耳顔靣如童步若飛自說平生能服餌京都賣藥三載餘簾埀一榻㕓中居榮名利祿不掛口向人只講岐黃書曾聞舊業松陵曲井臼依然鄰二陸鱸肥秋浦蓴正香虎卧芳林杏初熟今年忽復思東歸海門一葉春帆飛到家尊酒作良㑹當時耆舊今應稀都門柳花飛白雪欲折長條贈君别不知此去幾時來我亦相從問丹訣送潘知縣之餘干潘郎年少才力强筆端五色成文章新承寵擢宰山縣送别都門春酒店君今與我交雖淺志業人生宜自勉此日牛刀聊試為他時驥足應須展千里江帆一帶斜餘干地沃多桑麻時清自喜少徭役琴弄春風滿縣花送傅子晦教授之興化扁舟欲别之何處一官典教閩中去細雨榕陰面面山薰風荔子家家樹憐君年少非常倫才贍人稱席上珍黌館講餘清晝永玉琴閒弄杏壇春贈朱編修朱君乃是青雲器讀書不負平生志向曾龍躍禹門雷跳浪翻空應得意聲名藉藉動京華䇿對明廷衆所誇鰲首已攀蟾窟桂馬頭還看鳯城花斯文仰羡增光顯稱述猶存贈行卷鏗鏘金石韻相宣逺大期君意非淺君今寵擢登鑾坡玉樹花深響珮珂五色文章成黼黻九天光采動星河嗟豫久已聞英譽勢比雲泥固難㑹年年枯死案頭螢四十無聞何足畏不期邂逅同清朝菲才未免旁人嘲癡蠅附驥亦致逺托身願結青雲交挽徐母平生嫠居氷雪清教子讀書名已成正期祿養體長健俄聞凶訃人皆驚柳楊青青楊子渡江山依舊來時路春風丹旐引歸航遺骸並葬良人墓題漁樂圖遙遙雨歇明殘霞凉風颯颯吹蒹葭晚來隨處可棲泊五湖煙水皆吾家得魚且覔津橋酒旋採溪毛雜菱藕除著沙鷗孰可親隔蓬喚取鄰船叟生計年年一葉舟全家不識别離愁婦能斫鱠兒行盞一笛橫吹萬頃秋為袁將軍題梅軒卷我家舊業梁溪濱雪晴溪上梅花新瓊林皎皎映書屋天然富貴誰言貧花時倍覺多賓友經月勞勞事詩酒滿座香風半醉時一簾皓月微吟後自從承薦遊京鄉十載看花白玉堂貞操久應心似鐵風流其奈鬢成霜今年扈從來幽薊撲面緇塵滿衣袂欲覓梅花杳莫聞江南驛使憑誰寄春到都城十萬家管絃處處聲嘔啞不識氷姿尚清素只知豔質爭繁華朝來雪花如手大興來不管貂裘破蹇驢鞭䇿訪袁安不似當時閉門卧弓矢森嚴櫪馬喧羽林期獵窮郊原見豫一笑不復出呼酒且共登梅軒未始栽梅向軒下髙扁梅軒衆驚訝自說平生極愛梅此地無梅僅堪畫畫師乃是錢塘人西湖久與逋仙鄰曾作烏臺鐵面使筆端解寫梅花真嗟余久抱梅花思感戀君恩忘歸計畫中才見即相親分明一段家山意慘淡枝頭雪未乾灑然清氣逼人寒君今與我心相合莫厭敲門數借看題中條舊業圖卷為王士烈大尹中條之山何雄哉層峯叠嶂髙崔巍太行嵩少與之相胍絡禹門鑿斷迥向中天開下有黃河水奮激聲如雷波濤萬里接銀漢到此曲折其勢相縈回佳氣日磅礴孕秀多竒材寶藏百物不足貴往往間出人中魁不見巖下士版築將終身寧知一旦叶夢出大施霖雨康斯民唐有裴中立平淮之功誰可及宋有司馬光文章事業何煌煌至今行人過闕里景仰式車臨路旁吾宗有兄王士烈世向山中營舊業數頃良田萬卷書父祖傳來今幾葉父祖唯積善素無功名心到君尤加學問力長年閉戶松桂林九經百氏貫乎一律歷地理俱精深鶴書逺召來相尋小試百里彈鳴琴岐麥薿薿桑陰陰黃童白叟皆謳吟近歲皇家事陵寢北京山水明如錦葬師不下數百人取驗求真口皆噤郭璞之術君所間天下山川指掌間漢唐陵寢考分寸琅琅一奏開天顔天顔悅懌恩加厚太官供羊光祿酒崛起長陵北山阜有詔封山號天壽海晏河清億萬年知君名與兹山久君今遷擢居帝都駿馬蹴踏育雲途聖明在上不可辜隨時正好陳嘉謨勿作尋常淺丈夫區區懷土胡為乎傅說諸君久已往空山猿鶴空相呼白雲紅樹秋糢糊為君寫作中條圖古今志山同一符君當解衣為我沽㑹須一飲傾百壺醉後與爾歌嗚嗚唾壺擊折青珊瑚中條佳氣無時無嗚呼中條佳氣無時無月夜舟中酒後寫呈胡祭酒兼同行諸公官船泝河明月夜千里河流金液瀉水拍船忩月在天月色波光兩相射此時清興不可遏須待傾觴共陶寫行庖美味雖云重更覓溪鮮問漁舍蟹螯初肥良足珍霜餘梨棗甘於蔗同行况復皆賢豪襟懷豈是尋常者胡公一代大司成文章聲譽追班馬延陵給事錢塘客每出新詩擬風雅東陽兄弟居翰林一雙白璧千金價林黃二子才更竒往往辭氣凌鮑謝雲間尤喜紫陽孫筆底龍蛇衆驚詫一時㑹合非偶然共沐恩光來日下霏霏珠玉動生風濟濟衣冠儼成畫嗟豫年少嘗好遊臨水登山日無暇時當有月逹旦飲典衣肯顧山妻罵年來老病不復飲每見深杯輒生怕不知今夕是何夕狂態依然莫能罷酒闌興盡不復散共向船忩相枕籍須臾月落水自流斗柄低回柁樓掛騎鯨李白逺莫攀夢鶴坡翁久仙化人生所貴在適意塵慮何須苦縈罣燈前漫爾寫長謡留向他年作佳話題竹送周以莊之長清宰故人别久才相見又拜恩光宰花縣去思匆匆不我留都門沽酒徒攀餞我有五色之彩翰為君寫作青琅玕虛心慣承雨露重髙節豈畏氷霜寒此意贈君君逹否清風雅撡君皆有君到長清轉覺清不須更種陶潛柳題竹寄長清胡判簿仲文胡君倜儻情見真昔曾同客京華塵一官去作長清簿吏民懷惠如陽春别來不覺經年久愧我蹉跎空白首為寫清風慰逺思殷勤致問平安否題劉給事中畫獨立空山不知老崖石相依共相保月影秋清舞瘦蛟風聲夜半驚棲鳥錯節盤根怪且竒古翠滿身苔蘚滋匠石自知難入眼年年春雨長孫枝題師將軍壽椿堂我聞南華老仙所談之靈椿長年度世殊可人爾來萬有八千歲方乃一秋兼一春桓桓師將軍忠孝孰可倫緬思此椿壽將以奉嚴君嚴君乃是先皇之虎臣英姿雄略如有神起家昔住荆溪濵曾同周處為比鄰惟將三尺劍掃淨六合塵先皇騎龍上蒼旻攀髯不及空逡巡至今心尚赤其奈髮如銀將軍襲爵尤忠勤逺持節鉞鎮八閩列鼎之養何足珍惟思種椿搆堂怡其親君不見椿枝長茂椿葉重堂前人對椿陰濃靈根盤結托厚地髙柯直上摩蒼穹蟠桃見之猶屈膝喬松並之應斂容况並顰睂楊柳低頭榕世間凡木莫與同嗚呼世間凡木莫與同唯孔明廟前之老柏千古可與相爭雄聚玉堂為吳主簿賦君家子弟追王謝玉樹森森滿庭下器美難容韞櫝藏才髙應得連城價堂前見客溫相和德業尤宜更琢磨遲看懷寶聮班出南陌珊珊響珮珂題北堂春晝卷堂下萱花照人目堂中阿母顔如玉寸心難以答春暉手線尚存遊子服遊子白雲空復情年來從宦留神京他時得請當歸省閭里應看晝錦榮題徐進士峴山讀書卷徐君結茆雙峴峯白雲掩護青林中十年閉户不肯出讀書捲幔來松風一朝射䇿黃金殿青霄萬里鵾鵬變躍馬晴看紫陌花鳴珂曉入瓊林宴只今祿食居京華藉藉香名衆所誇不獨身霑新雨露且能光賁舊烟霞愧我萍踪遍江海百事無成鬢容改數卷殘書久已忘舊物惟留短檠在年來感荷君恩優日令揮翰居瀛洲姓名自謂登仙籍人笑馮唐已白頭題黃庶子瑞菊軒卷淮字宗豫紫陌朝回鳯城曉羅衫冷怯霜風早軒前佳菊吐竒花合蕚連葩向人好陽光一照色更鮮盈盈兩臉胭脂妍同心可比連理木清香絶勝雙頭蓮簮纓列坐皆僚友嘖嘖看來嘆希有宜將綵筆寫新圖持歸逺為雙親壽繇來種德生賢郎家庭晚景何輝光絲綸日掌侍清禁阿閣五雲儀鳯凰物因人瑞皆從類人今况與明時㑹乃知聖主得賢臣兹花亦是皇家瑞送永嘉趙惟善之北京司倉趙司倉初辭闕一鞭逺冒燕山雪燕山雪滿河氷結酸風刮面肌欲裂長安沽酒與君别酒酣不覺雙耳熱嗚嗚作歌歌激烈煩君為我同擊節試看昭王臺黃金致英傑黃金散盡臺已空至今士氣何曾歇幸並際昌期沈淪盡超越班資正為賢才設况君年壯才更哲鵬化南溟十萬程君今始上青雲轍肯為兒女情臨岐動悽切丈夫要使心如鐵江南梅花為君折路長勿使音書絶兩地相思共明月題畫魚上池生緑氷初泮暖逼小桃紅欲半纎鱗猶得泳恩波何異鯤鯨運溟瀚變化逢時底用媒相忘蘋藻且徘徊為龍聞說勞行雨秪恐禹門雷電催送張知縣邦逹我初長安識君面四十才華正强健北海雲鵬翅欲張南山霧豹文初變自言來京已三載足跡勞勞半郵傳東浮浙水駕風濤西上蒼梧躡雲巘懷中無復茂才金身上空餘慈母線别去無何忽相報近得髙間適安便乃知優給有庠序擇師教育君膺選綘帳三間坐百人青襟一字數千遍三略才過又六韜終日吾伊不知倦吁嗟天意諒有在有美如平豈貧賤今年詔下大搜賢公論推君當鶚薦扶搖直上試天官一䇿敷陳雲錦絢賞音不獨主司驚嘖嘖旁觀盡稱善緑綬初埀何所之獨向炎方宰花縣炎方近年無瘴癘民物安然樂豐羡逺徼尤宜寬政施皇恩有待仁風扇此行所重民社寄臨别肯為兒女戀秦淮弱柳埀青青折取長條共攀餞沙口帆移燕語留花前酒續鶯聲勸明朝應度嶺頭雲千里相思一回眷遲子三年政績成還來此地重相見薏苡曾為馬援珠歸囊肯帶包公硯驥足應知難久淹嘉聲又逹明光殿題王將軍梅雪軒襄陽耆舊孟浩然雪中騎驢聳吟肩西湖處士林逋仙梅邊引鶴烏帽偏二子寒酸無所托遂與梅雪同清妍將軍執鋭常披堅竒勳要使彛鼎鐫雖䝉優擢入衛尉可容梅雪相留連我知將軍非泥此朝市乃欲如林泉况今四海同一天無勞萬里橫戈鋋雅歌投壺分內事孰謂梅雪非我便種梅五六株搆軒數十椽花時雪霽江月圓香影滿庭氷玉鮮時時退直得清暇開軒命客烹肥羶從教曲奏譙樓角任取寒生玉帳氊梅以供鼎實雪以呈豐年上祝天子萬萬歲歲歲陽春生意全乃知將軍愛梅雪寒酸之士正爾霄壤懸題襏襫軒為夏叔敏賦號東臯無子外孫張延宗繼祀長年耕鑿東臯阿結得草軒如草蓑栖身僅足蔽風雨抱膝猶能發詠歌忩外鳩鳴花霧重門前犢卧柳陰多嗟豫久作京華客未得歸田奈爾何送深上人湛然遊方我生憶當年少時清狂縱逸誰能羈杖頭百錢一壺酒布襪青鞋隨所之不肯低頭學干謁每向名山訪幽絶片帆晴度浙江濤匹馬寒衝薊門雪黃河西來一帶橫岷江東下連滄溟望中惟覺隘寰宇物外尚欲登蓬瀛年來潦倒渾無用疾氣攻身常隱痛稍因休暇輒欲眠並舍相呼懶行動矧並感荷君恩深優容散逸居詞林私懷固有尋山約激切難忘戀闕心雲水烟霞應宿好靜自尋思還自笑至今天姥與匡廬清夜猶能夢中到深師乃是學佛人與豫似有三生因嶺上孤雲久為伴天涯片月長隨身清容磊落蒼崖古破衲斕斑雜繒補不惟潭底解降龍才遇山深即馴虎初從雲中登五臺淮流杯渡江雲開少林長蘆雖古剎叢林須向京都來京都諸山遍遊矚猶能過我蓬菴宿對榻聽殘上苑鐘論詩剪盡西忩燭相看身世總忘機水自潺潺雲自飛師利逺尋居士室大顛留却使君衣無心偶爾欣相遇又復飄然拂衣去問師此去遊何方多半名山我遊處大江南北浙東西是處堪行路不迷試覓名山最竒處石間多有我留題送梅知府之亷州亷州作宰六載餘懸知撫字常勤劬土風自古少耕稼民業至今多採珠歸路惟迎竹為馬公庭示辱施鞭蒲他年太史論循吏惠政應推君最殊過梅花堂我曾泊棹西湖濱千樹萬樹梅花春孤山月照一蓬雪十里湖光如爛銀興豪對客酣清宴逹旦賡吟騁雄健燈前索紙呵手題霜兔鏦鏘氷滿硯年來浪迹隨西東看花多在驅馳中縱有香醪對明月渾無好興酬春風只今書劍來京國欲訪梅花杳難得亭館多栽逞豔姿山林誰重凌寒色春來未幾薄雪餘寒驢偶過西城隅疏花寂歷三五樹中有一室幽人居室中幽人廣平後旅寓看花為花瘦忩橫古影神愈清杯吸寒香骨應透相逢休言一事無鄰家有酒須賸沽趂取樓頭未吹角莫教地上魚鱗鋪我因看花狂興發花應笑我生華髮曲逆長貧豈足論馮唐已老誰能拔憐君與我同襟期看花酌酒情相宜百年一任世所棄寸心獨許花相知我家君家隔江浙一水相通吳與越此夕何如對榻眠夢魂還醉西湖月長詩一章美韓侯也侯宰無錫多善政復以捍禦有功遂升州守之秩行且有日鄉人王昶㑹豫京師能具談侯德豫辱知遇尤深弗得歸預攀轅之列敬用次第昶言賦成長詩五十韻使邑人歌之竊比甘棠之詠云耳有客黃昏來寓邸扣門吳語知鄉里肅容升堂再拜餘䄂出平安書一紙上言間濶苦憂思下叙寒溫詢動止燈前雞黍欵客嘗品味無兼嗟客裏酒酣詢訪悉鄉閭祗說韓侯政聲美自從侯初下車日務敦朴厚消浮靡勸民衣食務農桑游食咸驅業耘耔西風阡陌凉雨晴黍稷盈疇光薿薿日斜村巷歸牛羊霜老園林熟梨柿每歲春秋社祭餘親率吾民行飲禮推崇有德尊髙年一一酒行躬拜跽賓主從容酬獻間觀感人人良有啓時因公暇入庠舍左右琴書坐憑几諸生濟濟趨上堂問難執經窮至理遂致吾鄉孝弟風敦睦敻非他邑比縱有凶頑亦革面訟庭罕見施鞭捶豈獨强梁化柔順坐使妖魑絶淫祀寸心既正天弗違雨暘任意如頤指事神治民各盡心實以一亷先律已處心寬仁復明恕皎若日星清似水况復尤長捍禦功文武全才孰能擬象緯今年示灾變天兵抵闕除姦宄雄師百萬才渡淮敗卒南奔散如蟻却來州縣事劫掠行旅道邊相枕死頓使前時革面徒舊惡乘風亦羣起白晝揮戈肆仇殺闔室連村遭破燬聖皇戡亂已登極如日行空正天紀詔書馳布宣至仁此輩猖狂猶未已侯言我職當字民塗炭吾民能坐視協謀僚寀集吏卒爰整戈矛張弓矢奮身鼓勇當衆先盡獲渠魁磔諸市從此居民始貼席老稚欣欣免驚徙且今無恙共相見不得我侯安得爾事定侯來逹上聞奏功特啓宸衷喜錫賚榮頒品秩尊縣令喬遷州刺史只今催上去有期無計攀留嗟失恃徒切甘棠去後思撫字情親恩浹髓我聞客言興嘆嗟始信學優才可仕憶豫前歲初還家舊業荒蕪沒荆杞亦曾修刺謁侯堂一見下階䝉倒屣謬承奬諭勉前修不以孤寒輒相鄙邇來别侯已三載雅論洋洋猶在耳㑹侯來京我入蜀彼此參商乃如是感侯知我情更深聽客之言良有以古云郎官應列宿益信斯言非謬矣百里民心有休戚政關令佐人臧否嗟我韓侯能惠民政聲足與龔黃齒願言守令皆韓侯堯舜吾民立堪俟侯當此去不再留發軔青雲自兹始客還為我深致辭攀餞無繇身絆此山斗區區景仰情作詩頌侯煩送似駙馬公命寫枯木復戲題於上歷盡氷霜甘老朽不作嬌柔效花柳夜撼風聲鳥雀驚凉生月影蛟龍走嗟豫好竒成畫圖墨㾗猶帶烟糢糊寄言匠石勿相顧未必良材眼底無寫墨葡萄香墨濃翻研池汁眼前零落秋雲濕曾看月上海天髙水冷驪龍抱珠蟄何當釀得酒如川日醉北忩髙枕眠底羡凉州二千石題詩日寄瀛洲仙題胡學士從叔祖母曹氏死節卷此身所托惟良人良人云亡安用身未逐生前與偕老宜從地下長相親事關生死豈不犬心全節義惟其仁貞魂雖逺愈不滅銘文炳煥留堅珉端午賜觀騎射擊毬侍宴葵榴花開蒲艾香都城佳節逢端陽龍舟競渡不足尚詔令禁籞開毬場毬場新開向東苑一望晴烟緑莎軟萬馬騫騰鼓吹喧五雲繚繞旌旗展羽林年少青綸巾秀睂豐臉如神人錦袍窄䄂巧結束金鞍寶勒紅纓新紛紜來往尤迅速馬上時看藏馬腹背挽雕弓金鏃鳴一剪柔條碎新緑忽聞有詔命分朋毬先到手人誇能馬蹄四合雲霧集驪珠落地蛟龍爭彩色毬門不盈尺巧中由來如破的剨然一擊電光飛平地風雲轟霹靂不知何以能爾為人人武勇張天威鬼神變化妙莫測此技乃知聊爾嬉聖心舉此重閲武逸不忘勞在戎伍帑幣鮮華夾道陳馳騁許教便捷取自矜得雋意氣粗萬夫誇羡聲喧呼摐金伐鼓助喜色共言此樂人間無鑾輿臨幸天顔喜宴賜千官醉蒲醑光祿尊開北斗傍簫韶樂奏南薰裏微臣何幸遭盛明清光日近多恩榮呈詩敢擬長楊賦萬歲千秋頌太平青雲軒為項御史題君家髙軒絶塵歊知君逸氣長飄飄謝却山中白雲侣來尋天上青雲交蛟龍相從作霖雨鵰鶚每共摩晴霄丈夫如此真自快好將志業崇昌朝送鍾子勤之南京復職中書天寒幽薊漫山雪弱柳蕭條不堪折考績才看上國來離筵又向都亭别騎馬南征逐去塵長安紅紫正芳春池頭諸老應相愛官喜如初寵命新為劉竹深題雲山圖白雲縹眇山嵯峩幽人茅屋巖澗阿玉田瑶草暖烟碧落花流水春風和采松釀酒正堪醉掃石弄琴還自歌何當結鄰成兩叟杖藜日日頻相過題畫結屋千山萬山裏軒忩四面峯巒起捲幕晴招嶺上雲烹茶夜汲巖前水二三髙人同素心杖藜時復來幽林抱琴相延坐亭上一曲雅諧山水音屋頭隙地肯相許願作比鄰共相處賸採松花釀玉醪更覓黃精劚春雨騶虞歌景星輝閶闔開五雲燦騶虞來嗟哉騶虞豈偶然而來哉大化賦其德大塊成其材猊首虎軀雄見魁𤣥文郁郁素質白爛然雲漢同昭回其動也不疾而速其靜也不猛而威不肯食生物履生草虎鹿百獸日與相追隨嗟哉騶虞必應昌期而來歸始吾皇之御極兮出於陽翟之大野今吾皇之時巡兮又見於曹邑之林隈實繇吾皇盛治之所致德合堯舜之無為順四序平三台五風十雨阜民財嗟哉騶虞乃得於此時遊於帝鄉而徘徊入靈囿近瑶臺麒麟相與甪端為儕文犀白象相參陪萬姓乃畢賀歡呼隱如雷皇心謙抑不自聖拒而弗有尤謙撝頌聲洋洋盈八垓微臣作歌愧菲才仰祝吾皇聖壽億萬歲德業廣大功巍巍德業廣大功巍巍贈醫士李士文李君業醫兼業儒閉門著方仍著書濟生利物不求報人多感德交稱譽常年賣藥吳門市相去吾家無百里得興尤能日往還一幅風帆度烟水慚豫薄宦久辭家君亦移居住京華春風二月城南陌尚得相尋看杏花送道㑹歸西昌西昌羽客初朝天星冠雲帔何翩翩上界從知有官府俗人漫說無神仙三花已聚九還畢一氣常存萬劫先我欲攀留倐然去鶴背玉笙凌紫烟送闕教諭囊書拂曉辭金闕相見匆匆又相别草色初黃薊北雲梅花漸白江南雪殷勤沽酒送君行斷鴈西風千里情此去莫言官署冷好將經術授諸生贈醫士鄭德中鄭君襟抱如陽春一㕓賣藥京華塵家無所蓄惟善藥六陳之外餘皆新製成丸散及㕮咀按方如法皆精真見人抱病不得瘥痛苦有如同其身老人之老幼人幼切近不異骨肉親不肯屑屑趨勢利不肯蔑蔑輕賤貧一心治療忘勞辛直待病已情方伸人多感德申謝忱鄭君笑受尤欣欣人多感德未及報再干再瀆良不嗔吾知鄭君非常倫髙誼直欲干青旻宜乎姓名傳縉紳誰言宋清之後無其人於戲誰言宋清之後無其人怡壽堂為張指揮賦將軍乃是留侯孫少年好武兼好文胸懷兵甲自整整心懷道義常存存若翁不幸早殂落獨侍慈親顔尚渥只今緑鬢正康强賸種忘憂長自樂慈親所樂樂有子子已成名與夫似願教世世樹功勛豈但區區奉甘旨將軍年年海上行帆櫓橫飛旗斾明糧儲豐足冦盜息海波平帖軍民寧邇來北京偶相見禮貌雍容情繾綣自言怡壽奉親堂願得詞章發光炫慚豫才短思茫然濡毫勉為成詩篇他年太史書青簡定著將軍忠孝全萬木圖歌為楊庶子榮勉仁君不見竇十郎靈椿丹桂何芬芳又不見三槐王子孫世顯必可望君家萬木不可當乃知令祖種德心孔臧樂善行義於其鄉屢嘗發廩賙饑荒一鄉之人無流亡鄉人感德心弗忘為公種樹家山陽樹髙應得千尺强願公之身壽而康樹材應得成棟梁願公之後繁且昌種來不知今幾霜昂霄聳壑森成行孫枝茂衍不可以數計但見漫山亘嶺烟蒼蒼至今鄉之人䝉惠曷可量生為室廬死棺槨隨教適用不取償皇天報應何昭彰生君際遇當明良功名足為親顯揚兩京侍從登巖廊職當輔導居春坊六卿劍履參翺翔林巒因之重出色泉石自此增輝光我能為君染彩翰調𤣥漿寫出君家之萬木混融元氣搜冥茫蛟龍騫舉靄雲霧鳯凰飛舞鳴琳琅須臾展掛君之堂祥風佳氣來四傍請君勿異吾言狂等閒莫作圖畫張君恩先德寓於此儼然如在其洋洋君當掃地更焚香瞻對載拜什襲藏子孫百世存羮墻竒材大用殊未央嗚呼竒材大用殊未央王舍人詩集卷二
